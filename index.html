<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام استوديو بولا V23.2</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (UMD - أكثر استقراراً) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone -->
    <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #0f172a; color: white;}
        #root { min-height: 100vh; }
        .loader {
            border: 4px solid #334155; border-top: 4px solid #3b82f6;
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;">
            <div class="loader"></div>
            <div style="font-size: 20px; font-weight: bold; color: #94a3b8;">جاري تهيئة نظام استوديو بولا V23.2 ...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- إعدادات Firebase ---
        const firebaseConfig = {
          apiKey: "AIzaSyCz87t17ecgYHmHJHOtCBU7vYneWy6iJI8",
          authDomain: "paula-studio-18709.firebaseapp.com",
          projectId: "paula-studio-18709",
          storageBucket: "paula-studio-18709.firebasestorage.app",
          messagingSenderId: "827466426934",
          appId: "1:827466426934:web:e6ef20d3598427ea538697"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appNamespaceId = 'paula-studio-v23';

        // --- مكون الأيقونات المساعد ---
        const Icon = ({ name, size = 24, className = "" }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        // ==========================================
        // التطبيق الرئيسي
        // ==========================================
        const App = () => {
          const [user, setUser] = useState(null);
          const [currentView, setCurrentView] = useState('landing');
          const [authView, setAuthView] = useState(null); 
          const [appSettings, setAppSettings] = useState({ 
              laser: '941997', office: '0128', vaultPin: '3316', meterPrice: 250, commissionRate: 1 
          });
          const [pinInput, setPinInput] = useState('');
          const [isLoading, setIsLoading] = useState(true);
          const [dbError, setDbError] = useState(null); // مخزن الأخطاء

          // بيانات قاعدة البيانات
          const [items, setItems] = useState([]);
          const [orders, setOrders] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [customers, setCustomers] = useState([]); 
          const [employees, setEmployees] = useState([]); 
          const [laserBills, setLaserBills] = useState([]);
          const [debtPayments, setDebtPayments] = useState([]); 
          const [deletedLogs, setDeletedLogs] = useState([]); 

          useEffect(() => {
            const initAuth = async () => {
                try {
                    await auth.signInAnonymously();
                } catch (error) {
                    console.error("Auth Error:", error);
                    setDbError("فشل تسجيل الدخول (Firebase Auth): " + error.message);
                    setIsLoading(false);
                }
            };
            initAuth();

            const unsubAuth = auth.onAuthStateChanged(u => { 
                if(u) setUser(u); 
                setIsLoading(false); 
            });
            return () => unsubAuth();
          }, []);

          useEffect(() => {
            if (!user) return;
            
            const handleError = (error) => {
                console.error("Firestore Error:", error);
                setDbError("خطأ في قراءة البيانات (تأكد من صلاحيات Firebase Rules): " + error.message);
            };

            const publicDataRef = db.collection('artifacts').doc(appNamespaceId).collection('public').doc('data');

            const subs = [
              publicDataRef.collection('app_settings').doc('general').onSnapshot(snap => {
                  if (snap.exists) setAppSettings(prev => ({ ...prev, ...snap.data() }));
                  else publicDataRef.collection('app_settings').doc('general').set({ laser: '941997', office: '0128', vaultPin: '3316', meterPrice: 250, commissionRate: 1 });
              }, handleError),
              publicDataRef.collection('inventory').onSnapshot(s => setItems(s.docs.map(d=>({id:d.id, ...d.data()}))), handleError),
              publicDataRef.collection('orders').orderBy('createdAt', 'desc').onSnapshot(s => setOrders(s.docs.map(d=>({id:d.id, ...d.data()}))), handleError),
              publicDataRef.collection('expenses').onSnapshot(s => setExpenses(s.docs.map(d=>({id:d.id, ...d.data()}))), handleError),
              publicDataRef.collection('wholesale_customers').onSnapshot(s => setCustomers(s.docs.map(d=>({id:d.id, ...d.data()}))), handleError),
              publicDataRef.collection('employees').onSnapshot(s => setEmployees(s.docs.map(d=>({id:d.id, ...d.data()}))), handleError), 
              publicDataRef.collection('laser_bills').orderBy('createdAt', 'desc').onSnapshot(s => setLaserBills(s.docs.map(d=>({id:d.id, ...d.data()}))), handleError),
              publicDataRef.collection('debt_payments').onSnapshot(s => setDebtPayments(s.docs.map(d=>({id:d.id, ...d.data()}))), handleError),
              publicDataRef.collection('deleted_logs').orderBy('deletedAt', 'desc').onSnapshot(s => setDeletedLogs(s.docs.map(d=>({id:d.id, ...d.data()}))), handleError), 
            ];
            return () => subs.forEach(unsub => unsub());
          }, [user]);

          const handleLogin = (target) => {
            if (String(pinInput) === String(appSettings[target])) { setCurrentView(target); setAuthView(null); setPinInput(''); }
            else { alert("عذراً، الرقم السري غير صحيح"); setPinInput(''); }
          };

          if (dbError) {
              return (
                  <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6 text-center" dir="rtl">
                      <div className="bg-red-500/10 p-8 rounded-3xl border border-red-500/50 max-w-lg">
                          <Icon name="alert-triangle" size={64} className="text-red-500 mx-auto mb-4"/>
                          <h2 className="text-2xl font-black text-white mb-4">فشل الاتصال بقاعدة البيانات!</h2>
                          <p className="text-red-200 font-bold mb-4">{dbError}</p>
                          <p className="text-slate-400 text-sm">إذا كانت المشكلة (Missing or insufficient permissions)، ادخل على حسابك في Firebase وافتح قواعد البيانات (Firestore Rules) وغير التاريخ عشان تسمح بالقراءة والكتابة.</p>
                      </div>
                  </div>
              );
          }

          if (isLoading || !user) {
              return (
                  <div style={{height: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justify-content: 'center', gap: '20px'}}>
                      <div className="loader"></div>
                      <div style={{fontSize: '20px', fontWeight: 'bold', color: '#94a3b8'}}>جاري الاتصال بقاعدة البيانات...</div>
                  </div>
              );
          }

          if (currentView === 'landing') {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center p-6 relative">
                {authView && (
                    <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl p-10 max-w-sm w-full text-center relative shadow-2xl text-slate-900">
                            <button onClick={() => setAuthView(null)} className="absolute top-4 left-4 text-slate-400 hover:text-red-500"><Icon name="x"/></button>
                            <div className="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-600"><Icon name="lock" size={28}/></div>
                            <h3 className="text-xl font-black text-slate-800 mb-4">{authView === 'laser' ? 'دخول الليزر' : 'دخول المكتب'}</h3>
                            <input type="password" autoFocus className="w-full bg-slate-100 p-3 text-center text-3xl font-black rounded-xl mb-4 border-2 border-transparent focus:border-indigo-500 outline-none" value={pinInput} onChange={e => setPinInput(e.target.value)} placeholder="****" onKeyDown={e => e.key === 'Enter' && handleLogin(authView)}/>
                            <button onClick={() => handleLogin(authView)} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-4 rounded-xl font-black transition">دخول</button>
                        </div>
                    </div>
                )}
                <h1 className="text-4xl md:text-6xl font-black text-white mb-2 tracking-tighter">PAULA SYSTEM</h1>
                <p className="text-indigo-400 font-bold mb-12 tracking-widest text-xs uppercase">Premium Studio Edition V23.2</p>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl">
                    <button onClick={() => setAuthView('laser')} className="bg-slate-800 hover:bg-indigo-600 p-8 rounded-3xl border border-slate-700 transition flex flex-col items-center gap-4 group">
                        <Icon name="zap" size={48} className="text-indigo-400 group-hover:text-white transition"/>
                        <h2 className="text-2xl font-black text-white">حساب ماكينة الليزر</h2>
                    </button>
                    <button onClick={() => setAuthView('office')} className="bg-slate-800 hover:bg-emerald-600 p-8 rounded-3xl border border-slate-700 transition flex flex-col items-center gap-4 group">
                        <Icon name="package" size={48} className="text-emerald-400 group-hover:text-white transition"/>
                        <h2 className="text-2xl font-black text-white">حسابات مكتب بولا</h2>
                    </button>
                </div>
              </div>
            );
          }

          if (currentView === 'laser') return <LaserSystem backToHome={() => setCurrentView('landing')} orders={orders} laserBills={laserBills} dbRef={db.collection('artifacts').doc(appNamespaceId).collection('public').doc('data')} />;
          if (currentView === 'office') return <OfficeSystem backToHome={() => setCurrentView('landing')} orders={orders} items={items} expenses={expenses} customers={customers} employees={employees} debtPayments={debtPayments} deletedLogs={deletedLogs} dbRef={db.collection('artifacts').doc(appNamespaceId).collection('public').doc('data')} appSettings={appSettings} />;
          
          return null;
        };

        // ==========================================
        // نظام الليزر
        // ==========================================
        const LaserSystem = ({ backToHome, orders, laserBills, dbRef }) => {
            const [period, setPeriod] = useState('all');
            const [showAddBill, setShowAddBill] = useState(false);
            const [billData, setBillData] = useState({amount: '', desc: ''});
            const [showSettleConfirm, setShowSettleConfirm] = useState(false);

            const today = new Date().toLocaleDateString('en-CA');

            const getLaserIncome = (orderList) => {
                return orderList.reduce((sum, o) => sum + (o.items || []).filter(i => i.isLaser).reduce((s, i) => s + (i.currentPrice * i.qty), 0), 0);
            };

            const stats = useMemo(() => {
                const curMonth = today.slice(0, 7);
                const filteredOrders = orders.filter(o => {
                    if(period === 'daily') return o.dateString === today;
                    if(period === 'monthly') return o.dateString?.startsWith(curMonth);
                    return true;
                });
                const filteredBills = laserBills.filter(b => {
                    if(period === 'daily') return b.dateString === today;
                    if(period === 'monthly') return b.dateString?.startsWith(curMonth);
                    return true;
                });

                const income = getLaserIncome(filteredOrders);
                const billsTotal = filteredBills.reduce((sum, b) => sum + (parseFloat(b.amount)||0), 0);
                const net = income - billsTotal;
                return { income, billsTotal, net, partnerShare: net > 0 ? net / 2 : 0, filteredBills };
            }, [orders, laserBills, period, today]);

            const confirmSettle = async () => {
                await dbRef.collection('laser_bills').add({
                    description: "تصفية حساب الشريك (تصفير)",
                    amount: stats.partnerShare * 2,
                    dateString: today,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                setShowSettleConfirm(false);
            };

            return (
                <div className="min-h-screen bg-slate-900 text-white p-4 md:p-8 font-sans">
                    <div className="flex justify-between items-center mb-8 bg-slate-800 p-4 rounded-3xl border border-slate-700">
                        <button onClick={backToHome} className="bg-slate-700 p-3 rounded-xl hover:bg-red-500 transition"><Icon name="log-out" size={20}/></button>
                        <h1 className="text-xl font-black flex items-center gap-2"><Icon name="zap" className="text-indigo-400"/> حسابات الليزر</h1>
                        <select className="bg-slate-700 text-xs font-black p-2 rounded-xl outline-none" value={period} onChange={e=>setPeriod(e.target.value)}>
                            <option value="all">كل الأوقات</option>
                            <option value="daily">اليوم</option>
                            <option value="monthly">هذا الشهر</option>
                        </select>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div className="bg-slate-800 p-6 rounded-3xl border border-slate-700 text-center">
                            <div className="text-xs text-slate-400 font-black mb-2 uppercase">إجمالي مبيعات الماكينة</div>
                            <div className="text-3xl font-black text-emerald-400">{stats.income} ج</div>
                        </div>
                        <div className="bg-indigo-600 p-6 rounded-3xl shadow-xl relative text-center">
                            <div className="text-xs text-indigo-100 font-black mb-2 uppercase">نصيب الشريك (50%)</div>
                            <div className="text-4xl font-black text-white mb-4">{stats.partnerShare} ج</div>
                            <button onClick={()=>stats.partnerShare > 0 ? setShowSettleConfirm(true) : alert("لا توجد أرباح")} className="w-full bg-white/20 hover:bg-white/40 py-3 rounded-xl font-black text-xs flex items-center justify-center gap-2 transition">
                                <Icon name="refresh-ccw" size={16}/> تصفية وتصفير الحساب
                            </button>
                        </div>
                        <div className="bg-slate-800 p-6 rounded-3xl border border-slate-700 text-center">
                            <div className="text-xs text-slate-400 font-black mb-2 uppercase">الفواتير والمصاريف</div>
                            <div className="text-3xl font-black text-red-400">{stats.billsTotal} ج</div>
                        </div>
                    </div>

                    <div className="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-black">سجل الفواتير والمصاريف</h3>
                            <button onClick={()=>setShowAddBill(true)} className="bg-indigo-500 p-2 rounded-xl hover:bg-indigo-600 transition"><Icon name="plus"/></button>
                        </div>
                        <div className="space-y-2 max-h-96 overflow-y-auto scrollbar-hide">
                            {stats.filteredBills.map(b => (
                                <div key={b.id} className="bg-slate-900/50 p-4 rounded-2xl flex justify-between items-center">
                                    <div><div className="font-bold">{b.description}</div><div className="text-[10px] text-slate-500">{b.dateString}</div></div>
                                    <div className="flex items-center gap-4">
                                        <span className="font-black text-red-400">{b.amount} ج</span>
                                        <button onClick={()=>dbRef.collection('laser_bills').doc(b.id).delete()} className="text-slate-600 hover:text-red-500 transition"><Icon name="trash-2" size={16}/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {showAddBill && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 text-slate-900">
                            <div className="bg-slate-800 p-8 rounded-3xl w-full max-w-sm border border-slate-600 text-white">
                                <h3 className="text-center font-black mb-6">إضافة فاتورة جديدة</h3>
                                <input className="w-full p-3 bg-slate-900 rounded-xl mb-3 text-center font-black outline-none border border-transparent focus:border-indigo-500" placeholder="المبلغ" type="number" value={billData.amount} onChange={e=>setBillData({...billData, amount:e.target.value})}/>
                                <input className="w-full p-3 bg-slate-900 rounded-xl mb-4 text-center font-black outline-none border border-transparent focus:border-indigo-500" placeholder="الوصف" value={billData.desc} onChange={e=>setBillData({...billData, desc:e.target.value})}/>
                                <div className="flex gap-2">
                                    <button onClick={async()=>{
                                        if(billData.amount && billData.desc){
                                            await dbRef.collection('laser_bills').add({
                                                description: billData.desc, amount: parseFloat(billData.amount), dateString: today, createdAt: firebase.firestore.FieldValue.serverTimestamp()
                                            });
                                            setShowAddBill(false); setBillData({amount:'', desc:''});
                                        }
                                    }} className="flex-1 bg-indigo-600 hover:bg-indigo-700 transition py-3 rounded-xl font-black">حفظ</button>
                                    <button onClick={()=>setShowAddBill(false)} className="flex-1 bg-slate-700 hover:bg-slate-600 transition py-3 rounded-xl font-black">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showSettleConfirm && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50 text-white">
                            <div className="bg-slate-800 p-8 rounded-3xl w-full max-w-sm border border-indigo-500/50 text-center">
                                <div className="bg-indigo-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-400"><Icon name="alert-triangle" size={32}/></div>
                                <h3 className="text-xl font-black mb-2">تصفير الحساب؟</h3>
                                <p className="text-slate-400 text-sm font-bold mb-6">سيتم تصفير الأرباح الحالية ({stats.partnerShare} ج) وبدء حساب جديد.</p>
                                <div className="flex gap-2">
                                    <button onClick={confirmSettle} className="flex-1 bg-indigo-600 hover:bg-indigo-700 py-3 rounded-xl font-black transition">تأكيد</button>
                                    <button onClick={()=>setShowSettleConfirm(false)} className="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-black transition">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // نظام المكتب (بالكامل مع جميع الموديلز)
        // ==========================================
        const OfficeSystem = ({ backToHome, orders, items, expenses, customers, employees, debtPayments, deletedLogs, dbRef, appSettings }) => {
            const [tab, setTab] = useState('sales');
            const [cart, setCart] = useState([]);
            const [amountPaid, setAmountPaid] = useState('');
            const [discount, setDiscount] = useState(''); 
            const [customerName, setCustomerName] = useState('');
            const [customerPhone, setCustomerPhone] = useState('');
            const [selectedEmployee, setSelectedEmployee] = useState(''); 
            const [paymentMethod, setPaymentMethod] = useState('cash');
            const [searchTerm, setSearchTerm] = useState('');
            const [itemsSearch, setItemsSearch] = useState(''); 
            const [activeCategory, setActiveCategory] = useState('all');
            const [isWholesale, setIsWholesale] = useState(false);
            const [selectedWholesaleId, setSelectedWholesaleId] = useState('');

            const [isAdminLocked, setIsAdminLocked] = useState(true);
            const [pinEntry, setPinEntry] = useState('');
            const [editingOrder, setEditingOrder] = useState(null);
            const [editAmount, setEditAmount] = useState('');
            const [deleteReason, setDeleteReason] = useState(''); 
            
            // جميع الشاشات المنبثقة (Modals)
            const [showAddItem, setShowAddItem] = useState(false);
            const [editingStockItem, setEditingStockItem] = useState(null);
            const [newStockValue, setNewStockValue] = useState('');
            const [passModal, setPassModal] = useState(null); 
            const [passForm, setPassForm] = useState({old: '', new: ''});
            const [payConfirmModal, setPayConfirmModal] = useState(null);
            const [deleteConfirmModal, setDeleteConfirmModal] = useState(null); 
            const [deleteProductModal, setDeleteProductModal] = useState(null);
            const [showVaultExpenseModal, setShowVaultExpenseModal] = useState(false); 
            const [vaultExpenseData, setVaultExpenseData] = useState({amount: '', desc: ''});
            const [newEmployeeName, setNewEmployeeName] = useState(''); 
            const [showCommModal, setShowCommModal] = useState(false); 
            const [newCommRate, setNewCommRate] = useState('');
            const [showExpensesListModal, setShowExpensesListModal] = useState(false);
            const [itemToAddToOrder, setItemToAddToOrder] = useState(null); 
            const [qtyInput, setQtyInput] = useState('1'); 
            const [printModalItem, setPrintModalItem] = useState(null);
            const [printDims, setPrintDims] = useState({l: '', w: ''});
            const [printCount, setPrintCount] = useState('1'); 
            const [reportYear, setReportYear] = useState(new Date().getFullYear().toString());
            const [expandedMonth, setExpandedMonth] = useState(null);
            const [editingExpense, setEditingExpense] = useState(null);
            const [meterPriceModal, setMeterPriceModal] = useState(false);
            const [newMeterPrice, setNewMeterPrice] = useState('');

            const today = new Date().toLocaleDateString('en-CA');

            // --- الحسابات والإحصائيات ---
            const headerStats = useMemo(() => {
                const dailyOrders = orders.filter(o => o.dateString === today);
                const dailyExpenses = expenses.filter(e => e.dateString === today).reduce((sum, e) => sum + (e.amount || 0), 0);
                const dailyDebtCash = debtPayments.filter(dp => dp.dateString === today && (dp.paymentMethod === 'cash' || !dp.paymentMethod)).reduce((sum, dp) => sum + (dp.amount || 0), 0);
                const dailyDebtWallet = debtPayments.filter(dp => dp.dateString === today && dp.paymentMethod === 'wallet').reduce((sum, dp) => sum + (dp.amount || 0), 0);
                let initialCashIn = 0, initialWalletIn = 0;
                dailyOrders.forEach(o => {
                    const initialPayment = o.initialPaid !== undefined ? o.initialPaid : o.paid; 
                    if (o.paymentMethod === 'cash') initialCashIn += initialPayment;
                    else if (o.paymentMethod === 'wallet') initialWalletIn += initialPayment;
                });
                const drawerTotal = (initialCashIn + dailyDebtCash) - dailyExpenses;
                const walletTotal = initialWalletIn + dailyDebtWallet;
                return { drawer: drawerTotal, wallet: walletTotal, total: drawerTotal + walletTotal };
            }, [orders, expenses, debtPayments, today]);

            const availableYears = useMemo(() => {
                const years = new Set([...orders.map(o => o.dateString.slice(0, 4)), ...expenses.map(e => e.dateString.slice(0, 4)), ...debtPayments.map(d => d.dateString.slice(0, 4)), new Date().getFullYear().toString()]);
                return Array.from(years).sort().reverse();
            }, [orders, expenses, debtPayments]);

            // --- دوال العمليات ---
            const handleItemClick = (item) => {
                if (item.name === 'متر طباعه خامه') { setPrintModalItem(item); setPrintDims({l: '', w: ''}); setPrintCount('1'); } 
                else { setItemToAddToOrder(item); setQtyInput('1'); }
            };

            const handleAddPrintItem = () => {
                const l = parseFloat(printDims.l), w = parseFloat(printDims.w), c = parseInt(printCount) || 1; 
                if (!l || !w) return alert("أدخل الطول والعرض");
                const totalArea = (l * w) * c; 
                setCart([...cart, { ...printModalItem, name: `متر طباعه خامه (${l}م x ${w}م) - عدد ${c}`, qty: totalArea.toFixed(2), currentPrice: appSettings.meterPrice || 250, isPrinting: true }]);
                setPrintModalItem(null);
            };

            const handleAddItemToCart = () => {
                if (!itemToAddToOrder) return;
                const qty = parseInt(qtyInput);
                if (qty > 0) {
                    const price = isWholesale ? (itemToAddToOrder.wholesalePrice || itemToAddToOrder.price) : itemToAddToOrder.price;
                    const existingIdx = cart.findIndex(c => c.id === itemToAddToOrder.id);
                    if (existingIdx > -1) {
                        const newCart = [...cart]; newCart[existingIdx].qty += qty; setCart(newCart);
                    } else setCart([...cart, {...itemToAddToOrder, qty, currentPrice: price}]);
                }
                setItemToAddToOrder(null); setQtyInput('1');
            };

            const handleCheckout = async () => {
                if(!cart.length) return alert("السلة فارغة");
                if(!customerName.trim()) return alert("يجب إدخال اسم العميل!");
                if(!selectedEmployee) return alert("يجب اختيار اسم الموظف!");

                const subTotal = cart.reduce((a,b)=>a+(b.currentPrice*b.qty),0);
                const discountVal = parseFloat(discount) || 0;
                const total = Math.max(0, subTotal - discountVal); 
                const paid = parseFloat(amountPaid)||0;

                const orderRef = await dbRef.collection('orders').add({
                    items: cart, subTotal, discount: discountVal, total, paid, remaining: total-paid, initialPaid: paid, 
                    customerName, customerPhone, employeeName: selectedEmployee, paymentMethod, customerId: selectedWholesaleId || null,
                    dateString: today, monthString: today.slice(0, 7), createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                const batch = db.batch();
                for(let i of cart) {
                    if(!i.isPrinting) batch.update(dbRef.collection('inventory').doc(i.id), {stock: firebase.firestore.FieldValue.increment(-i.qty)});
                }
                await batch.commit();
                setCart([]); setAmountPaid(''); setDiscount(''); setCustomerName(''); setCustomerPhone(''); setSelectedWholesaleId(''); setSelectedEmployee(''); alert("تم حفظ الطلب ✅");
            };

            const executeQuickPay = async (method) => {
                if(!payConfirmModal) return;
                await dbRef.collection('orders').doc(payConfirmModal.id).update({ paid: payConfirmModal.total, remaining: 0 });
                await dbRef.collection('debt_payments').add({ amount: payConfirmModal.remaining, orderId: payConfirmModal.id, customerName: payConfirmModal.customerName, paymentMethod: method, dateString: today, createdAt: firebase.firestore.FieldValue.serverTimestamp() });
                setPayConfirmModal(null); alert(`تم الاستلام (${method === 'cash' ? 'نقدي' : 'محفظة'}) ✅`);
            };

            const executeDeleteOrder = async () => {
                if(!deleteConfirmModal || !deleteReason.trim()) return alert("يجب كتابة سبب الحذف!");
                const orderId = deleteConfirmModal.id;
                await dbRef.collection('deleted_logs').add({ orderId: orderId, customerName: deleteConfirmModal.customerName, total: deleteConfirmModal.total, reason: deleteReason, deletedAt: firebase.firestore.FieldValue.serverTimestamp(), dateString: today });
                const snap = await dbRef.collection('debt_payments').where('orderId', '==', orderId).get();
                const batch = db.batch();
                snap.docs.forEach(d => batch.delete(d.ref));
                batch.delete(dbRef.collection('orders').doc(orderId));
                await batch.commit();
                setDeleteConfirmModal(null); setDeleteReason(''); alert("تم حذف الطلب ✅");
            };

            const executeDeleteProduct = async () => {
                if(!deleteProductModal) return;
                await dbRef.collection('inventory').doc(deleteProductModal.id).delete();
                setDeleteProductModal(null); alert("تم حذف المنتج نهائياً ✅");
            };
            
            const handleUpdateOrder = async () => {
                if(!editingOrder) return;
                const paid = parseFloat(editAmount);
                await dbRef.collection('orders').doc(editingOrder.id).update({ paid: paid, remaining: editingOrder.total - paid });
                setEditingOrder(null); setEditAmount(''); alert("تم تعديل الفاتورة ✅");
            };

            const handleUpdateExpense = async () => {
                if(!editingExpense) return;
                await dbRef.collection('expenses').doc(editingExpense.id).update({ amount: parseFloat(editingExpense.amount), description: editingExpense.description });
                setEditingExpense(null); alert("تم تعديل المصروف ✅");
            };

            const handlePassChange = async () => {
                if(!passModal) return;
                const target = passModal;
                const currentPin = String(target === 'vault' ? (appSettings.vaultPin || '3316') : appSettings[target]);
                if(String(passForm.old) !== currentPin) return alert("الرقم الحالي غير صحيح!");
                if(passForm.new.length < 4) return alert("الرقم الجديد قصير!");
                
                const updateField = target === 'vault' ? 'vaultPin' : target;
                await dbRef.collection('app_settings').doc('general').update({ [updateField]: passForm.new });
                alert("تم التغيير بنجاح ✅"); setPassModal(null); setPassForm({old: '', new: ''});
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 p-4 md:p-8 font-sans">
                    {/* Header */}
                    <div className="flex flex-col xl:flex-row justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm border border-slate-100 gap-4">
                        <div className="flex items-center gap-3 w-full md:w-auto justify-between md:justify-start">
                            <div className="flex items-center gap-2">
                                <button onClick={backToHome} className="bg-slate-100 p-3 rounded-xl text-red-500 hover:bg-red-500 hover:text-white transition"><Icon name="log-out" size={20}/></button>
                                <h1 className="font-black text-lg hidden md:block">مكتب بولا</h1>
                            </div>
                            <div className="flex gap-2 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                                <div className="flex items-center gap-2 px-3 py-1 bg-emerald-100/50 text-emerald-700 rounded-xl">
                                    <Icon name="banknote" size={18}/>
                                    <div className="text-xs font-black"><span className="block text-[9px] text-emerald-500 uppercase">الدرج</span>{headerStats.drawer} ج</div>
                                </div>
                                <div className="flex items-center gap-2 px-3 py-1 bg-blue-100/50 text-blue-700 rounded-xl">
                                    <Icon name="smartphone" size={18}/>
                                    <div className="text-xs font-black"><span className="block text-[9px] text-blue-500 uppercase">محفظة</span>{headerStats.wallet} ج</div>
                                </div>
                                <div className="flex items-center gap-2 px-3 py-1 bg-indigo-100/50 text-indigo-700 rounded-xl">
                                    <Icon name="trending-up" size={18}/>
                                    <div className="text-xs font-black"><span className="block text-[9px] text-indigo-500 uppercase">الإجمالي</span>{headerStats.total} ج</div>
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-1 overflow-x-auto scrollbar-hide w-full xl:w-auto p-1">
                            {[ {id:'sales', n:'البيع', i:'shopping-cart'}, {id:'orders', n:'الطلبات', i:'search'}, {id:'warehouse', n:'المخزن', i:'package'}, {id:'customers', n:'العملاء', i:'users'}, {id:'expenses', n:'المصاريف', i:'minus-circle'}, {id:'admin', n:'الخزنة', i:'lock'} ].map(t => (
                                <button key={t.id} onClick={()=>setTab(t.id)} className={`px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 whitespace-nowrap transition ${tab===t.id?'bg-emerald-600 text-white shadow-md':'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                    <Icon name={t.i} size={14}/> {t.n}
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Tabs Content */}
                    {tab === 'sales' && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-2">
                                <div className="flex gap-2 mb-4 flex-wrap">
                                    <div className="flex flex-1 gap-2 bg-white p-2 rounded-2xl border border-slate-100 shadow-sm min-w-[200px]">
                                        <button onClick={()=>{setIsWholesale(false); setSelectedWholesaleId('');}} className={`flex-1 py-3 rounded-xl font-black transition ${!isWholesale?'bg-emerald-600 text-white':'text-slate-400 hover:bg-slate-50'}`}>قطاعي</button>
                                        <button onClick={()=>setIsWholesale(true)} className={`flex-1 py-3 rounded-xl font-black transition ${isWholesale?'bg-amber-600 text-white':'text-slate-400 hover:bg-slate-50'}`}>جملة</button>
                                    </div>
                                    <div className="flex gap-1 overflow-x-auto scrollbar-hide bg-white p-2 rounded-2xl border border-slate-100 shadow-sm flex-1">
                                        {[{id: 'all', n: 'الكل'}, {id: 'laser', n: 'ليزر'}, {id: 'printing', n: 'طباعة'}].map(cat => (
                                            <button key={cat.id} onClick={()=>setActiveCategory(cat.id)} className={`px-3 py-2 rounded-xl text-xs font-black transition ${activeCategory===cat.id ? 'bg-slate-800 text-white' : 'bg-slate-50 text-slate-500'}`}>{cat.n}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="relative mb-4">
                                    <Icon name="search" className="absolute right-4 top-3 text-slate-400" size={20}/>
                                    <input className="w-full p-3 pr-12 bg-white rounded-2xl shadow-sm outline-none font-black border border-slate-100 focus:border-emerald-500" placeholder="بحث عن منتج..." value={itemsSearch} onChange={e=>setItemsSearch(e.target.value)}/>
                                </div>
                                {isWholesale && (
                                    <div className="mb-4 bg-amber-50 p-4 rounded-2xl border border-amber-200">
                                        <select className="w-full p-3 rounded-xl font-black bg-white outline-none border border-amber-200" value={selectedWholesaleId} onChange={(e)=>{
                                            const c = customers.find(x=>x.id===e.target.value);
                                            if(c) { setCustomerName(c.name); setCustomerPhone(c.phone); setSelectedWholesaleId(c.id); } else { setCustomerName(''); setCustomerPhone(''); setSelectedWholesaleId(''); }
                                        }}>
                                            <option value="">-- اختر عميل الجملة --</option>
                                            {customers.map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                                        </select>
                                    </div>
                                )}
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {items.filter(i => (i.name.includes(itemsSearch)) && (activeCategory==='all' || (activeCategory==='laser'&&i.isLaser) || (activeCategory==='printing'&&i.isPrintingMaterial))).map(item => (
                                        <button key={item.id} onClick={()=> handleItemClick(item)} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition text-center relative">
                                            <div className="font-black text-slate-800 mb-1">{item.name}</div>
                                            <div className={`font-black text-xl ${isWholesale ? 'text-amber-600' : 'text-emerald-600'}`}>{isWholesale ? (item.wholesalePrice || item.price) : item.price} ج</div>
                                            {item.isLaser && <Icon name="zap" size={14} className="absolute top-4 left-4 text-amber-500"/>}
                                            {item.isPrintingMaterial && <Icon name="camera" size={14} className="absolute top-4 left-4 text-blue-500"/>}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            {/* السلة */}
                            <div className="bg-white p-6 rounded-3xl shadow-xl border border-emerald-50 h-fit sticky top-6">
                                <h3 className="font-black mb-4 flex items-center gap-2"><Icon name="shopping-cart" size={18}/> السلة</h3>
                                <div className="space-y-2 mb-6 max-h-48 overflow-y-auto scrollbar-hide">
                                    {cart.map((c,idx) => (
                                        <div key={idx} className="flex justify-between text-xs font-bold bg-slate-50 p-3 rounded-xl">
                                            <span className="truncate flex-1">{c.name} <span className="text-emerald-600">x{c.qty}</span></span>
                                            <span>{c.currentPrice * c.qty}ج</span>
                                            <button onClick={()=>setCart(cart.filter((_,i)=>i!==idx))} className="text-red-500 mr-2"><Icon name="x" size={16}/></button>
                                        </div>
                                    ))}
                                </div>
                                <div className="text-3xl font-black text-center mb-6 text-emerald-800 bg-emerald-50 py-4 rounded-2xl">
                                     {(cart.reduce((a,b)=>a+(b.currentPrice*b.qty),0) - (parseFloat(discount)||0)).toFixed(0)} ج
                                </div>
                                <div className="space-y-2">
                                     <input className="w-full p-2 bg-slate-100 rounded-xl text-center font-black outline-none mb-2" placeholder="خصم (اختياري)" type="number" value={discount} onChange={e=>setDiscount(e.target.value)}/>
                                     <input className="w-full p-3 bg-slate-100 rounded-xl text-center font-black outline-none focus:border-emerald-500 border-2 border-transparent" placeholder="المدفوع" type="number" value={amountPaid} onChange={e=>setAmountPaid(e.target.value)}/>
                                     <input className="w-full p-3 bg-slate-100 rounded-xl text-center font-black outline-none focus:border-emerald-500 border-2 border-transparent" placeholder="اسم العميل (اجباري)" value={customerName} onChange={e=>setCustomerName(e.target.value)}/>
                                     <select className="w-full p-3 bg-slate-100 rounded-xl text-center font-black outline-none mb-2" value={selectedEmployee} onChange={e=>setSelectedEmployee(e.target.value)}>
                                         <option value="">-- اختر الموظف (اجباري) --</option>
                                         {employees.map(emp => <option key={emp.id} value={emp.name}>{emp.name}</option>)}
                                     </select>
                                     <div className="flex gap-2">
                                        <button onClick={()=>setPaymentMethod('cash')} className={`flex-1 py-2 rounded-lg text-xs font-black ${paymentMethod==='cash'?'bg-emerald-600 text-white':'bg-slate-100'}`}>نقدي</button>
                                        <button onClick={()=>setPaymentMethod('wallet')} className={`flex-1 py-2 rounded-lg text-xs font-black ${paymentMethod==='wallet'?'bg-blue-600 text-white':'bg-slate-100'}`}>محفظة</button>
                                     </div>
                                     <button onClick={handleCheckout} className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg hover:bg-emerald-700">حفظ الفاتورة</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'orders' && (
                        <div className="space-y-6">
                            <input className="w-full p-3 bg-white rounded-2xl shadow-sm outline-none font-black border border-slate-100 focus:border-emerald-500" placeholder="بحث باسم العميل..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                            <div className="bg-red-50 p-6 rounded-3xl border border-red-100">
                                <h3 className="font-black text-red-800 mb-4 flex items-center gap-2"><Icon name="minus-circle" size={18}/> مصروفات اليوم ({expenses.filter(e=>e.dateString===today).reduce((s,e)=>s+e.amount,0)} ج)</h3>
                                <div className="space-y-2 max-h-32 overflow-y-auto scrollbar-hide">
                                    {expenses.filter(e=>e.dateString===today).map(e=>(
                                        <div key={e.id} className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm group">
                                            <div><div className="font-bold text-slate-700 text-xs">{e.description}</div><div className="font-black text-red-600 text-xs">{e.amount} ج</div></div>
                                            <div className="flex gap-2">
                                                <button onClick={()=>setEditingExpense(e)} className="p-2 text-blue-500 hover:bg-blue-50 rounded-lg"><Icon name="edit" size={14}/></button>
                                                <button onClick={()=>dbRef.collection('expenses').doc(e.id).delete()} className="p-2 text-red-500 hover:bg-red-50 rounded-lg"><Icon name="trash-2" size={14}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {orders.filter(o=>o.customerName.includes(searchTerm)).map(order => (
                                    <div key={order.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative group">
                                        <div className="flex justify-between items-start mb-4">
                                            <div><div className="font-black text-lg">{order.customerName}</div><div className="text-[10px] text-slate-400 font-bold">{order.dateString}</div></div>
                                            <button onClick={()=>setDeleteConfirmModal(order)} className="text-slate-200 group-hover:text-red-500 transition"><Icon name="trash-2" size={16}/></button>
                                        </div>
                                        <div className="space-y-1 mb-6 text-[11px] font-bold text-slate-500 bg-slate-50 p-3 rounded-2xl border border-slate-100 max-h-24 overflow-y-auto">
                                            {order.items.map((i,idx)=><div key={idx} className="flex justify-between"><span>• {i.name} {i.isPrinting ? `(${i.qty}م²)` : `(x${i.qty})`}</span><span>{Math.ceil(i.qty*i.currentPrice)} ج</span></div>)}
                                        </div>
                                        <div className="flex justify-between text-sm font-black mb-4"><div className="text-emerald-700">الإجمالي: {order.total}</div><div className="text-red-600">الباقي: {order.remaining}</div></div>
                                        <div className="grid grid-cols-2 gap-2">
                                            {order.remaining > 0 && <button onClick={()=>setPayConfirmModal(order)} className="col-span-2 bg-emerald-600 text-white py-2 rounded-xl font-black text-xs">تم الاستلام بالكامل</button>}
                                            <button onClick={()=>{setEditingOrder(order); setEditAmount(order.paid);}} className="bg-blue-50 text-blue-600 py-2 rounded-xl font-black text-xs flex items-center justify-center gap-1"><Icon name="edit" size={14}/> تعديل</button>
                                            <button onClick={() => {
                                                const itemsStr = order.items.map(i=>`• ${i.name} (x${i.qty})`).join('\n');
                                                const msg = `*فاتورة استوديو بولا عماد*\nالعميل: ${order.customerName}\n--------------\n${itemsStr}\n--------------\nالإجمالي: ${order.total} ج\nالمدفوع: ${order.paid} ج\n*الباقي: ${order.remaining} ج*`;
                                                window.open(`https://wa.me/2${order.customerPhone || ''}?text=${encodeURIComponent(msg)}`, '_blank');
                                            }} className="bg-emerald-50 text-emerald-600 py-2 rounded-xl font-black text-xs flex items-center justify-center gap-1"><Icon name="send" size={14}/> واتساب</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab === 'warehouse' && (
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                            <div className="bg-emerald-50 border-2 border-dashed border-emerald-200 p-8 rounded-3xl flex flex-col items-center justify-center gap-4 text-emerald-600 hover:bg-emerald-100 cursor-pointer" onClick={()=>setShowAddItem(true)}>
                                 <Icon name="plus" size={40}/> <span className="font-black">إضافة صنف جديد</span>
                            </div>
                            {items.map(i => (
                                <div key={i.id} className="bg-white p-6 rounded-3xl shadow-sm border border-slate-100 text-center relative group">
                                    <div className="absolute top-4 left-4 text-slate-300">
                                        {i.isLaser ? <Icon name="zap" size={16} className="text-amber-500"/> : i.isPrintingMaterial ? <Icon name="camera" size={16} className="text-blue-500"/> : null}
                                    </div>
                                    <div className="text-xs font-black text-slate-400 mb-2 uppercase">{i.name}</div>
                                    <div className={`text-5xl font-black mb-4 ${i.stock < 5 ? 'text-red-500' : 'text-slate-800'}`}>{i.stock}</div>
                                    <button onClick={()=>setDeleteProductModal(i)} className="absolute top-4 right-4 text-slate-200 hover:text-red-500 z-10"><Icon name="trash-2" size={16}/></button>
                                    <button onClick={() => { setEditingStockItem(i); setNewStockValue(i.stock); }} className="bg-slate-900 text-white px-6 py-2 rounded-xl text-xs font-black w-full">تعديل</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {tab === 'customers' && (
                        <div className="space-y-6">
                            <div className="bg-white p-6 rounded-3xl shadow-sm flex flex-col md:flex-row gap-4 border border-slate-100">
                                <input id="c-name" className="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none" placeholder="اسم العميل الجديد"/>
                                <input id="c-phone" className="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none" placeholder="رقم الموبايل"/>
                                <button onClick={async()=>{
                                    const n=document.getElementById('c-name').value, p=document.getElementById('c-phone').value;
                                    if(n){ await dbRef.collection('wholesale_customers').add({name:n, phone:p, createdAt:firebase.firestore.FieldValue.serverTimestamp()}); alert("تم الإضافة ✅"); }
                                }} className="bg-emerald-600 text-white px-8 py-3 rounded-2xl font-black">إضافة عميل</button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {customers.map(c => {
                                    const custOrders = orders.filter(o => o.customerId === c.id || o.customerName === c.name);
                                    const debt = custOrders.reduce((s, o) => s + (o.remaining || 0), 0);
                                    return (
                                        <div key={c.id} className="bg-white p-6 rounded-3xl border border-slate-100 relative group">
                                            <div className="font-black text-xl text-slate-800 mb-1">{c.name}</div>
                                            <div className="text-xs text-slate-400 font-bold mb-4">{c.phone}</div>
                                            <div className="bg-slate-50 p-4 rounded-2xl mb-4 text-sm font-black text-red-600">المديونية الحالية: {debt} ج</div>
                                            <button onClick={()=>dbRef.collection('wholesale_customers').doc(c.id).delete()} className="absolute top-4 left-4 text-slate-200 hover:text-red-500"><Icon name="trash-2" size={16}/></button>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {tab === 'expenses' && (
                        <div className="max-w-2xl mx-auto bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                            <h2 className="text-2xl font-black mb-6 text-red-600 flex items-center gap-2"><Icon name="minus-circle"/> تسجيل مصروفات بضاعة</h2>
                            <input id="ex-d" className="w-full p-4 bg-slate-50 rounded-2xl mb-4 font-black outline-none" placeholder="وصف المصروف"/>
                            <input id="ex-a" type="number" className="w-full p-4 bg-slate-50 rounded-2xl mb-6 font-black text-center text-xl" placeholder="المبلغ المدفوع"/>
                            <button onClick={async()=>{
                                const d=document.getElementById('ex-d').value, a=document.getElementById('ex-a').value;
                                if(d&&a) { await dbRef.collection('expenses').add({description:d, amount:parseFloat(a), dateString:today, createdAt:firebase.firestore.FieldValue.serverTimestamp()}); alert("تم التسجيل ✅"); }
                            }} className="w-full bg-red-600 text-white py-4 rounded-2xl font-black text-lg">حفظ المصروف</button>
                        </div>
                    )}

                    {tab === 'admin' && (
                        <div className="max-w-6xl mx-auto">
                            {isAdminLocked ? (
                                <div className="bg-slate-900 p-12 rounded-3xl text-center shadow-2xl mx-auto max-w-sm">
                                    <Icon name="lock" size={48} className="text-emerald-400 mx-auto mb-6"/>
                                    <h2 className="text-2xl font-black text-white mb-6">الخزنة السرية</h2>
                                    <input type="password" placeholder="****" className="bg-white/10 text-white text-center text-3xl p-4 rounded-2xl font-black mb-6 w-full outline-none" value={pinEntry} onChange={e=>{ setPinEntry(e.target.value); if(String(e.target.value) === String(appSettings.vaultPin || '3316')) setIsAdminLocked(false); }}/>
                                </div>
                            ) : (
                                <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                                    <div className="flex justify-between items-center mb-8 border-b border-slate-100 pb-8">
                                        <h3 className="text-xl font-black text-slate-700">تقارير الخزنة</h3>
                                        <div className="flex gap-4">
                                             <button onClick={() => setShowVaultExpenseModal(true)} className="bg-red-50 text-red-600 px-6 py-3 rounded-xl font-black text-sm hover:bg-red-600 hover:text-white transition flex items-center gap-2"><Icon name="minus-circle" size={16}/> بضاعة</button>
                                             <button onClick={() => setShowExpensesListModal(true)} className="bg-orange-50 text-orange-600 px-6 py-3 rounded-xl font-black text-sm hover:bg-orange-600 hover:text-white transition flex items-center gap-2"><Icon name="file-text" size={16}/> المصروفات التفصيلي</button>
                                             <button onClick={() => { setShowCommModal(true); setNewCommRate(appSettings.commissionRate || 1); }} className="bg-blue-50 text-blue-600 px-6 py-3 rounded-xl font-black text-sm hover:bg-blue-600 hover:text-white transition flex items-center gap-2"><Icon name="percent" size={16}/> تعديل العمولة</button>
                                             <select className="bg-slate-100 font-black text-lg outline-none text-slate-700 p-3 rounded-xl" value={reportYear} onChange={(e) => setReportYear(e.target.value)}>
                                                {availableYears.map(y => <option key={y} value={y}>{y}</option>)}
                                             </select>
                                            <button onClick={()=>setIsAdminLocked(true)} className="bg-slate-100 text-slate-400 p-3 rounded-xl hover:bg-red-500 hover:text-white"><Icon name="x"/></button>
                                        </div>
                                    </div>
                                    
                                    {/* الموظفين */}
                                    <div className="mb-10 bg-slate-50 p-6 rounded-3xl border border-slate-200">
                                        <h3 className="text-lg font-black text-slate-700 mb-4 flex items-center gap-2"><Icon name="users" size={20}/> إدارة الموظفين ועمولاتهم ({appSettings.commissionRate || 1}%)</h3>
                                        <div className="flex gap-2 mb-4">
                                            <input className="flex-1 p-3 bg-white rounded-xl outline-none border font-black" placeholder="اسم الموظف الجديد" value={newEmployeeName} onChange={e=>setNewEmployeeName(e.target.value)}/>
                                            <button onClick={()=> {if(newEmployeeName) dbRef.collection('employees').add({name: newEmployeeName}); setNewEmployeeName('');}} className="bg-indigo-600 text-white px-6 rounded-xl font-black">إضافة</button>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                                            {employees.map(emp => {
                                                const empOrders = orders.filter(o => o.employeeName === emp.name);
                                                const paidOrders = empOrders.filter(o => o.remaining === 0);
                                                const commission = (paidOrders.reduce((s, o) => s + (o.total || 0), 0) * (appSettings.commissionRate || 1)) / 100;
                                                return (
                                                    <div key={emp.id} className="bg-white p-4 rounded-2xl border text-sm font-black">
                                                        <div className="flex justify-between mb-2"><span>{emp.name}</span><button onClick={()=>dbRef.collection('employees').doc(emp.id).delete()} className="text-red-400"><Icon name="x" size={14}/></button></div>
                                                        <div className="text-indigo-600 border-t pt-2">العمولة المستحقة: {commission.toFixed(1)} ج</div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* سجل الحذف */}
                                    <div className="mb-10 bg-red-50 p-6 rounded-3xl border border-red-100">
                                        <h3 className="text-lg font-black text-red-800 mb-4 flex items-center gap-2"><Icon name="trash-2" size={20}/> سجل الحذف للمراجعة</h3>
                                        <div className="space-y-2 max-h-40 overflow-y-auto scrollbar-hide">
                                            {deletedLogs.map(log => (
                                                <div key={log.id} className="bg-white p-3 rounded-2xl border border-red-100 flex justify-between items-center text-sm">
                                                    <div><span className="font-black text-slate-800">{log.customerName}</span> <span className="text-slate-400 text-xs">({log.dateString})</span></div>
                                                    <div className="font-black text-red-600">{log.total} ج</div>
                                                    <div className="text-xs bg-red-100 px-2 py-1 rounded text-red-800">{log.reason}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>

                                    {/* كلمات السر */}
                                    <div className="mb-10 bg-slate-50 p-6 rounded-3xl border border-slate-200">
                                        <h3 className="text-lg font-black text-slate-700 mb-4 flex items-center gap-2"><Icon name="shield-check" size={20}/> الأمان وكلمات المرور</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                             <button onClick={() => { setPassModal('office'); setPassForm({old:'', new:''}); }} className="w-full bg-white p-4 rounded-2xl font-black flex justify-between items-center border hover:bg-emerald-50 text-slate-700">تغيير رقم دخول المكتب</button>
                                             <button onClick={() => { setPassModal('vault'); setPassForm({old:'', new:''}); }} className="w-full bg-white p-4 rounded-2xl font-black flex justify-between items-center border hover:bg-indigo-50 text-slate-700">تغيير رقم الخزنة</button>
                                        </div>
                                    </div>

                                    {/* تقرير السنة */}
                                    {(() => {
                                        const yearOrders = orders.filter(o => o.dateString.startsWith(reportYear));
                                        const yearExpenses = expenses.filter(e => e.dateString.startsWith(reportYear));
                                        const yearDebtPays = debtPayments.filter(dp => dp.dateString.startsWith(reportYear));
                                        const totalInc = yearOrders.reduce((s,o) => s + (o.initialPaid !== undefined ? o.initialPaid : o.paid), 0) + yearDebtPays.reduce((s,d) => s + d.amount, 0);
                                        const totalExp = yearExpenses.reduce((s,e)=>s+e.amount,0);

                                        return (
                                            <div className="space-y-8">
                                                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                                    <div className="p-6 bg-emerald-50 rounded-3xl border text-center"><div className="text-emerald-600 font-black mb-2">دخل السنة</div><div className="text-3xl font-black text-emerald-800">{totalInc} ج</div></div>
                                                    <div className="p-6 bg-red-50 rounded-3xl border text-center"><div className="text-red-600 font-black mb-2">مصاريف السنة</div><div className="text-3xl font-black text-red-800">{totalExp} ج</div></div>
                                                    <div className="p-6 bg-slate-100 rounded-3xl border text-center"><div className="text-slate-500 font-black mb-2">صافي الربح</div><div className="text-3xl font-black text-slate-800">{totalInc - totalExp} ج</div></div>
                                                </div>

                                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                    {Array.from({length: 12}, (_, i) => {
                                                        const monthNum = (i + 1).toString().padStart(2, '0');
                                                        const monthKey = `${reportYear}-${monthNum}`;
                                                        const mOrders = yearOrders.filter(o => o.dateString.startsWith(monthKey));
                                                        const mExpenses = yearExpenses.filter(e => e.dateString.startsWith(monthKey));
                                                        const mDebtPays = yearDebtPays.filter(dp => dp.dateString.startsWith(monthKey));
                                                        const mInc = mOrders.reduce((s,o) => s + (o.initialPaid !== undefined ? o.initialPaid : o.paid), 0) + mDebtPays.reduce((s,d) => s + d.amount, 0);
                                                        const mExp = mExpenses.reduce((s,e)=>s+e.amount,0);
                                                        const mNet = mInc - mExp;
                                                        const monthName = new Date(reportYear, i).toLocaleString('ar-EG', { month: 'long' });

                                                        return (
                                                            <div key={i} className="bg-slate-50 rounded-3xl border border-slate-100 p-6 flex justify-between items-center">
                                                                <div className="font-black text-lg">{monthName}</div>
                                                                <div className="text-left">
                                                                    <div className={`text-xl font-black ${mNet >= 0 ? 'text-emerald-600' : 'text-red-500'}`}>{mNet} ج</div>
                                                                </div>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                            )}
                        </div>
                    )}
                    
                    {/* --- جميع الشاشات المنبثقة كاملة (Modals) --- */}
                    
                    {itemToAddToOrder && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
                                <h3 className="font-black text-xl mb-4 text-slate-800">إضافة: {itemToAddToOrder.name}</h3>
                                <p className="text-slate-500 font-bold mb-2">أدخل العدد المطلوب</p>
                                <input type="number" className="w-full p-4 bg-slate-100 rounded-2xl mb-6 text-center font-black text-2xl outline-none focus:border-emerald-500 border-2 border-transparent" value={qtyInput} onChange={e => setQtyInput(e.target.value)} autoFocus onKeyDown={e => e.key === 'Enter' && handleAddItemToCart()}/>
                                <div className="flex gap-2"><button onClick={handleAddItemToCart} className="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-black">إضافة للسلة</button><button onClick={() => setItemToAddToOrder(null)} className="flex-1 bg-slate-200 py-3 rounded-xl font-black">إلغاء</button></div>
                            </div>
                        </div>
                    )}

                    {printModalItem && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
                                <div className="bg-blue-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600"><Icon name="printer" size={28}/></div>
                                <h3 className="font-black text-xl mb-6">حساب متر الطباعة</h3>
                                <div className="flex gap-4 mb-4">
                                    <div><label className="text-xs font-bold text-slate-400 block mb-1">الطول (متر)</label><input className="w-full p-3 bg-slate-100 rounded-xl text-center font-black outline-none" type="number" value={printDims.l} onChange={e=>setPrintDims({...printDims, l:e.target.value})}/></div>
                                    <div><label className="text-xs font-bold text-slate-400 block mb-1">العرض (متر)</label><input className="w-full p-3 bg-slate-100 rounded-xl text-center font-black outline-none" type="number" value={printDims.w} onChange={e=>setPrintDims({...printDims, w:e.target.value})}/></div>
                                </div>
                                <div className="mb-4"><label className="text-xs font-bold text-slate-400 block mb-1">العدد المطلوب</label><input className="w-full p-3 bg-slate-100 rounded-xl text-center font-black outline-none" type="number" value={printCount} onChange={e=>setPrintCount(e.target.value)}/></div>
                                <div className="flex gap-2"><button onClick={handleAddPrintItem} className="flex-1 bg-blue-600 text-white py-3 rounded-xl font-black">إضافة</button><button onClick={() => setPrintModalItem(null)} className="flex-1 bg-slate-200 py-3 rounded-xl font-black">إلغاء</button></div>
                            </div>
                        </div>
                    )}

                    {payConfirmModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-800 p-8 rounded-3xl w-full max-w-sm border border-indigo-500/50 text-center text-white">
                                <div className="bg-emerald-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-emerald-400"><Icon name="check" size={32}/></div>
                                <h3 className="text-xl font-black mb-2">تأكيد السداد</h3>
                                <p className="text-slate-400 text-sm mb-6">تأكيد استلام ({payConfirmModal.remaining} ج) وتصفير مديونية العميل؟</p>
                                <div className="flex gap-2">
                                    <button onClick={() => executeQuickPay('cash')} className="flex-1 bg-emerald-600 hover:bg-emerald-700 py-3 rounded-xl font-black">نقدي</button>
                                    <button onClick={() => executeQuickPay('wallet')} className="flex-1 bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-black">محفظة</button>
                                    <button onClick={()=>setPayConfirmModal(null)} className="flex-1 bg-slate-700 py-3 rounded-xl font-black">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {editingOrder && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
                                <h3 className="font-black mb-6 text-xl">تعديل المبلغ المدفوع</h3>
                                <div className="bg-slate-50 p-4 rounded-2xl mb-6 text-center"><div className="text-xs text-slate-400 font-bold">إجمالي الفاتورة</div><div className="text-2xl font-black">{editingOrder.total} ج</div></div>
                                <input className="w-full p-4 bg-slate-100 rounded-2xl mb-6 text-center font-black text-xl outline-none" type="number" value={editAmount} onChange={e=>setEditAmount(e.target.value)}/>
                                <div className="flex gap-2"><button onClick={handleUpdateOrder} className="flex-1 bg-blue-600 text-white py-4 rounded-xl font-black">تحديث</button><button onClick={()=>setEditingOrder(null)} className="flex-1 bg-slate-100 py-4 rounded-xl font-black">إلغاء</button></div>
                            </div>
                        </div>
                    )}

                    {deleteConfirmModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-800 p-8 rounded-3xl w-full max-w-sm border border-red-500/50 text-center text-white">
                                <div className="bg-red-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-red-400"><Icon name="alert-triangle" size={32}/></div>
                                <h3 className="text-xl font-black mb-4">حذف الفاتورة</h3>
                                <textarea className="w-full p-4 bg-slate-900 rounded-2xl mb-6 text-right font-black border-2 border-slate-700 outline-none h-24" placeholder="اكتب سبب الحذف..." value={deleteReason} onChange={e=>setDeleteReason(e.target.value)}/>
                                <div className="flex gap-2">
                                    <button onClick={executeDeleteOrder} className="flex-1 bg-red-600 py-3 rounded-xl font-black">حذف نهائي</button>
                                    <button onClick={()=>{setDeleteConfirmModal(null); setDeleteReason('');}} className="flex-1 bg-slate-700 py-3 rounded-xl font-black">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {deleteProductModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-800 p-8 rounded-3xl w-full max-w-sm text-center text-white border border-red-500/50">
                                <h3 className="text-xl font-black mb-6">تأكيد حذف: {deleteProductModal.name}</h3>
                                <div className="flex gap-2"><button onClick={executeDeleteProduct} className="flex-1 bg-red-600 py-3 rounded-xl font-black">حذف</button><button onClick={()=>setDeleteProductModal(null)} className="flex-1 bg-slate-700 py-3 rounded-xl font-black">إلغاء</button></div>
                            </div>
                        </div>
                    )}

                    {editingStockItem && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
                                <h3 className="font-black text-xl mb-4">تعديل مخزون: {editingStockItem.name}</h3>
                                <input type="number" className="w-full p-4 bg-slate-100 rounded-2xl mb-6 text-center font-black text-2xl outline-none" value={newStockValue} onChange={e => setNewStockValue(e.target.value)} autoFocus />
                                <div className="flex gap-2">
                                    <button onClick={async () => {
                                        const val = parseInt(newStockValue);
                                        if (!isNaN(val)) { await dbRef.collection('inventory').doc(editingStockItem.id).update({ stock: val }); setEditingStockItem(null); } 
                                    }} className="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-black">حفظ</button>
                                    <button onClick={() => setEditingStockItem(null)} className="flex-1 bg-slate-200 py-3 rounded-xl font-black">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showAddItem && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-lg shadow-2xl relative">
                                <button onClick={()=>setShowAddItem(false)} className="absolute top-6 left-6 text-slate-400"><Icon name="x"/></button>
                                <h2 className="text-2xl font-black mb-6 flex items-center justify-center gap-2">إضافة صنف جديد</h2>
                                <input id="ni-n" className="w-full p-4 bg-slate-50 rounded-2xl mb-4 font-black outline-none" placeholder="الاسم"/>
                                <div className="grid grid-cols-2 gap-4 mb-4">
                                     <input id="ni-p" type="number" className="p-4 bg-slate-50 rounded-2xl font-black text-center" placeholder="سعر القطاعي"/>
                                     <input id="ni-w" type="number" className="p-4 bg-slate-50 rounded-2xl font-black text-center" placeholder="سعر الجملة"/>
                                </div>
                                <input id="ni-s" type="number" className="w-full p-4 bg-slate-50 rounded-2xl mb-6 font-black text-center" placeholder="الكمية"/>
                                <div className="flex gap-4 mb-6">
                                     <div className={`flex-1 p-4 rounded-2xl border-2 cursor-pointer text-center`} id="ni-islaser" onClick={(e)=>e.currentTarget.classList.toggle('border-indigo-500')}><Icon name="zap" className="mx-auto text-indigo-500"/> ليزر</div>
                                     <div className={`flex-1 p-4 rounded-2xl border-2 cursor-pointer text-center`} id="ni-isprinting" onClick={(e)=>e.currentTarget.classList.toggle('border-blue-500')}><Icon name="camera" className="mx-auto text-blue-500"/> طباعة</div>
                                </div>
                                <button onClick={async()=>{
