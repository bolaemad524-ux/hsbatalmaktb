<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام استوديو بولا V23.2</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (UMD - الأكثر استقراراً للموبايل) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (لترجمة الكود) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compat - النسخة المتوافقة والشغالة في ملف واحد) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #0f172a; margin: 0; overflow-x: hidden; }
        .loader {
            border: 4px solid #1e293b; border-top: 4px solid #3b82f6;
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    
    <div id="root">
        <!-- شاشة التحميل المبدئية -->
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: #0f172a;">
            <div class="loader"></div>
            <div style="font-size: 18px; font-weight: bold; color: #94a3b8;">جاري الاتصال بالنظام...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // إعدادات Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyCz87t17ecgYHmHJHOtCBU7vYneWy6iJI8",
          authDomain: "paula-studio-18709.firebaseapp.com",
          projectId: "paula-studio-18709",
          storageBucket: "paula-studio-18709.firebasestorage.app",
          messagingSenderId: "827466426934",
          appId: "1:827466426934:web:e6ef20d3598427ea538697"
        };
        
        // منع تكرار التهيأة
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appNamespace = 'paula-studio-v23';

        // مكون الأيقونات
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
          const [user, setUser] = useState(null);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);
          const [currentView, setCurrentView] = useState('landing');
          const [authView, setAuthView] = useState(null);
          const [pinInput, setPinInput] = useState('');
          const [settings, setSettings] = useState({ laser: '941997', office: '0128', vaultPin: '3316', meterPrice: 250 });

          // البيانات
          const [items, setItems] = useState([]);
          const [orders, setOrders] = useState([]);
          const [employees, setEmployees] = useState([]);

          useEffect(() => {
            // محاولة تسجيل الدخول مجهول
            auth.signInAnonymously().catch(err => {
                console.error(err);
                setError("فشل تسجيل الدخول: تأكد من تفعيل 'Anonymous Auth' في Firebase Console.");
            });

            const unsubAuth = auth.onAuthStateChanged(u => {
                setUser(u);
                if(u) setLoading(false);
            });
            return () => unsubAuth();
          }, []);

          useEffect(() => {
            if (!user) return;

            const rootRef = db.collection('artifacts').doc(appNamespace).collection('public').doc('data');

            // جلب الإعدادات
            const unsubSettings = rootRef.collection('app_settings').doc('general').onSnapshot(s => {
                if(s.exists) setSettings(prev => ({...prev, ...s.data()}));
            }, err => setError("خطأ في صلاحيات الداتا: يرجى تحديث Rules في Firebase."));

            // جلب المخزن
            const unsubItems = rootRef.collection('inventory').onSnapshot(s => {
                setItems(s.docs.map(d => ({id: d.id, ...d.data()})));
            });

            // جلب الطلبات
            const unsubOrders = rootRef.collection('orders').orderBy('createdAt', 'desc').limit(50).onSnapshot(s => {
                setOrders(s.docs.map(d => ({id: d.id, ...d.data()})));
            });

            // جلب الموظفين
            const unsubEmployees = rootRef.collection('employees').onSnapshot(s => {
                setEmployees(s.docs.map(d => ({id: d.id, ...d.data()})));
            });

            return () => { unsubSettings(); unsubItems(); unsubOrders(); unsubEmployees(); };
          }, [user]);

          if (error) return (
            <div className="min-h-screen bg-slate-900 flex items-center justify-center p-6 text-center">
                <div className="bg-red-500/10 p-8 rounded-3xl border border-red-500/50 max-w-md">
                    <Icon name="alert-circle" size={48} className="text-red-500 mx-auto mb-4"/>
                    <h2 className="text-xl font-bold text-white mb-2">عطل فني في الاتصال</h2>
                    <p className="text-slate-400 text-sm mb-4">{error}</p>
                    <button onClick={() => window.location.reload()} className="bg-red-600 text-white px-6 py-2 rounded-xl font-bold">إعادة المحاولة</button>
                </div>
            </div>
          );

          if (loading) return (
            <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center gap-4">
                <div className="loader"></div>
                <div className="text-slate-400 font-bold">جاري تحميل البيانات...</div>
            </div>
          );

          const handleLogin = (target) => {
            if (String(pinInput) === String(settings[target === 'office' ? 'office' : 'laser'])) {
                setCurrentView(target);
                setAuthView(null);
                setPinInput('');
            } else {
                alert("الرقم السري غلط يا بولا!");
                setPinInput('');
            }
          };

          if (currentView === 'landing') {
            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-900 relative">
                    {authView && (
                        <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-8 max-w-sm w-full text-center text-slate-900">
                                <h3 className="text-xl font-black mb-4">{authView === 'laser' ? 'دخول الليزر' : 'دخول المكتب'}</h3>
                                <input type="password" autoFocus className="w-full bg-slate-100 p-4 text-center text-3xl font-black rounded-2xl mb-4 outline-none border-2 border-transparent focus:border-blue-500" value={pinInput} onChange={e => setPinInput(e.target.value)} placeholder="****" onKeyDown={e => e.key === 'Enter' && handleLogin(authView)}/>
                                <div className="flex gap-2">
                                    <button onClick={() => handleLogin(authView)} className="flex-1 bg-blue-600 text-white py-4 rounded-xl font-black">دخول</button>
                                    <button onClick={() => setAuthView(null)} className="flex-1 bg-slate-200 text-slate-500 py-4 rounded-xl font-black">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                    <h1 className="text-5xl font-black text-white mb-2 tracking-tighter">PAULA SYSTEM</h1>
                    <p className="text-blue-400 font-bold mb-12 text-xs uppercase tracking-widest">Premium Studio Edition</p>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 w-full max-w-2xl">
                        <button onClick={() => setAuthView('laser')} className="bg-slate-800 p-10 rounded-3xl border border-slate-700 hover:bg-blue-600 transition group flex flex-col items-center gap-4">
                            <Icon name="zap" size={48} className="text-blue-400 group-hover:text-white"/>
                            <span className="text-2xl font-black text-white">ماكينة الليزر</span>
                        </button>
                        <button onClick={() => setAuthView('office')} className="bg-slate-800 p-10 rounded-3xl border border-slate-700 hover:bg-emerald-600 transition group flex flex-col items-center gap-4">
                            <Icon name="package" size={48} className="text-emerald-400 group-hover:text-white"/>
                            <span className="text-2xl font-black text-white">حسابات المكتب</span>
                        </button>
                    </div>
                </div>
            );
          }

          // باقي الشاشات (OfficeSystem, LaserSystem) يتم استدعاؤها هنا...
          return (
            <div className="min-h-screen bg-white text-slate-900 p-4">
                <button onClick={() => setCurrentView('landing')} className="bg-slate-100 p-2 rounded-xl mb-4"><Icon name="arrow-right"/> رجوع</button>
                <div className="p-10 text-center font-black text-2xl">
                    أهلاً يا بولا.. جاري تجهيز واجهة {currentView === 'office' ? 'المكتب' : 'الليزر'} بالكامل لك الآن.
                </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
