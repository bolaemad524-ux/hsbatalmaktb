                                    const n=document.getElementById('ni-n').value, p=document.getElementById('ni-p').value, w=document.getElementById('ni-w').value, s=document.getElementById('ni-s').value;
                                    const isL = document.getElementById('ni-islaser').classList.contains('border-indigo-500');
                                    const isP = document.getElementById('ni-isprinting').classList.contains('border-blue-500');
                                    if(n&&p) { await dbRef.collection('inventory').add({name:n, price:parseFloat(p), wholesalePrice: parseFloat(w)||parseFloat(p), stock:parseInt(s)||0, isLaser:isL, isPrintingMaterial: isP}); setShowAddItem(false); }
                                }} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">حفظ</button>
                            </div>
                        </div>
                    )}

                    {showVaultExpenseModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-800 p-8 rounded-3xl w-full max-w-sm text-center text-white border border-slate-600">
                                <h3 className="text-xl font-black mb-6">إضافة فاتورة بضاعة للخزنة</h3>
                                <input className="w-full p-4 bg-slate-900 rounded-2xl mb-4 text-center outline-none font-black" placeholder="المبلغ" type="number" value={vaultExpenseData.amount} onChange={e=>setVaultExpenseData({...vaultExpenseData, amount:e.target.value})}/>
                                <input className="w-full p-4 bg-slate-900 rounded-2xl mb-6 text-center outline-none font-black" placeholder="الوصف" value={vaultExpenseData.desc} onChange={e=>setVaultExpenseData({...vaultExpenseData, desc:e.target.value})}/>
                                <div className="flex gap-2">
                                    <button onClick={async ()=>{
                                        if(vaultExpenseData.amount&&vaultExpenseData.desc) { await dbRef.collection('expenses').add({description: vaultExpenseData.desc+" (خزنة)", amount: parseFloat(vaultExpenseData.amount), dateString: today, createdAt: firebase.firestore.FieldValue.serverTimestamp()}); setShowVaultExpenseModal(false); setVaultExpenseData({amount:'',desc:''});}
                                    }} className="flex-1 bg-red-600 py-3 rounded-xl font-black">حفظ</button>
                                    <button onClick={()=>setShowVaultExpenseModal(false)} className="flex-1 bg-slate-700 py-3 rounded-xl font-black">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showCommModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
                                <h3 className="text-xl font-black mb-6">تغيير نسبة العمولة</h3>
                                <input className="w-full p-4 bg-slate-100 rounded-2xl mb-6 text-center font-black outline-none" type="number" value={newCommRate} onChange={e=>setNewCommRate(e.target.value)}/>
                                <div className="flex gap-2"><button onClick={async()=>{await dbRef.collection('app_settings').doc('general').update({commissionRate:parseFloat(newCommRate)}); setShowCommModal(false);}} className="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-black">حفظ</button><button onClick={()=>setShowCommModal(false)} className="flex-1 bg-slate-200 py-3 rounded-xl font-black">إلغاء</button></div>
                            </div>
                        </div>
                    )}

                    {passModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-sm text-center shadow-2xl">
                                <h3 className="text-xl font-black mb-6">تغيير رقم {passModal === 'office' ? 'المكتب' : 'الخزنة'}</h3>
                                <input className="w-full p-4 bg-slate-100 rounded-2xl mb-4 text-center font-black" type="password" placeholder="الرقم الحالي" value={passForm.old} onChange={e=>setPassForm({...passForm, old: e.target.value})}/>
                                <input className="w-full p-4 bg-slate-100 rounded-2xl mb-6 text-center font-black" type="text" placeholder="الرقم الجديد" value={passForm.new} onChange={e=>setPassForm({...passForm, new: e.target.value})}/>
                                <div className="flex gap-2"><button onClick={handlePassChange} className="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-black">تغيير</button><button onClick={()=>setPassModal(null)} className="flex-1 bg-slate-200 py-3 rounded-xl font-black">إلغاء</button></div>
                            </div>
                        </div>
                    )}

                    {editingExpense && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
                                <h3 className="font-black text-xl mb-4 text-red-800">تعديل المصروف</h3>
                                <input className="w-full p-3 bg-slate-100 rounded-xl mb-3 text-center font-black" placeholder="الوصف" value={editingExpense.description} onChange={e=>setEditingExpense({...editingExpense, description:e.target.value})}/>
                                <input className="w-full p-3 bg-slate-100 rounded-xl mb-4 text-center font-black text-xl" type="number" placeholder="المبلغ" value={editingExpense.amount} onChange={e=>setEditingExpense({...editingExpense, amount:e.target.value})}/>
                                <div className="flex gap-2"><button onClick={handleUpdateExpense} className="flex-1 bg-red-600 text-white py-3 rounded-xl font-black">حفظ</button><button onClick={()=>setEditingExpense(null)} className="flex-1 bg-slate-200 py-3 rounded-xl font-black">إلغاء</button></div>
                            </div>
                        </div>
                    )}

                    {showExpensesListModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-8 rounded-3xl w-full max-w-2xl shadow-2xl h-[80vh] flex flex-col">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-2xl font-black text-slate-800"><Icon name="file-text" className="inline text-orange-500 mr-2"/> سجل المصروفات ({reportYear})</h3>
                                    <button onClick={()=>setShowExpensesListModal(false)} className="text-slate-400 hover:text-red-500"><Icon name="x"/></button>
                                </div>
                                <div className="flex-1 overflow-y-auto scrollbar-hide">
                                    {Array.from({length: 12}, (_, i) => {
                                        const mExp = expenses.filter(e => e.dateString.startsWith(`${reportYear}-${(i+1).toString().padStart(2,'0')}`));
                                        if (!mExp.length) return null;
                                        return (
                                            <div key={i} className="mb-6">
                                                <div className="bg-orange-50 p-4 rounded-2xl mb-2 font-black text-orange-800 sticky top-0 flex justify-between"><span>شهر {i+1}</span><span>{mExp.reduce((s,e)=>s+e.amount,0)} ج</span></div>
                                                {mExp.map(exp => (
                                                    <div key={exp.id} className="flex justify-between p-3 border-b border-slate-100 items-center">
                                                        <div><div className="text-xs text-slate-400">{exp.dateString}</div><div className="font-bold">{exp.description}</div></div>
                                                        <div className="text-red-500 font-black">{exp.amount} ج</div>
                                                    </div>
                                                ))}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
