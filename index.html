<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام استوديو بولا V23.2</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (UMD النسخة المستقرة للموبايل) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel Standalone للترجمة -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Firebase SDK (Compat Version لضمان العمل في ملف واحد) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #0f172a; color: white; margin: 0; }
        .loader {
            border: 4px solid #1e293b; border-top: 4px solid #3b82f6;
            border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .input-focus:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body>
    
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;">
            <div class="loader"></div>
            <div style="font-size: 18px; font-weight: bold; color: #94a3b8;">جاري تشغيل نظام استوديو بولا V23.2...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- إعدادات Firebase الخاصة بك ---
        const firebaseConfig = {
          apiKey: "AIzaSyCz87t17ecgYHmHJHOtCBU7vYneWy6iJI8",
          authDomain: "paula-studio-18709.firebaseapp.com",
          projectId: "paula-studio-18709",
          storageBucket: "paula-studio-18709.firebasestorage.app",
          messagingSenderId: "827466426934",
          appId: "1:827466426934:web:e6ef20d3598427ea538697"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = 'paula-studio-v23'; 

        // مكون الأيقونات المساعد
        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`inline-block ${className}`}></i>;
        };

        // ==========================================
        // التطبيق الرئيسي
        // ==========================================
        const App = () => {
          const [user, setUser] = useState(null);
          const [loading, setLoading] = useState(true);
          const [currentView, setCurrentView] = useState('landing');
          const [authView, setAuthView] = useState(null); 
          const [pinInput, setPinInput] = useState('');
          const [settings, setSettings] = useState({ laser: '941997', office: '0128', vaultPin: '3316', meterPrice: 250, commissionRate: 1 });

          // داتا النظام
          const [items, setItems] = useState([]);
          const [orders, setOrders] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [employees, setEmployees] = useState([]);
          const [customers, setCustomers] = useState([]);
          const [laserBills, setLaserBills] = useState([]);
          const [debtPayments, setDebtPayments] = useState([]);
          const [deletedLogs, setDeletedLogs] = useState([]);

          useEffect(() => {
            auth.signInAnonymously().catch(e => console.error("Auth Error:", e));
            const unsub = auth.onAuthStateChanged(u => { setUser(u); if(u) setLoading(false); });
            return () => unsub();
          }, []);

          useEffect(() => {
            if (!user) return;
            const rootRef = db.collection('artifacts').doc(appId).collection('public').doc('data');

            const subs = [
                rootRef.collection('app_settings').doc('general').onSnapshot(s => s.exists && setSettings(prev => ({...prev, ...s.data()}))),
                rootRef.collection('inventory').onSnapshot(s => setItems(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('orders').orderBy('createdAt', 'desc').onSnapshot(s => setOrders(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('expenses').onSnapshot(s => setExpenses(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('employees').onSnapshot(s => setEmployees(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('wholesale_customers').onSnapshot(s => setCustomers(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('laser_bills').orderBy('createdAt', 'desc').onSnapshot(s => setLaserBills(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('debt_payments').onSnapshot(s => setDebtPayments(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('deleted_logs').orderBy('deletedAt', 'desc').onSnapshot(s => setDeletedLogs(s.docs.map(d=>({id:d.id, ...d.data()})))),
            ];
            return () => subs.forEach(unsub => unsub());
          }, [user]);

          if (loading) return (
            <div className="min-h-screen flex flex-col items-center justify-center gap-4 bg-slate-900 text-slate-400">
                <div className="loader"></div>
                <div className="font-bold">جاري تحميل داتا استوديو بولا...</div>
            </div>
          );

          const handleLogin = (target) => {
            if (String(pinInput) === String(settings[target])) {
                setCurrentView(target); setAuthView(null); setPinInput('');
            } else { alert("الباسورد غلط يا بولا!"); setPinInput(''); }
          };

          if (currentView === 'landing') {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-900 relative" dir="rtl">
                {authView && (
                    <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl p-10 max-w-sm w-full text-center text-slate-900 shadow-2xl">
                            <button onClick={() => setAuthView(null)} className="absolute top-4 left-4 text-slate-300 hover:text-red-500"><Icon name="x"/></button>
                            <div className="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600"><Icon name="lock" size={28}/></div>
                            <h3 className="text-xl font-black mb-6">{authView === 'laser' ? 'دخول الليزر' : 'دخول المكتب'}</h3>
                            <input type="password" autoFocus className="w-full bg-slate-100 p-4 text-center text-4xl font-black rounded-2xl mb-6 outline-none border-2 border-transparent focus:border-blue-500" value={pinInput} onChange={e => setPinInput(e.target.value)} placeholder="****" onKeyDown={e => e.key === 'Enter' && handleLogin(authView)}/>
                            <button onClick={() => handleLogin(authView)} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black transition shadow-lg">دخول</button>
                        </div>
                    </div>
                )}
                <h1 className="text-5xl md:text-7xl font-black text-white mb-2 tracking-tighter">PAULA SYSTEM</h1>
                <p className="text-blue-400 font-bold mb-16 tracking-widest text-xs uppercase">Premium Studio Edition V23.2</p>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl">
                    <button onClick={() => setAuthView('laser')} className="bg-slate-800 hover:bg-blue-600 p-10 rounded-[2.5rem] border border-slate-700 transition flex flex-col items-center gap-6 group">
                        <Icon name="zap" size={64} className="text-blue-400 group-hover:text-white transition"/>
                        <span className="text-2xl font-black text-white">ماكينة الليزر</span>
                    </button>
                    <button onClick={() => setAuthView('office')} className="bg-slate-800 hover:bg-emerald-600 p-10 rounded-[2.5rem] border border-slate-700 transition flex flex-col items-center gap-6 group">
                        <Icon name="package" size={64} className="text-emerald-400 group-hover:text-white transition"/>
                        <span className="text-2xl font-black text-white">حسابات المكتب</span>
                    </button>
                </div>
              </div>
            );
          }

          if (currentView === 'laser') return <LaserSystem backToHome={()=>setCurrentView('landing')} orders={orders} laserBills={laserBills} dbRef={db.collection('artifacts').doc(appId).collection('public').doc('data')} />;
          if (currentView === 'office') return <OfficeSystem backToHome={()=>setCurrentView('landing')} orders={orders} items={items} expenses={expenses} employees={employees} customers={customers} debtPayments={debtPayments} deletedLogs={deletedLogs} settings={settings} dbRef={db.collection('artifacts').doc(appId).collection('public').doc('data')} />;
          
          return null;
        };

        // ==========================================
        // نظام الليزر (Laser System)
        // ==========================================
        const LaserSystem = ({ backToHome, orders, laserBills, dbRef }) => {
            const [period, setPeriod] = useState('all');
            const [showAddBill, setShowAddBill] = useState(false);
            const [billData, setBillData] = useState({amount: '', desc: ''});
            const today = new Date().toLocaleDateString('en-CA');

            const stats = useMemo(() => {
                const filteredOrders = orders.filter(o => {
                    if(period === 'daily') return o.dateString === today;
                    if(period === 'monthly') return o.dateString?.startsWith(today.slice(0, 7));
                    return true;
                });
                const filteredBills = laserBills.filter(b => {
                    if(period === 'daily') return b.dateString === today;
                    if(period === 'monthly') return b.dateString?.startsWith(today.slice(0, 7));
                    return true;
                });

                const income = filteredOrders.reduce((sum, o) => sum + (o.items || []).filter(i => i.isLaser).reduce((s, i) => s + (i.currentPrice * i.qty), 0), 0);
                const billsTotal = filteredBills.reduce((sum, b) => sum + (parseFloat(b.amount)||0), 0);
                const net = income - billsTotal;
                return { income, billsTotal, net, partnerShare: net > 0 ? net / 2 : 0, filteredBills };
            }, [orders, laserBills, period, today]);

            return (
                <div className="min-h-screen bg-slate-900 text-white p-4 md:p-8" dir="rtl">
                    <div className="flex justify-between items-center mb-8 bg-slate-800 p-4 rounded-3xl border border-slate-700">
                        <button onClick={backToHome} className="bg-slate-700 p-3 rounded-xl hover:bg-red-500 transition"><Icon name="log-out" size={20}/></button>
                        <h1 className="text-xl font-black flex items-center gap-2"><Icon name="zap" className="text-blue-400"/> حسابات الليزر</h1>
                        <select className="bg-slate-700 text-xs font-black p-2 rounded-xl outline-none" value={period} onChange={e=>setPeriod(e.target.value)}>
                            <option value="all">الكل</option>
                            <option value="daily">اليوم</option>
                            <option value="monthly">الشهر</option>
                        </select>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 text-center">
                        <div className="bg-slate-800 p-8 rounded-3xl border border-slate-700"><div className="text-xs text-slate-400 font-black mb-2 uppercase">إجمالي مبيعات الليزر</div><div className="text-4xl font-black text-emerald-400">{stats.income} ج</div></div>
                        <div className="bg-blue-600 p-8 rounded-3xl shadow-xl"><div className="text-xs text-blue-100 font-black mb-2 uppercase">نصيب الشريك (50%)</div><div className="text-5xl font-black mb-4">{stats.partnerShare} ج</div>
                             <button onClick={async()=>{ if(window.confirm("هل تريد تصفير الحساب وتصفية الأرباح؟")) await dbRef.collection('laser_bills').add({description:"تصفية حساب الشريك", amount:stats.partnerShare*2, dateString:today, createdAt:firebase.firestore.FieldValue.serverTimestamp()}); }} className="w-full bg-white/20 hover:bg-white/30 py-3 rounded-xl font-black text-xs">تصفية وتصفير</button>
                        </div>
                        <div className="bg-slate-800 p-8 rounded-3xl border border-slate-700"><div className="text-xs text-slate-400 font-black mb-2 uppercase">المصاريف والفواتير</div><div className="text-4xl font-black text-red-400">{stats.billsTotal} ج</div></div>
                    </div>

                    <div className="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                        <div className="flex justify-between items-center mb-6"><h3 className="font-black">سجل الفواتير والمصاريف</h3><button onClick={()=>setShowAddBill(true)} className="bg-blue-500 p-2 rounded-xl hover:bg-blue-600 transition"><Icon name="plus"/></button></div>
                        <div className="space-y-3 max-h-96 overflow-y-auto scrollbar-hide">
                            {stats.filteredBills.map(b => (
                                <div key={b.id} className="bg-slate-900/50 p-4 rounded-2xl flex justify-between items-center">
                                    <div><div className="font-bold">{b.description}</div><div className="text-[10px] text-slate-500">{b.dateString}</div></div>
                                    <div className="flex items-center gap-4"><span className="font-black text-red-400">{b.amount} ج</span><button onClick={()=>dbRef.collection('laser_bills').doc(b.id).delete()} className="text-slate-600 hover:text-red-500 transition"><Icon name="trash-2" size={16}/></button></div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {showAddBill && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-800 p-8 rounded-3xl w-full max-w-sm border border-slate-600 text-center">
                                <h3 className="font-black mb-6">إضافة فاتورة/مصروف</h3>
                                <input className="w-full p-4 bg-slate-900 rounded-2xl mb-4 text-center font-black outline-none" placeholder="المبلغ" type="number" value={billData.amount} onChange={e=>setBillData({...billData, amount:e.target.value})}/>
                                <input className="w-full p-4 bg-slate-900 rounded-2xl mb-6 text-center font-black outline-none" placeholder="الوصف" value={billData.desc} onChange={e=>setBillData({...billData, desc:e.target.value})}/>
                                <div className="flex gap-2">
                                    <button onClick={async()=>{ if(billData.amount&&billData.desc){ await dbRef.collection('laser_bills').add({description:billData.desc, amount:parseFloat(billData.amount), dateString:today, createdAt:firebase.firestore.FieldValue.serverTimestamp()}); setShowAddBill(false); setBillData({amount:'',desc:''}); } }} className="flex-1 bg-blue-600 py-3 rounded-xl font-black">حفظ</button>
                                    <button onClick={()=>setShowAddBill(false)} className="flex-1 bg-slate-700 py-3 rounded-xl font-black">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // نظام المكتب (Office System)
        // ==========================================
        const OfficeSystem = ({ backToHome, orders, items, expenses, employees, customers, debtPayments, deletedLogs, settings, dbRef }) => {
            const [tab, setTab] = useState('sales');
            const [cart, setCart] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [isWholesale, setIsWholesale] = useState(false);
            const [customerName, setCustomerName] = useState('');
            const [customerPhone, setCustomerPhone] = useState('');
            const [selectedEmployee, setSelectedEmployee] = useState('');
            const [paidAmount, setAmountPaid] = useState('');
            const [discount, setDiscount] = useState('');
            const [paymentMethod, setPaymentMethod] = useState('cash');
            const [isAdminLocked, setIsAdminLocked] = useState(true);
            const [pinEntry, setPinEntry] = useState('');
            const [itemToCart, setItemToCart] = useState(null);
            const [qtyInput, setQtyInput] = useState('1');
            const today = new Date().toLocaleDateString('en-CA');

            const headerStats = useMemo(() => {
                const dO = orders.filter(o => o.dateString === today);
                const dE = expenses.filter(e => e.dateString === today).reduce((s,e)=>s+(e.amount||0),0);
                const dD = debtPayments.filter(d => d.dateString === today).reduce((s,d)=>s+(d.amount||0),0);
                let cash = dD, wallet = 0;
                dO.forEach(o => { if(o.paymentMethod==='cash') cash += o.initialPaid||o.paid; else wallet += o.initialPaid||o.paid; });
                return { drawer: cash - dE, wallet, total: (cash+wallet) - dE };
            }, [orders, expenses, debtPayments, today]);

            const handleCheckout = async () => {
                if(!cart.length || !customerName.trim() || !selectedEmployee) return alert("كمل البيانات يا بولا!");
                const subTotal = cart.reduce((a,b)=>a+(b.currentPrice*b.qty),0);
                const disc = parseFloat(discount)||0;
                const total = subTotal - disc;
                const paid = parseFloat(paidAmount)||0;

                const order = {
                    items: cart, subTotal, discount: disc, total, paid, remaining: total-paid, initialPaid: paid,
                    customerName, customerPhone, employeeName: selectedEmployee, paymentMethod,
                    dateString: today, monthString: today.slice(0, 7), createdAt: firebase.firestore.FieldValue.serverTimestamp()
                };

                const batch = db.batch();
                const newOrderRef = dbRef.collection('orders').doc();
                batch.set(newOrderRef, order);
                cart.forEach(i => { if(!i.isPrinting) batch.update(dbRef.collection('inventory').doc(i.id), {stock: firebase.firestore.FieldValue.increment(-i.qty)}); });
                await batch.commit();
                setCart([]); setAmountPaid(''); setDiscount(''); setCustomerName(''); setSelectedEmployee(''); alert("تم الحفظ ✅");
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 p-4 md:p-8" dir="rtl">
                    <div className="flex flex-col xl:flex-row justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm border border-slate-100 gap-4">
                        <div className="flex items-center gap-3 w-full md:w-auto justify-between">
                            <button onClick={backToHome} className="bg-slate-100 p-3 rounded-xl text-red-500 hover:bg-red-500 hover:text-white transition"><Icon name="log-out" size={20}/></button>
                            <div className="flex gap-2">
                                <div className="px-3 py-1 bg-emerald-100 text-emerald-700 rounded-xl text-xs font-black text-center"><span className="block text-[8px] opacity-60">الدرج</span>{headerStats.drawer}ج</div>
                                <div className="px-3 py-1 bg-blue-100 text-blue-700 rounded-xl text-xs font-black text-center"><span className="block text-[8px] opacity-60">محفظة</span>{headerStats.wallet}ج</div>
                                <div className="px-3 py-1 bg-slate-800 text-white rounded-xl text-xs font-black text-center"><span className="block text-[8px] opacity-40">الإجمالي</span>{headerStats.total}ج</div>
                            </div>
                        </div>
                        <div className="flex gap-1 overflow-x-auto scrollbar-hide w-full xl:w-auto">
                            {[{id:'sales', n:'البيع', i:'shopping-cart'}, {id:'orders', n:'الطلبات', i:'search'}, {id:'warehouse', n:'المخزن', i:'package'}, {id:'admin', n:'الخزنة', i:'lock'}].map(t => (
                                <button key={t.id} onClick={()=>setTab(t.id)} className={`px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 whitespace-nowrap transition ${tab===t.id?'bg-emerald-600 text-white shadow-md':'bg-slate-100 text-slate-500'}`}><Icon name={t.i} size={14}/> {t.n}</button>
                            ))}
                        </div>
                    </div>

                    {tab === 'sales' && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-2">
                                <div className="flex gap-2 mb-4">
                                    <button onClick={()=>setIsWholesale(false)} className={`flex-1 py-3 rounded-2xl font-black border-2 transition ${!isWholesale?'bg-emerald-600 border-emerald-600 text-white shadow-lg':'bg-white border-slate-100 text-slate-400'}`}>قطاعي</button>
                                    <button onClick={()=>setIsWholesale(true)} className={`flex-1 py-3 rounded-2xl font-black border-2 transition ${isWholesale?'bg-amber-600 border-amber-600 text-white shadow-lg':'bg-white border-slate-100 text-slate-400'}`}>جملة</button>
                                </div>
                                <input className="w-full p-4 bg-white rounded-2xl shadow-sm outline-none font-black border border-slate-100 mb-6" placeholder="بحث عن صنف..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {items.filter(i=>i.name.includes(searchTerm)).map(item => (
                                        <button key={item.id} onClick={()=> {setItemToCart(item); setQtyInput('1');}} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition text-center relative">
                                            <div className="font-black text-slate-800 mb-1">{item.name}</div>
                                            <div className="text-emerald-600 font-black text-xl">{isWholesale ? (item.wholesalePrice||item.price) : item.price} ج</div>
                                            <div className={`text-[10px] font-bold mt-1 ${item.stock < 5 ? 'text-red-500' : 'text-slate-400'}`}>مخزون: {item.stock}</div>
                                            {item.isLaser && <Icon name="zap" size={14} className="absolute top-4 left-4 text-blue-400"/>}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-emerald-50 h-fit sticky top-6">
                                <h3 className="font-black mb-4 flex items-center gap-2"><Icon name="shopping-cart" size={18}/> السلة ({isWholesale?'جملة':'قطاعي'})</h3>
                                <div className="space-y-2 mb-6 max-h-48 overflow-y-auto scrollbar-hide">
                                    {cart.map((c,idx) => (
                                        <div key={idx} className="flex justify-between text-xs font-bold bg-slate-50 p-3 rounded-xl items-center">
                                            <span className="truncate flex-1">{c.name} <span className="text-emerald-600">x{c.qty}</span></span>
                                            <span>{c.currentPrice * c.qty}ج</span>
                                            <button onClick={()=>setCart(cart.filter((_,i)=>i!==idx))} className="text-red-500 mr-2"><Icon name="x" size={14}/></button>
                                        </div>
                                    ))}
                                </div>
                                <div className="text-3xl font-black text-center mb-6 text-emerald-800 bg-emerald-50 py-4 rounded-2xl">
                                     {(cart.reduce((a,b)=>a+(b.currentPrice*b.qty),0) - (parseFloat(discount)||0)).toFixed(0)} ج
                                </div>
                                <div className="space-y-2">
                                     <input className="w-full p-3 bg-slate-100 rounded-xl text-center font-black outline-none" placeholder="المدفوع" type="number" value={paidAmount} onChange={e=>setAmountPaid(e.target.value)}/>
                                     <input className="w-full p-3 bg-slate-100 rounded-xl text-center font-black outline-none" placeholder="اسم العميل" value={customerName} onChange={e=>setCustomerName(e.target.value)}/>
                                     <select className="w-full p-3 bg-slate-100 rounded-xl text-center font-black outline-none" value={selectedEmployee} onChange={e=>setSelectedEmployee(e.target.value)}>
                                         <option value="">-- اختر الموظف --</option>
                                         {employees.map(emp => <option key={emp.id} value={emp.name}>{emp.name}</option>)}
                                     </select>
                                     <div className="flex gap-2">
                                        <button onClick={()=>setPaymentMethod('cash')} className={`flex-1 py-2 rounded-lg text-xs font-black ${paymentMethod==='cash'?'bg-emerald-600 text-white':'bg-slate-100'}`}>نقدي</button>
                                        <button onClick={()=>setPaymentMethod('wallet')} className={`flex-1 py-2 rounded-lg text-xs font-black ${paymentMethod==='wallet'?'bg-blue-600 text-white':'bg-slate-100'}`}>محفظة</button>
                                     </div>
                                     <button onClick={handleCheckout} className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg">حفظ الفاتورة</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'orders' && (
                        <div className="space-y-6">
                            <input className="w-full p-4 bg-white rounded-2xl shadow-sm outline-none font-black border border-slate-100" placeholder="بحث باسم العميل..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {orders.filter(o=>o.customerName.includes(searchTerm)).map(order => (
                                    <div key={order.id} className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm relative group overflow-hidden">
                                        <div className="flex justify-between items-start mb-4">
                                            <div><div className="font-black text-lg">{order.customerName}</div><div className="text-[10px] text-slate-400 font-bold">{order.dateString}</div></div>
                                            <button onClick={async()=>{ if(window.confirm("حذف الفاتورة؟")) await dbRef.collection('orders').doc(order.id).delete(); }} className="text-slate-200 group-hover:text-red-500 transition"><Icon name="trash-2" size={16}/></button>
                                        </div>
                                        <div className="space-y-1 mb-6 text-[11px] font-bold text-slate-500 bg-slate-50 p-3 rounded-2xl max-h-24 overflow-y-auto">
                                            {order.items.map((i,idx)=><div key={idx} className="flex justify-between"><span>• {i.name} (x{i.qty})</span><span>{i.qty*i.currentPrice}ج</span></div>)}
                                        </div>
                                        <div className="flex justify-between text-sm font-black mb-4"><div className="text-emerald-700">الإجمالي: {order.total}</div><div className="text-red-600">الباقي: {order.remaining}</div></div>
                                        <button onClick={()=>{
                                            const msg = `*فاتورة استوديو بولا*\nالعميل: ${order.customerName}\nالإجمالي: ${order.total} ج\nالمدفوع: ${order.paid} ج\n*الباقي: ${order.remaining} ج*`;
                                            window.open(`https://wa.me/2${order.customerPhone||''}?text=${encodeURIComponent(msg)}`, '_blank');
                                        }} className="w-full bg-emerald-50 text-emerald-600 py-2 rounded-xl font-black text-xs flex items-center justify-center gap-2"><Icon name="send" size={14}/> واتساب</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab === 'admin' && (
                        <div className="max-w-4xl mx-auto">
                            {isAdminLocked ? (
                                <div className="bg-slate-900 p-12 rounded-3xl text-center shadow-2xl mx-auto max-w-sm">
                                    <Icon name="lock" size={48} className="text-emerald-400 mx-auto mb-6"/>
                                    <h2 className="text-2xl font-black text-white mb-6">الخزنة السرية</h2>
                                    <input type="password" placeholder="****" className="bg-white/10 text-white text-center text-4xl p-4 rounded-2xl font-black mb-6 w-full outline-none border border-white/20" value={pinEntry} onChange={e=>{ setPinEntry(e.target.value); if(String(e.target.value)===String(settings.vaultPin)) setIsAdminLocked(false); }}/>
                                </div>
                            ) : (
                                <div className="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                                    <div className="flex justify-between items-center mb-8 border-b border-slate-100 pb-6">
                                        <h3 className="text-xl font-black">تقارير الخزنة</h3>
                                        <button onClick={()=>setIsAdminLocked(true)} className="bg-slate-100 p-2 rounded-lg"><Icon name="x"/></button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                                        <div className="p-6 bg-emerald-50 rounded-2xl border border-emerald-100 text-center"><div className="text-xs text-emerald-600 font-black mb-1">دخل هذا الشهر</div><div className="text-2xl font-black text-emerald-800">{orders.filter(o=>o.monthString===today.slice(0,7)).reduce((s,o)=>s+(o.initialPaid||o.paid),0) + debtPayments.filter(d=>d.dateString.startsWith(today.slice(0,7))).reduce((s,d)=>s+d.amount,0)} ج</div></div>
                                        <div className="p-6 bg-red-50 rounded-2xl border border-red-100 text-center"><div className="text-xs text-red-600 font-black mb-1">مصاريف هذا الشهر</div><div className="text-2xl font-black text-red-800">{expenses.filter(e=>e.dateString.startsWith(today.slice(0,7))).reduce((s,e)=>s+e.amount,0)} ج</div></div>
                                        <div className="p-6 bg-slate-800 rounded-2xl text-white text-center"><div className="text-xs text-slate-400 font-black mb-1">إجمالي الموظفين</div><div className="text-2xl font-black">{employees.length}</div></div>
                                    </div>
                                    <div className="mb-10 bg-slate-50 p-6 rounded-2xl border border-slate-200">
                                        <h4 className="font-black mb-4 flex items-center gap-2"><Icon name="users" size={18}/> الموظفين والعمولات ({settings.commissionRate}%)</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                            {employees.map(emp => {
                                                const empOrders = orders.filter(o => o.employeeName === emp.name && o.remaining === 0);
                                                const comm = (empOrders.reduce((s,o)=>s+o.total,0) * (settings.commissionRate||1)) / 100;
                                                return (
                                                    <div key={emp.id} className="bg-white p-4 rounded-xl border flex justify-between items-center">
                                                        <div><div className="font-black text-slate-700">{emp.name}</div><div className="text-xs text-blue-600 font-bold">العمولة: {comm.toFixed(1)} ج</div></div>
                                                        <button onClick={async()=>await dbRef.collection('employees').doc(emp.id).delete()} className="text-red-300 hover:text-red-500"><Icon name="trash-2" size={16}/></button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {itemToCart && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm text-center shadow-2xl">
                                <h3 className="font-black text-xl mb-4">الكمية: {itemToCart.name}</h3>
                                <input type="number" className="w-full p-4 bg-slate-100 rounded-2xl mb-6 text-center font-black text-3xl outline-none" value={qtyInput} onChange={e => setQtyInput(e.target.value)} autoFocus onKeyDown={e => { if(e.key==='Enter'){ setCart([...cart, {...itemToCart, qty: parseFloat(qtyInput), currentPrice: isWholesale?(itemToCart.wholesalePrice||itemToCart.price):itemToCart.price}]); setItemToCart(null); }}}/>
                                <div className="flex gap-2">
                                    <button onClick={()=>{setCart([...cart, {...itemToCart, qty: parseFloat(qtyInput), currentPrice: isWholesale?(itemToCart.wholesalePrice||itemToCart.price):itemToCart.price}]); setItemToCart(null);}} className="flex-1 bg-emerald-600 text-white py-3 rounded-xl font-black">إضافة</button>
                                    <button onClick={()=>setItemToCart(null)} className="flex-1 bg-slate-200 py-3 rounded-xl font-black">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
