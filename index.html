<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام استوديو بولا V23.2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        /* إخفاء شريط التمرير مع الحفاظ على القدرة على التمرير */
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: system-ui, -apple-system, sans-serif; }
    </style>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0?external=react",
        "firebase/app": "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js"
      }
    }
    </script>
</head>
<body class="bg-slate-900">
    
    <div id="root">
        <div style="height: 100vh; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: bold;">
            جاري تهيئة نظام استوديو بولا V23.2 ... برجاء الانتظار
        </div>
    </div>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo } from 'react';
        import { createRoot } from 'react-dom/client';
        import { initializeApp } from 'firebase/app';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'firebase/auth';
        import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, serverTimestamp, increment, setDoc, query, where, getDocs } from 'firebase/firestore';
        import { 
          ShoppingCart, Plus, Trash2, Send, Package, Edit,
          Wallet, Lock, Search, Smartphone, X, Banknote, MinusCircle, Zap, Users, LogOut, Key, 
          Settings, Check, RefreshCcw, AlertTriangle, FileText, Printer, Percent, Camera, Layers, UserCheck, TrendingUp, ShieldCheck, ClipboardList, Download, Upload, Database
        } from 'lucide-react';

        // =========================================================================
        // بيانات Firebase الخاصة باستوديو بولا
        // =========================================================================
        const firebaseConfig = {
          apiKey: "AIzaSyCz87t17ecgYHmHJHOtCBU7vYneWy6iJI8",
          authDomain: "paula-studio-18709.firebaseapp.com",
          projectId: "paula-studio-18709",
          storageBucket: "paula-studio-18709.firebasestorage.app",
          messagingSenderId: "827466426934",
          appId: "1:827466426934:web:e6ef20d3598427ea538697"
        };
        const appId = 'paula-studio-v23'; 
        // =========================================================================

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- MAIN APP COMPONENT ---
        const App = () => {
          const [user, setUser] = useState(null);
          const [currentView, setCurrentView] = useState('landing');
          const [authView, setAuthView] = useState(null); 
          const [appSettings, setAppSettings] = useState({ 
              laser: '941997', 
              office: '0128',
              vaultPin: '3316', 
              meterPrice: 250,
              commissionRate: 1 
          });
          const [pinInput, setPinInput] = useState('');
          
          const [items, setItems] = useState([]);
          const [orders, setOrders] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [customers, setCustomers] = useState([]); 
          const [employees, setEmployees] = useState([]); 
          const [laserBills, setLaserBills] = useState([]);
          const [debtPayments, setDebtPayments] = useState([]); 
          const [deletedLogs, setDeletedLogs] = useState([]); 

          useEffect(() => {
            const initAuth = async () => {
                await signInAnonymously(auth).catch(e => console.error("Auth Error:", e));
            };
            initAuth();
            onAuthStateChanged(auth, setUser);
          }, []);

          useEffect(() => {
            if (!user) return;
            
            const settingsUnsub = onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'app_settings', 'general'), (docSnap) => {
                if (docSnap.exists()) {
                    setAppSettings(prev => ({ ...prev, ...docSnap.data() }));
                } else {
                    setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'app_settings', 'general'), { 
                        laser: '941997', office: '0128', vaultPin: '3316', meterPrice: 250, commissionRate: 1 
                    });
                }
            });

            const subs = [
              settingsUnsub,
              onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), s => setItems(s.docs.map(d=>({id:d.id, ...d.data()})))),
              onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), s => setOrders(s.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)))),
              onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'expenses'), s => setExpenses(s.docs.map(d=>({id:d.id, ...d.data()})))),
              onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'wholesale_customers'), s => setCustomers(s.docs.map(d=>({id:d.id, ...d.data()})))),
              onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'employees'), s => setEmployees(s.docs.map(d=>({id:d.id, ...d.data()})))), 
              onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'laser_bills'), s => setLaserBills(s.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0)))),
              onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'debt_payments'), s => setDebtPayments(s.docs.map(d=>({id:d.id, ...d.data()})))),
              onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'deleted_logs'), s => setDeletedLogs(s.docs.map(d=>({id:d.id, ...d.data()})).sort((a,b)=>(b.deletedAt?.seconds||0)-(a.deletedAt?.seconds||0)))), 
            ];
            return () => subs.forEach(unsub => unsub());
          }, [user]);

          const handleLogin = (target) => {
            if (String(pinInput) === String(appSettings[target])) { setCurrentView(target); setAuthView(null); setPinInput(''); }
            else { alert("عذراً، الرقم السري غير صحيح"); setPinInput(''); }
          };

          if (!user) return null;

          if (currentView === 'landing') {
            return (
              <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center p-6 relative" dir="rtl">
                {authView && (
                    <div className="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center p-4">
                        <div className="bg-white rounded-[2rem] p-10 max-w-sm w-full text-center relative shadow-2xl">
                            <button onClick={() => setAuthView(null)} className="absolute top-4 left-4 text-slate-400"><X/></button>
                            <div className="w-16 h-16 bg-indigo-50 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-600"><Lock size={28}/></div>
                            <h3 className="text-xl font-black text-slate-800 mb-4">{authView === 'laser' ? 'دخول الليزر' : 'دخول المكتب'}</h3>
                            <input type="password" autoFocus className="w-full bg-slate-100 p-3 text-center text-3xl font-black rounded-xl mb-4 border-2 border-transparent focus:border-indigo-500 outline-none" value={pinInput} onChange={e => setPinInput(e.target.value)} placeholder="****"/>
                            <button onClick={() => handleLogin(authView)} className="w-full bg-indigo-600 text-white py-4 rounded-xl font-black">دخول</button>
                        </div>
                    </div>
                )}
                <h1 className="text-4xl md:text-6xl font-black text-white mb-2 tracking-tighter">PAULA SYSTEM</h1>
                <p className="text-indigo-400 font-bold mb-12 tracking-widest text-xs uppercase">Premium Studio Edition V23.2</p>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl">
                    <button onClick={() => setAuthView('laser')} className="bg-slate-800 hover:bg-indigo-600 p-8 rounded-[2.5rem] border border-slate-700 transition flex flex-col items-center gap-4 group">
                        <Zap size={48} className="text-indigo-400 group-hover:text-white"/>
                        <h2 className="text-2xl font-black text-white">حساب ماكينة الليزر</h2>
                    </button>
                    <button onClick={() => setAuthView('office')} className="bg-slate-800 hover:bg-emerald-600 p-8 rounded-[2.5rem] border border-slate-700 transition flex flex-col items-center gap-4 group">
                        <Package size={48} className="text-emerald-400 group-hover:text-white"/>
                        <h2 className="text-2xl font-black text-white">حسابات مكتب بولا</h2>
                    </button>
                </div>
              </div>
            );
          }

          if (currentView === 'laser') return <LaserSystem backToHome={() => setCurrentView('landing')} orders={orders} laserBills={laserBills} db={db} appId={appId} />;
          if (currentView === 'office') return <OfficeSystem backToHome={() => setCurrentView('landing')} orders={orders} items={items} expenses={expenses} customers={customers} employees={employees} debtPayments={debtPayments} deletedLogs={deletedLogs} db={db} appId={appId} appSettings={appSettings} />;
          
          return null;
        };

        // =====================================================================
        // === LASER SYSTEM
        // =====================================================================
        const LaserSystem = ({ backToHome, orders, laserBills, db, appId }) => {
            const [period, setPeriod] = useState('all');
            const [showAddBill, setShowAddBill] = useState(false);
            const [billData, setBillData] = useState({amount: '', desc: ''});
            const [showSettleConfirm, setShowSettleConfirm] = useState(false);

            const today = new Date().toLocaleDateString('en-CA');

            const getLaserIncome = (orderList) => {
                return orderList.reduce((sum, o) => sum + (o.items || []).filter(i => i.isLaser).reduce((s, i) => s + (i.currentPrice * i.qty), 0), 0);
            };

            const stats = useMemo(() => {
                const curMonth = today.slice(0, 7);
                const filteredOrders = orders.filter(o => {
                    if(period === 'daily') return o.dateString === today;
                    if(period === 'monthly') return o.dateString?.startsWith(curMonth);
                    return true;
                });
                const filteredBills = laserBills.filter(b => {
                    if(period === 'daily') return b.dateString === today;
                    if(period === 'monthly') return b.dateString?.startsWith(curMonth);
                    return true;
                });

                const income = getLaserIncome(filteredOrders);
                const billsTotal = filteredBills.reduce((sum, b) => sum + (parseFloat(b.amount)||0), 0);
                const net = income - billsTotal;
                return { income, billsTotal, net, partnerShare: net > 0 ? net / 2 : 0, filteredBills };
            }, [orders, laserBills, period, today]);

            const initiateSettle = () => {
                if(stats.partnerShare <= 0) return alert("لا توجد أرباح حالياً لتصفيتها");
                setShowSettleConfirm(true);
            };

            const confirmSettle = async () => {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'laser_bills'), {
                    description: "تصفية حساب الشريك (تصفير)",
                    amount: stats.partnerShare * 2,
                    dateString: today,
                    createdAt: serverTimestamp()
                });
                setShowSettleConfirm(false);
            };

            return (
                <div className="min-h-screen bg-slate-900 text-white p-4 md:p-8 font-sans" dir="rtl">
                    <div className="flex justify-between items-center mb-8 bg-slate-800 p-4 rounded-3xl border border-slate-700">
                        <button onClick={backToHome} className="bg-slate-700 p-3 rounded-xl hover:bg-red-500 transition"><LogOut size={20}/></button>
                        <h1 className="text-xl font-black flex items-center gap-2"><Zap className="text-indigo-400"/> حسابات الليزر</h1>
                        <select className="bg-slate-700 text-xs font-black p-2 rounded-xl outline-none" value={period} onChange={e=>setPeriod(e.target.value)}>
                            <option value="all">كل الأوقات</option>
                            <option value="daily">اليوم</option>
                            <option value="monthly">هذا الشهر</option>
                        </select>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8 animate-in fade-in duration-300">
                        <div className="bg-slate-800 p-6 rounded-[2.5rem] border border-slate-700">
                            <div className="text-xs text-slate-400 font-black mb-2 uppercase">إجمالي مبيعات الماكينة</div>
                            <div className="text-3xl font-black text-emerald-400">{stats.income} ج</div>
                        </div>
                        <div className="bg-indigo-600 p-6 rounded-[2.5rem] shadow-xl relative overflow-hidden">
                            <div className="relative z-10">
                                <div className="text-xs text-indigo-100 font-black mb-2 uppercase">نصيب الشريك (50%)</div>
                                <div className="text-4xl font-black text-white mb-4">{stats.partnerShare} ج</div>
                                <button onClick={initiateSettle} className="w-full bg-white/20 hover:bg-white/40 py-3 rounded-xl font-black text-xs flex items-center justify-center gap-2 transition">
                                    <RefreshCcw size={16}/> تصفية وتصفير الحساب
                                </button>
                            </div>
                        </div>
                        <div className="bg-slate-800 p-6 rounded-[2.5rem] border border-slate-700">
                            <div className="text-xs text-slate-400 font-black mb-2 uppercase">الفواتير والمصاريف</div>
                            <div className="text-3xl font-black text-red-400">{stats.billsTotal} ج</div>
                        </div>
                    </div>

                    <div className="bg-slate-800 p-6 rounded-[2.5rem] border border-slate-700">
                        <div className="flex justify-between items-center mb-6">
                            <h3 className="font-black">سجل الفواتير والمصاريف</h3>
                            <button onClick={()=>setShowAddBill(true)} className="bg-indigo-500 p-2 rounded-xl hover:bg-indigo-600 transition"><Plus/></button>
                        </div>
                        <div className="space-y-2 max-h-96 overflow-y-auto scrollbar-hide">
                            {stats.filteredBills.map(b => (
                                <div key={b.id} className="bg-slate-900/50 p-4 rounded-2xl flex justify-between items-center">
                                    <div><div className="font-bold">{b.description}</div><div className="text-[10px] text-slate-500">{b.dateString}</div></div>
                                    <div className="flex items-center gap-4">
                                        <span className="font-black text-red-400">{b.amount} ج</span>
                                        <button onClick={()=>deleteDoc(doc(db,'artifacts',appId,'public','data','laser_bills',b.id))} className="text-slate-600 hover:text-red-500 transition"><Trash2 size={16}/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {showAddBill && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-[100]">
                            <div className="bg-slate-800 p-8 rounded-[2.5rem] w-full max-w-sm border border-slate-600">
                                <h3 className="text-center font-black mb-6">إضافة فاتورة جديدة</h3>
                                <input className="w-full p-3 bg-slate-900 rounded-xl mb-3 text-center font-black" placeholder="المبلغ" type="number" value={billData.amount} onChange={e=>setBillData({...billData, amount:e.target.value})}/>
                                <input className="w-full p-3 bg-slate-900 rounded-xl mb-4 text-center font-black" placeholder="الوصف" value={billData.desc} onChange={e=>setBillData({...billData, desc:e.target.value})}/>
                                <div className="flex gap-2">
                                    <button onClick={async()=>{
                                        if(billData.amount && billData.desc){
                                            await addDoc(collection(db,'artifacts',appId,'public','data','laser_bills'), {
                                                description: billData.desc,
                                                amount: parseFloat(billData.amount),
                                                dateString: today,
                                                createdAt: serverTimestamp()
                                            });
                                            setShowAddBill(false); setBillData({amount:'', desc:''});
                                        }
                                    }} className="flex-1 bg-indigo-600 py-3 rounded-xl font-black">حفظ</button>
                                    <button onClick={()=>setShowAddBill(false)} className="flex-1 bg-slate-700 py-3 rounded-xl font-black">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showSettleConfirm && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-[100]">
                            <div className="bg-slate-800 p-8 rounded-[2.5rem] w-full max-w-sm border border-indigo-500/50 text-center animate-in zoom-in duration-200">
                                <div className="bg-indigo-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-indigo-400">
                                    <AlertTriangle size={32}/>
                                </div>
                                <h3 className="text-xl font-black mb-2">تصفير الحساب؟</h3>
                                <p className="text-slate-400 text-sm font-bold mb-6">
                                    سيتم تصفير الأرباح الحالية ({stats.partnerShare} ج) وبدء حساب جديد. هل أنت متأكد؟
                                </p>
                                <div className="flex gap-2">
                                    <button onClick={confirmSettle} className="flex-1 bg-indigo-600 hover:bg-indigo-700 py-3 rounded-xl font-black transition">نعم، تصفير</button>
                                    <button onClick={()=>setShowSettleConfirm(false)} className="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-black transition">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // =====================================================================
        // === OFFICE SYSTEM
        // =====================================================================
        const OfficeSystem = ({ backToHome, orders, items, expenses, customers, employees, debtPayments, deletedLogs, db, appId, appSettings }) => {
            const [tab, setTab] = useState('sales');
            const [cart, setCart] = useState([]);
            const [amountPaid, setAmountPaid] = useState('');
            const [discount, setDiscount] = useState(''); 
            const [customerName, setCustomerName] = useState('');
            const [customerPhone, setCustomerPhone] = useState('');
            const [selectedEmployee, setSelectedEmployee] = useState(''); 
            const [paymentMethod, setPaymentMethod] = useState('cash');
            const [searchTerm, setSearchTerm] = useState('');
            const [itemsSearch, setItemsSearch] = useState(''); 
            const [activeCategory, setActiveCategory] = useState('all');
            const [showLowStock, setShowLowStock] = useState(false);

            const [isAdminLocked, setIsAdminLocked] = useState(true);
            const [pinEntry, setPinEntry] = useState('');
            const [editingOrder, setEditingOrder] = useState(null);
            const [editAmount, setEditAmount] = useState('');
            const [deleteReason, setDeleteReason] = useState(''); 
            
            // Modals
            const [showAddItem, setShowAddItem] = useState(false);
            const [editingStockItem, setEditingStockItem] = useState(null);
            const [newStockValue, setNewStockValue] = useState('');
            const [passModal, setPassModal] = useState(null); 
            const [passForm, setPassForm] = useState({old: '', new: ''});
            const [payConfirmModal, setPayConfirmModal] = useState(null);
            const [deleteConfirmModal, setDeleteConfirmModal] = useState(null); 
            const [deleteProductModal, setDeleteProductModal] = useState(null);
            const [meterPriceModal, setMeterPriceModal] = useState(false); 
            const [newMeterPrice, setNewMeterPrice] = useState('');
            const [showVaultExpenseModal, setShowVaultExpenseModal] = useState(false); 
            const [vaultExpenseData, setVaultExpenseData] = useState({amount: '', desc: ''});
            const [newEmployeeName, setNewEmployeeName] = useState(''); 
            const [showCommModal, setShowCommModal] = useState(false); 
            const [newCommRate, setNewCommRate] = useState('');
            
            const [showExpensesListModal, setShowExpensesListModal] = useState(false);

            const [itemToAddToOrder, setItemToAddToOrder] = useState(null); 
            const [qtyInput, setQtyInput] = useState('1'); 
            
            const [printModalItem, setPrintModalItem] = useState(null);
            const [printDims, setPrintDims] = useState({l: '', w: ''});
            const [printCount, setPrintCount] = useState('1'); 

            const [reportYear, setReportYear] = useState(new Date().getFullYear().toString());
            const [expandedMonth, setExpandedMonth] = useState(null);

            const [isWholesale, setIsWholesale] = useState(false);
            const [selectedWholesaleId, setSelectedWholesaleId] = useState('');
            const [wholesaleSearch, setWholesaleSearch] = useState(''); 

            const today = new Date().toLocaleDateString('en-CA');

            const headerStats = useMemo(() => {
                const dailyOrders = orders.filter(o => o.dateString === today);
                const dailyExpenses = expenses.filter(e => e.dateString === today).reduce((sum, e) => sum + (e.amount || 0), 0);
                
                const dailyDebtCash = debtPayments.filter(dp => dp.dateString === today && (dp.paymentMethod === 'cash' || !dp.paymentMethod)).reduce((sum, dp) => sum + (dp.amount || 0), 0);
                const dailyDebtWallet = debtPayments.filter(dp => dp.dateString === today && dp.paymentMethod === 'wallet').reduce((sum, dp) => sum + (dp.amount || 0), 0);

                let initialCashIn = 0;
                let initialWalletIn = 0;

                dailyOrders.forEach(o => {
                    const initialPayment = o.initialPaid !== undefined ? o.initialPaid : o.paid; 
                    if (o.paymentMethod === 'cash') initialCashIn += initialPayment;
                    else if (o.paymentMethod === 'wallet') initialWalletIn += initialPayment;
                });
                
                const drawerTotal = (initialCashIn + dailyDebtCash) - dailyExpenses;
                const walletTotal = initialWalletIn + dailyDebtWallet;

                return { drawer: drawerTotal, wallet: walletTotal, total: drawerTotal + walletTotal };
            }, [orders, expenses, debtPayments, today]);

            const availableYears = useMemo(() => {
                const years = new Set([
                    ...orders.map(o => o.dateString.slice(0, 4)),
                    ...expenses.map(e => e.dateString.slice(0, 4)),
                    ...debtPayments.map(d => d.dateString.slice(0, 4)),
                    new Date().getFullYear().toString()
                ]);
                return Array.from(years).sort().reverse();
            }, [orders, expenses, debtPayments]);

            const handleExportInventory = () => {
                const dataStr = JSON.stringify(items, null, 2);
                const blob = new Blob([dataStr], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.download = `paula_inventory_backup_${today}.json`;
                link.href = url;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            const handleImportInventory = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const importedItems = JSON.parse(e.target.result);
                        if (!Array.isArray(importedItems)) throw new Error("Invalid format");
                        
                        if(!window.confirm(`سيتم إضافة ${importedItems.length} صنف إلى المخزن. هل أنت متأكد؟`)) return;

                        let count = 0;
                        for (const itemData of importedItems) {
                            const exists = items.some(i => i.name === itemData.name);
                            if (!exists) {
                                const { id, ...data } = itemData;
                                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'inventory'), data);
                                count++;
                            }
                        }
                        alert(`تم استيراد ${count} صنف جديد بنجاح (تم تجاهل المكرر) ✅`);
                    } catch (err) {
                        alert("حدث خطأ أثناء قراءة الملف. تأكد من أنه ملف JSON صالح.");
                    }
                };
                reader.readAsText(file);
                event.target.value = '';
            };

            const executeDeleteProduct = async () => {
                if(!deleteProductModal) return;
                try {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'inventory', deleteProductModal.id));
                    setDeleteProductModal(null);
                    alert("تم حذف المنتج نهائياً ✅");
                } catch(e) {
                    alert("حدث خطأ أثناء الحذف");
                }
            };

            const handleItemClick = (item) => {
                if (item.name === 'متر طباعه خامه') {
                    setPrintModalItem(item);
                    setPrintDims({l: '', w: ''});
                    setPrintCount('1'); 
                } else {
                    setItemToAddToOrder(item);
                    setQtyInput('1');
                }
            };

            const handleAddPrintItem = () => {
                const l = parseFloat(printDims.l);
                const w = parseFloat(printDims.w);
                const c = parseInt(printCount) || 1; 
                
                if (!l || !w) return alert("أدخل الطول والعرض");
                
                const singleArea = l * w;
                const totalArea = singleArea * c; 
                const unitPrice = appSettings.meterPrice || 250;
                
                setCart([...cart, {
                    ...printModalItem,
                    name: `متر طباعه خامه (${l}م x ${w}م) - عدد ${c}`,
                    qty: totalArea.toFixed(2), 
                    currentPrice: unitPrice,
                    isPrinting: true
                }]);
                setPrintModalItem(null);
            };

            const handleAddItemToCart = () => {
                if (!itemToAddToOrder) return;
                const qty = parseInt(qtyInput);
                if (qty > 0) {
                    const price = isWholesale ? (itemToAddToOrder.wholesalePrice || itemToAddToOrder.price) : itemToAddToOrder.price;
                    const existingItemIndex = cart.findIndex(c => c.id === itemToAddToOrder.id);
                    if (existingItemIndex > -1) {
                        const newCart = [...cart];
                        newCart[existingItemIndex].qty += qty;
                        setCart(newCart);
                    } else {
                        setCart([...cart, {...itemToAddToOrder, qty, currentPrice: price}]);
                    }
                }
                setItemToAddToOrder(null);
                setQtyInput('1');
            };

            const handleCheckout = async () => {
                if(!cart.length) return alert("السلة فارغة");
                if(!customerName.trim()) return alert("يجب إدخال اسم العميل!");
                if(!selectedEmployee) return alert("يجب اختيار اسم الموظف!");

                const subTotal = cart.reduce((a,b)=>a+(b.currentPrice*b.qty),0);
                const discountVal = parseFloat(discount) || 0;
                const total = Math.max(0, subTotal - discountVal); 
                const paid = parseFloat(amountPaid)||0;

                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), {
                    items: cart, 
                    subTotal, 
                    discount: discountVal,
                    total, 
                    paid, 
                    remaining: total-paid, 
                    initialPaid: paid, 
                    customerName, 
                    customerPhone, 
                    employeeName: selectedEmployee, 
                    paymentMethod,
                    customerId: selectedWholesaleId || null,
                    dateString: today, monthString: today.slice(0, 7),
                    createdAt: serverTimestamp()
                });
                
                for(let i of cart) {
                    if(!i.isPrinting) await updateDoc(doc(db,'artifacts',appId,'public','data','inventory',i.id), {stock: increment(-i.qty)});
                }
                setCart([]); setAmountPaid(''); setDiscount(''); setCustomerName(''); setCustomerPhone(''); setSelectedWholesaleId(''); setSelectedEmployee(''); alert("تم حفظ الطلب ✅");
            };

            const executeQuickPay = async (method) => {
                if(!payConfirmModal) return;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', payConfirmModal.id), {
                        paid: payConfirmModal.total,
                        remaining: 0
                    });
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'debt_payments'), {
                        amount: payConfirmModal.remaining,
                        orderId: payConfirmModal.id,
                        customerName: payConfirmModal.customerName,
                        paymentMethod: method, 
                        dateString: today, 
                        createdAt: serverTimestamp()
                    });

                    setPayConfirmModal(null);
                    alert(`تم استلام المبلغ (${method === 'cash' ? 'نقدي' : 'محفظة'}) وإضافته لحساب اليوم ✅`);
                } catch(e) { alert("حدث خطأ"); }
            };

            const executeDeleteOrder = async () => {
                if(!deleteConfirmModal) return;
                if(!deleteReason.trim()) return alert("يجب كتابة سبب الحذف!");

                try {
                    const orderId = deleteConfirmModal.id;
                    
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'deleted_logs'), {
                        orderId: orderId,
                        customerName: deleteConfirmModal.customerName,
                        total: deleteConfirmModal.total,
                        reason: deleteReason,
                        deletedAt: serverTimestamp(),
                        dateString: today
                    });

                    const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'debt_payments'), where('orderId', '==', orderId));
                    const snapshot = await getDocs(q);
                    
                    const deletePromises = snapshot.docs.map(d => deleteDoc(d.ref));
                    await Promise.all(deletePromises);
            
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', orderId));
                    
                    setDeleteConfirmModal(null);
                    setDeleteReason(''); 
                    alert("تم حذف الطلب وتصحيح الحسابات بنجاح ✅");
                } catch(e) {
                    console.error(e);
                    setDeleteConfirmModal(null);
                    alert("حدث خطأ أثناء الحذف");
                }
            };

            const handleUpdateOrder = async () => {
                if(!editingOrder) return;
                const paid = parseFloat(editAmount);
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', editingOrder.id), {
                    paid: paid,
                    remaining: editingOrder.total - paid
                });
                setEditingOrder(null); setEditAmount(''); alert("تم تعديل الفاتورة ✅");
            };
            
            const handleAddVaultExpense = async () => {
                if(vaultExpenseData.amount && vaultExpenseData.desc){
                    await addDoc(collection(db,'artifacts',appId,'public','data','expenses'), {
                        description: vaultExpenseData.desc + " (من الخزنة)",
                        amount: parseFloat(vaultExpenseData.amount),
                        dateString: today,
                        createdAt: serverTimestamp()
                    });
                    setShowVaultExpenseModal(false); setVaultExpenseData({amount:'', desc:''});
                    alert("تم إضافة المصروف للخزنة بنجاح ✅");
                }
            };
            
            const handleAddEmployee = async () => {
                if(newEmployeeName.trim()) {
                    await addDoc(collection(db,'artifacts',appId,'public','data','employees'), { name: newEmployeeName });
                    setNewEmployeeName('');
                    alert("تم إضافة الموظف بنجاح ✅");
                }
            };

            const handleUpdateCommRate = async () => {
                if(!newCommRate) return;
                await setDoc(doc(db,'artifacts',appId,'public','data','app_settings','general'), {...appSettings, commissionRate: parseFloat(newCommRate)});
                setShowCommModal(false);
                alert("تم تحديث نسبة العمولة بنجاح ✅");
            };

            const [editingExpense, setEditingExpense] = useState(null);
            const handleUpdateExpense = async () => {
                if(!editingExpense) return;
                try {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'expenses', editingExpense.id), {
                        amount: parseFloat(editingExpense.amount),
                        description: editingExpense.description
                    });
                    setEditingExpense(null);
                    alert("تم تعديل المصروف بنجاح ✅");
                } catch(e) { alert("حدث خطأ"); }
            };

            const handlePassChange = async () => {
                if(!passModal) return;
                const target = passModal;
                const currentPin = String(target === 'vault' ? (appSettings.vaultPin || '3316') : appSettings[target]);
                const inputOld = String(passForm.old);

                if(inputOld !== currentPin) return alert("خطأ: الرقم السري الحالي غير صحيح! ❌");
                if(passForm.new.length < 4) return alert("خطأ: الرقم الجديد قصير جداً!");
                
                try {
                    const updateField = target === 'vault' ? 'vaultPin' : target;
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'app_settings', 'general');
                    await updateDoc(docRef, { [updateField]: passForm.new });
                    alert(`تم تغيير رقم سري ${target === 'office' ? 'المكتب' : target === 'laser' ? 'الليزر' : 'الخزنة'} بنجاح ✅`);
                    setPassModal(null); setPassForm({old: '', new: ''});
                } catch (e) {
                    alert("حدث خطأ أثناء التحديث");
                }
            };
            
            const handleUpdateMeterPrice = async () => {
                if(!newMeterPrice) return;
                await setDoc(doc(db,'artifacts',appId,'public','data','app_settings','general'), {...appSettings, meterPrice: parseFloat(newMeterPrice)});
                setMeterPriceModal(false);
                alert("تم تحديث سعر المتر بنجاح ✅");
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 p-4 md:p-8 font-sans" dir="rtl">
                    <div className="flex flex-col xl:flex-row justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm border border-slate-100 gap-4">
                        <div className="flex items-center gap-3 w-full md:w-auto justify-between md:justify-start">
                            <div className="flex items-center gap-2">
                                <button onClick={backToHome} className="bg-slate-100 p-3 rounded-xl text-red-500 hover:bg-red-500 hover:text-white transition"><LogOut size={20}/></button>
                                <h1 className="font-black text-lg hidden md:block">مكتب بولا</h1>
                            </div>
                            <div className="flex gap-2 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                                <div className="flex items-center gap-2 px-3 py-1 bg-emerald-100/50 text-emerald-700 rounded-xl">
                                    <Banknote size={18}/>
                                    <div className="text-xs font-black">
                                        <span className="block text-[9px] text-emerald-500 uppercase">الدرج (اليوم)</span>
                                        {headerStats.drawer} ج
                                    </div>
                                </div>
                                <div className="flex items-center gap-2 px-3 py-1 bg-blue-100/50 text-blue-700 rounded-xl">
                                    <Smartphone size={18}/>
                                    <div className="text-xs font-black">
                                        <span className="block text-[9px] text-blue-500 uppercase">محفظة</span>
                                        {headerStats.wallet} ج
                                    </div>
                                </div>
                                <div className="flex items-center gap-2 px-3 py-1 bg-indigo-100/50 text-indigo-700 rounded-xl">
                                    <TrendingUp size={18}/>
                                    <div className="text-xs font-black">
                                        <span className="block text-[9px] text-indigo-500 uppercase">الإجمالي اليومي</span>
                                        {headerStats.total} ج
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="flex gap-1 overflow-x-auto scrollbar-hide w-full xl:w-auto p-1">
                            {[
                                {id:'sales', n:'البيع', i:<ShoppingCart size={14}/>},
                                {id:'orders', n:'الطلبات', i:<Search size={14}/>},
                                {id:'warehouse', n:'المخزن', i:<Package size={14}/>},
                                {id:'customers', n:'العملاء', i:<Users size={14}/>},
                                {id:'expenses', n:'المصاريف', i:<MinusCircle size={14}/>},
                                {id:'admin', n:'الخزنة', i:<Lock size={14}/>},
                                {id:'settings', n:'الإعدادات', i:<Settings size={14}/>}
                            ].map(t => (
                                <button key={t.id} onClick={()=>setTab(t.id)} className={`px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 whitespace-nowrap transition ${tab===t.id?'bg-emerald-600 text-white shadow-lg':'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>
                                    {t.i} {t.n}
                                </button>
                            ))}
                        </div>
                    </div>

                    {tab === 'sales' && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in fade-in duration-300">
                            <div className="lg:col-span-2">
                                <div className="flex gap-2 mb-4 flex-wrap">
                                    <div className="flex flex-1 gap-2 bg-white p-2 rounded-2xl border border-slate-100 shadow-sm min-w-[200px]">
                                        <button onClick={()=>{setIsWholesale(false); setSelectedWholesaleId('');}} className={`flex-1 py-3 rounded-xl font-black transition ${!isWholesale?'bg-emerald-600 text-white shadow-md':'text-slate-400 hover:bg-slate-50'}`}>قطاعي</button>
                                        <button onClick={()=>setIsWholesale(true)} className={`flex-1 py-3 rounded-xl font-black transition ${isWholesale?'bg-amber-600 text-white shadow-md':'text-slate-400 hover:bg-slate-50'}`}>جملة</button>
                                    </div>
                                    <div className="flex gap-1 overflow-x-auto scrollbar-hide bg-white p-2 rounded-2xl border border-slate-100 shadow-sm flex-1">
                                        {[
                                            {id: 'all', n: 'الكل', i: <Layers size={14}/>},
                                            {id: 'laser', n: 'ليزر', i: <Zap size={14}/>},
                                            {id: 'printing', n: 'خامات طباعة', i: <Camera size={14}/>},
                                            {id: 'other', n: 'أخرى', i: <Package size={14}/>},
                                        ].map(cat => (
                                            <button 
                                                key={cat.id} 
                                                onClick={()=>setActiveCategory(cat.id)}
                                                className={`px-3 py-2 rounded-xl text-xs font-black flex items-center gap-1 whitespace-nowrap transition ${activeCategory===cat.id ? 'bg-slate-800 text-white' : 'bg-slate-50 text-slate-500'}`}
                                            >
                                                {cat.i} {cat.n}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="relative mb-4">
                                    <Search className="absolute right-4 top-3 text-slate-400" size={20}/>
                                    <input className="w-full p-3 pr-12 bg-white rounded-2xl shadow-sm outline-none font-black border border-slate-100 focus:border-emerald-500 transition" placeholder="بحث عن منتج..." value={itemsSearch} onChange={e=>setItemsSearch(e.target.value)}/>
                                </div>
                                
                                {isWholesale && (
                                    <div className="mb-4 bg-amber-50 p-4 rounded-2xl border border-amber-200">
                                        <label className="text-xs font-black text-amber-600 mb-2 block">اختر عميل الجملة:</label>
                                        <div className="relative mb-2">
                                            <Search className="absolute right-3 top-1/2 -translate-y-1/2 text-amber-400" size={16}/>
                                            <input 
                                                className="w-full p-2 pr-9 rounded-xl font-bold bg-white outline-none border border-amber-200 text-sm focus:border-amber-400 transition" 
                                                placeholder="ابحث عن اسم العميل هنا..." 
                                                value={wholesaleSearch}
                                                onChange={e => setWholesaleSearch(e.target.value)}
                                            />
                                        </div>
                                        <select className="w-full p-3 rounded-xl font-black bg-white outline-none border border-amber-200 focus:border-amber-400 transition" value={selectedWholesaleId} onChange={(e)=>{
                                            const c = customers.find(x=>x.id===e.target.value);
                                            if(c) { setCustomerName(c.name); setCustomerPhone(c.phone); setSelectedWholesaleId(c.id); }
                                            else { setCustomerName(''); setCustomerPhone(''); setSelectedWholesaleId(''); }
                                        }}>
                                            <option value="">-- اختر العميل من القائمة --</option>
                                            {customers.filter(c => c.name.includes(wholesaleSearch)).map(c=><option key={c.id} value={c.id}>{c.name}</option>)}
                                        </select>
                                    </div>
                                )}

                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {items.filter(i => {
                                        const matchSearch = i.name.includes(itemsSearch);
                                        let matchCat = true;
                                        if (activeCategory === 'laser') matchCat = i.isLaser;
                                        else if (activeCategory === 'printing') matchCat = i.isPrintingMaterial;
                                        else if (activeCategory === 'other') matchCat = !i.isLaser && !i.isPrintingMaterial;
                                        return matchSearch && matchCat;
                                    }).map(item => {
                                        const price = isWholesale ? (item.wholesalePrice || item.price) : item.price;
                                        return (
                                            <button key={item.id} onClick={()=> handleItemClick(item)} className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm hover:shadow-md transition text-center relative group">
                                                <div className="font-black text-slate-800 mb-1">{item.name}</div>
                                                <div className={`font-black text-xl ${isWholesale ? 'text-amber-600' : 'text-emerald-600'}`}>{price} ج</div>
                                                {item.isLaser && <Zap size={14} className="absolute top-4 left-4 text-amber-500"/>}
                                                {item.isPrintingMaterial && <Camera size={14} className="absolute top-4 left-4 text-blue-500"/>}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                            
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-emerald-50 h-fit sticky top-6">
                                <h3 className="font-black mb-4 flex items-center gap-2"><ShoppingCart size={18}/> السلة ({isWholesale ? 'جملة' : 'قطاعي'})</h3>
                                <div className="space-y-2 mb-6 max-h-48 overflow-y-auto scrollbar-hide">
                                    {cart.map((c,idx) => (
                                        <div key={idx} className="flex justify-between text-xs font-bold bg-slate-50 p-3 rounded-xl">
                                            <span className="truncate flex-1">{c.name} <span className="text-emerald-600 font-bold">x{c.qty}</span></span>
                                            <span>{c.currentPrice * c.qty}ج</span>
                                            <button onClick={()=>setCart(cart.filter((_,i)=>i!==idx))} className="text-red-500 mr-2"><X size={16}/></button>
                                        </div>
                                    ))}
                                </div>
                                <div className="text-3xl font-black text-center mb-6 text-emerald-800 bg-emerald-50 py-4 rounded-2xl">
                                     {(cart.reduce((a,b)=>a+(b.currentPrice*b.qty),0) - (parseFloat(discount)||0)).toFixed(0)} ج
                                </div>
                                <div className="space-y-2">
                                     <div className="flex items-center gap-2 bg-slate-100 rounded-xl p-1 mb-2">
                                        <Percent size={16} className="text-slate-400 ml-2"/>
                                        <input className="w-full p-2 bg-transparent text-center font-black outline-none" placeholder="خصم (اختياري)" type="number" value={discount} onChange={e=>setDiscount(e.target.value)}/>
                                     </div>

                                     <input className="w-full p-3 bg-slate-100 rounded-xl text-center font-black border-2 border-transparent focus:border-emerald-500 outline-none" placeholder="المدفوع" type="number" value={amountPaid} onChange={e=>setAmountPaid(e.target.value)}/>
                                     <input className="w-full p-3 bg-slate-100 rounded-xl text-center font-black outline-none border-2 border-slate-200 focus:border-emerald-500" placeholder="اسم العميل (اجباري)" value={customerName} onChange={e=>setCustomerName(e.target.value)}/>
                                     <input className="w-full p-3 bg-slate-100 rounded-xl text-center font-black outline-none" placeholder="رقم الهاتف (واتساب)" type="tel" value={customerPhone} onChange={e=>setCustomerPhone(e.target.value)}/>
                                     
                                     <div className="relative">
                                         <UserCheck className="absolute top-3 left-3 text-slate-400" size={18}/>
                                         <select 
                                            className="w-full p-3 pl-10 bg-slate-100 rounded-xl text-center font-black outline-none border-2 border-transparent focus:border-emerald-500 appearance-none"
                                            value={selectedEmployee}
                                            onChange={e=>setSelectedEmployee(e.target.value)}
                                         >
                                             <option value="">-- اختر الموظف (اجباري) --</option>
                                             {employees.map(emp => <option key={emp.id} value={emp.name}>{emp.name}</option>)}
                                         </select>
                                     </div>

                                     <div className="flex gap-2">
                                        <button onClick={()=>setPaymentMethod('cash')} className={`flex-1 py-2 rounded-lg text-xs font-black ${paymentMethod==='cash'?'bg-emerald-600 text-white shadow-md':'bg-slate-100'}`}>نقدي</button>
                                        <button onClick={()=>setPaymentMethod('wallet')} className={`flex-1 py-2 rounded-lg text-xs font-black ${paymentMethod==='wallet'?'bg-blue-600 text-white shadow-md':'bg-slate-100'}`}>محفظة</button>
                                     </div>
                                     <button onClick={handleCheckout} className="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-xl hover:bg-emerald-700 transition">حفظ الفاتورة</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'orders' && (
                        <div className="space-y-6 animate-in slide-in-from-bottom duration-300">
                            <div className="relative">
                                <Search className="absolute right-4 top-3 text-slate-400" size={20}/>
                                <input className="w-full p-3 pr-12 bg-white rounded-2xl shadow-sm outline-none font-black border border-slate-100 focus:border-emerald-500 transition" placeholder="بحث باسم العميل أو رقم الموبايل..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}/>
                            </div>

                            <div className="bg-red-50 p-6 rounded-[2.5rem] border border-red-100">
                                <h3 className="font-black text-red-800 mb-4 flex items-center gap-2"><MinusCircle size={18}/> مصروفات اليوم ({expenses.filter(e=>e.dateString===today).reduce((s,e)=>s+e.amount,0)} ج)</h3>
                                <div className="space-y-2 max-h-32 overflow-y-auto scrollbar-hide">
                                    {expenses.filter(e=>e.dateString===today).length === 0 ? <p className="text-center text-red-300 font-black text-xs">لا توجد مصاريف اليوم</p> : 
                                     expenses.filter(e=>e.dateString===today).map(e=>(
                                        <div key={e.id} className="flex justify-between items-center bg-white p-3 rounded-xl shadow-sm group">
                                            <div>
                                                <div className="font-bold text-slate-700 text-xs">{e.description}</div>
                                                <div className="font-black text-red-600 text-xs">{e.amount} ج</div>
                                            </div>
                                            <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition">
                                                <button onClick={()=>setEditingExpense(e)} className="p-2 bg-blue-50 text-blue-500 rounded-lg hover:bg-blue-100"><Edit size={12}/></button>
                                                <button onClick={()=>deleteDoc(doc(db,'artifacts',appId,'public','data','expenses',e.id))} className="p-2 bg-red-50 text-red-500 rounded-lg hover:bg-red-100"><Trash2 size={12}/></button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {orders.filter(o => o.customerName.includes(searchTerm) || (o.customerPhone && o.customerPhone.includes(searchTerm))).map(order => (
                                    <div key={order.id} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm relative group overflow-hidden">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <div className="font-black text-lg">{order.customerName}</div>
                                                <div className="text-[10px] text-slate-400 font-bold">{order.dateString}</div>
                                                {order.employeeName && <div className="text-[10px] text-indigo-500 font-bold mt-1 bg-indigo-50 px-2 py-1 rounded-lg w-fit">بواسطة: {order.employeeName}</div>}
                                            </div>
                                            <button onClick={()=>setDeleteConfirmModal(order)} className="text-slate-200 group-hover:text-red-500 transition"><Trash2 size={16}/></button>
                                        </div>
                                        <div className="space-y-1 mb-6 text-[11px] font-bold text-slate-500 bg-slate-50 p-3 rounded-2xl border border-slate-100 max-h-24 overflow-y-auto">
                                            {order.items.map((i,idx)=><div key={idx} className="flex justify-between"><span>• {i.name} {i.isPrinting ? `(${i.qty}م²)` : `(x${i.qty})`}</span><span>{Math.ceil(i.qty*i.currentPrice)} ج</span></div>)}
                                        </div>

                                                        <div className="text-xs text-emerald-600 font-black mb-2 uppercase">دخل سنة {reportYear}</div>
                                                        <div className="text-3xl font-black text-emerald-800">{totalInc} ج</div>
                                                    </div>
                                                    <div className="p-6 bg-red-50 rounded-[2rem] border border-red-100 text-center">
                                                        <div className="text-xs text-red-600 font-black mb-2 uppercase">مصاريف سنة {reportYear}</div>
                                                        <div className="text-3xl font-black text-red-800">{totalExp} ج</div>
                                                    </div>
                                                    <div className="p-6 bg-slate-100 rounded-[2rem] border border-slate-200 text-center">
                                                        <div className="text-xs text-slate-500 font-black mb-2 uppercase">صافي ربح السنة</div>
                                                        <div className="text-3xl font-black text-slate-800">{totalInc - totalExp} ج</div>
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                                    {Array.from({length: 12}, (_, i) => {
                                                        const monthNum = (i + 1).toString().padStart(2, '0');
                                                        const monthKey = `${reportYear}-${monthNum}`;
                                                        const mOrders = yearOrders.filter(o => o.dateString.startsWith(monthKey));
                                                        const mExpenses = yearExpenses.filter(e => e.dateString.startsWith(monthKey));
                                                        const mDebtPays = yearDebtPays.filter(dp => dp.dateString.startsWith(monthKey));

                                                        const mInc = mOrders.reduce((s,o) => s + (o.initialPaid !== undefined ? o.initialPaid : o.paid), 0) 
                                                                     + mDebtPays.reduce((s,d) => s + d.amount, 0);
                                                        const mExp = mExpenses.reduce((s,e)=>s+e.amount,0);
                                                        const mNet = mInc - mExp;
                                                        const monthName = new Date(reportYear, i).toLocaleString('ar-EG', { month: 'long' });
                                                        const isExpanded = expandedMonth === i;
                                                        const isEmpty = mInc === 0 && mExp === 0;

                                                        return (
                                                            <div key={i} className={`bg-slate-50 rounded-[2rem] border transition-all overflow-hidden ${isExpanded ? 'col-span-1 md:col-span-2 lg:col-span-3 border-emerald-500 shadow-md ring-2 ring-emerald-100' : 'border-slate-100 hover:shadow-md'} ${isEmpty ? 'opacity-50 grayscale' : ''}`}>
                                                                <div 
                                                                    className="p-6 cursor-pointer flex justify-between items-center"
                                                                    onClick={() => setExpandedMonth(isExpanded ? null : i)}
                                                                >
                                                                    <div className="flex items-center gap-3">
                                                                        <div className="bg-white p-3 rounded-xl font-black text-lg text-slate-800 shadow-sm border border-slate-100 w-12 h-12 flex items-center justify-center">{i+1}</div>
                                                                        <div className="font-black text-lg text-slate-700">{monthName}</div>
                                                                    </div>
                                                                    <div className="text-left">
                                                                        <div className={`text-xl font-black ${mNet >= 0 ? 'text-emerald-600' : 'text-red-500'}`}>{mNet} ج</div>
                                                                        <div className="text-[10px] text-slate-400 font-bold">د: {mInc} | ص: {mExp}</div>
                                                                    </div>
                                                                </div>
                                                                
                                                                {isExpanded && (
                                                                    <div className="bg-white border-t border-slate-100 p-6 animate-in slide-in-from-top duration-300">
                                                                        <h4 className="text-xs font-black text-slate-400 mb-4 text-center uppercase tracking-wider">تفاصيل أيام شهر {monthName}</h4>
                                                                        {isEmpty ? (
                                                                            <div className="text-center text-slate-300 font-black py-4">لا توجد حركات في هذا الشهر</div>
                                                                        ) : (
                                                                            <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3">
                                                                                {Array.from(new Set([...mOrders.map(o=>o.dateString), ...mExpenses.map(e=>e.dateString), ...mDebtPays.map(d=>d.dateString)])).sort().map(date => {
                                                                                    const dO = mOrders.filter(o=>o.dateString===date).reduce((s,o)=>s+(o.initialPaid !== undefined ? o.initialPaid : o.paid),0);
                                                                                    const dDP = mDebtPays.filter(dp=>dp.dateString===date).reduce((s,d)=>s+d.amount,0);
                                                                                    const dE = mExpenses.filter(e=>e.dateString===date).reduce((s,e)=>s+e.amount,0);
                                                                                    
                                                                                    const dayInc = dO + dDP;

                                                                                    return (
                                                                                        <div 
                                                                                            key={date} 
                                                                                            className={`p-3 rounded-2xl text-center border cursor-pointer transition relative bg-slate-50 border-slate-100 hover:border-emerald-200`}
                                                                                        >
                                                                                            <div className={`text-[10px] font-black mb-1 text-slate-400`}>{date.split('-')[2]} / {date.split('-')[1]}</div>
                                                                                            <div className={`text-sm font-black mb-1 text-emerald-600`}>+{dayInc}</div>
                                                                                            <div className={`text-sm font-black text-red-500`}>-{dE}</div>
                                                                                            <div className={`border-t mt-2 pt-1 text-xs font-black border-slate-200 text-slate-800`}>{dayInc - dE} ج</div>
                                                                                        </div>
                                                                                    );
                                                                                })}
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        );
                                    })()}
                                </div>
                            )}
                        </div>
                    )}

                    {showAddItem && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">

                                             else { el.classList.add('border-indigo-500', 'bg-indigo-50'); document.getElementById('ni-isprinting')?.classList.remove('border-blue-500', 'bg-blue-50'); }

                                          id="ni-isprinting"

                                             if(el.classList.contains('border-blue-500')) el.classList.remove('border-blue-500', 'bg-blue-50');

                                          }}>

                                     </div>
                                </div>

                                    const isL = document.getElementById('ni-islaser').classList.contains('border-indigo-500');
                                    const isP = document.getElementById('ni-isprinting').classList.contains('border-blue-500');
                                    
                                    if(n&&p) {
                                        await addDoc(collection(db,'artifacts',appId,'public', 'data', 'inventory'), {
                                            name:n, price:parseFloat(p), wholesalePrice: parseFloat(w) || parseFloat(p), stock:parseInt(s)||0, isLaser:isL, isPrintingMaterial: isP

                                        setShowAddItem(false); alert("تم إضافة الصنف بنجاح ✅");
                                    } else { alert("يرجى إدخال الاسم والسعر على الأقل"); }
                                }} className="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-lg shadow-xl hover:bg-slate-800 transition">حفظ الصنف</button>
                            </div>
                        </div>

                                </div>
                            </div>

                    {deleteProductModal && (
                        <div className="fixed inset-0 bg-black/90 flex items-center justify-center p-4 z-[100]">
                            <div className="bg-slate-800 p-8 rounded-[2.5rem] w-full max-w-sm border border-red-500/50 text-center animate-in zoom-in duration-200">
                                <div className="bg-red-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-red-400">
                                    <AlertTriangle size={32}/>
                                </div>
                                <h3 className="text-xl font-black mb-2 text-white">حذف المنتج نهائياً؟</h3>
                                <p className="text-slate-400 text-sm font-bold mb-6">
                                    هل أنت متأكد من حذف "{deleteProductModal.name}"؟ لا يمكن التراجع عن هذا الإجراء.
                                </p>
                                <div className="flex gap-2">
                                    <button onClick={executeDeleteProduct} className="flex-1 bg-red-600 hover:bg-red-700 py-3 rounded-xl font-black transition text-white">نعم، احذف</button>
                                    <button onClick={()=>setDeleteProductModal(null)} className="flex-1 bg-slate-700 hover:bg-slate-600 py-3 rounded-xl font-black transition text-white">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showVaultExpenseModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-800 p-8 rounded-[2.5rem] w-full max-w-sm border border-slate-600 text-center animate-in zoom-in duration-200">
                                <div className="bg-red-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-red-400">
                                    <MinusCircle size={32}/>
                                </div>
                                <h3 className="text-xl font-black mb-6 text-white">إضافة فاتورة بضاعة (للخزنة)</h3>
                                <input className="w-full p-4 bg-slate-900 rounded-2xl mb-4 text-center text-white font-black outline-none border-2 border-transparent focus:border-red-500" placeholder="المبلغ" type="number" value={vaultExpenseData.amount} onChange={e=>setVaultExpenseData({...vaultExpenseData, amount:e.target.value})}/>
                                <input className="w-full p-4 bg-slate-900 rounded-2xl mb-6 text-center text-white font-black outline-none border-2 border-transparent focus:border-red-500" placeholder="وصف المصروف" value={vaultExpenseData.desc} onChange={e=>setVaultExpenseData({...vaultExpenseData, desc:e.target.value})}/>
                                <div className="flex gap-2">
                                    <button onClick={handleAddVaultExpense} className="flex-1 bg-red-600 text-white py-3 rounded-xl font-black shadow-lg hover:bg-red-700 transition">حفظ</button>
                                    <button onClick={()=>{setShowVaultExpenseModal(false); setVaultExpenseData({amount:'', desc:''});}} className="flex-1 bg-slate-700 text-slate-300 py-3 rounded-xl font-black hover:bg-slate-600 transition">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showExpensesListModal && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white p-8 rounded-[3rem] w-full max-w-2xl shadow-2xl relative animate-in zoom-in duration-200 h-[80vh] flex flex-col">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-2xl font-black text-slate-800 flex items-center gap-2"><FileText className="text-orange-500"/> سجل المصروفات التفصيلي ({reportYear})</h3>
                                    <button onClick={()=>setShowExpensesListModal(false)} className="text-slate-400 hover:text-red-500"><X size={24}/></button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto scrollbar-hide pr-2">
                                    {Array.from({length: 12}, (_, i) => {
                                        const monthNum = (i + 1).toString().padStart(2, '0');
                                        const monthKey = `${reportYear}-${monthNum}`;
                                        const monthExpenses = expenses.filter(e => e.dateString.startsWith(monthKey));
                                        
                                        if (monthExpenses.length === 0) return null;

                                        const monthTotal = monthExpenses.reduce((s,e)=>s+e.amount,0);
                                        const monthName = new Date(reportYear, i).toLocaleString('ar-EG', { month: 'long' });

                                        return (
                                            <div key={i} className="mb-6">
                                                <div className="flex justify-between items-center bg-orange-50 p-4 rounded-2xl mb-2 sticky top-0 z-10">
                                                    <span className="font-black text-orange-800">شهر {monthName}</span>
                                                    <span className="font-black text-red-600 bg-white px-3 py-1 rounded-lg shadow-sm">إجمالي: {monthTotal} ج</span>
                                                </div>
                                                <div className="space-y-2">
                                                    {monthExpenses.map(exp => (
                                                        <div key={exp.id} className="flex justify-between items-center bg-white border border-slate-100 p-3 rounded-xl hover:shadow-sm transition">
                                                            <div>
                                                                <div className="text-xs text-slate-400 font-bold mb-1">{exp.dateString}</div>
                                                                <div className="text-sm font-black text-slate-700">{exp.description}</div>
                                                            </div>
                                                            <div className="text-red-500 font-black">{exp.amount} ج</div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        );
                                    })}
                                    {expenses.filter(e => e.dateString.startsWith(reportYear)).length === 0 && (
                                        <div className="text-center text-slate-400 font-black py-10">لا توجد مصروفات مسجلة لهذه السنة</div>
                                    )}
                                </div>
                            </div>
                        </div>
                    )}

                    {editingOrder && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[2.5rem] p-8 w-full max-w-sm shadow-2xl relative">
                                <h3 className="font-black text-center mb-6 text-xl">تعديل المبلغ المدفوع</h3>
                                <div className="bg-slate-50 p-4 rounded-2xl mb-6 text-center">
                                    <div className="text-xs text-slate-400 font-bold mb-1">إجمالي الفاتورة</div>
                                    <div className="text-2xl font-black text-slate-800">{editingOrder.total} ج</div>
                                </div>
                                <label className="text-xs font-black text-slate-500 mb-2 block mr-2">المبلغ المدفوع الحالي:</label>
                                <input className="w-full p-4 bg-slate-100 rounded-2xl mb-6 text-center font-black text-xl border-2 border-transparent focus:border-blue-500 outline-none" type="number" value={editAmount} onChange={e=>setEditAmount(e.target.value)}/>
                                <div className="flex gap-2">
                                    <button onClick={handleUpdateOrder} className="flex-1 bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg">تحديث</button>
                                    <button onClick={()=>setEditingOrder(null)} className="flex-1 bg-slate-100 text-slate-500 py-4 rounded-xl font-black">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
