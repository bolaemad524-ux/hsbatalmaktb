<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام استوديو بولا V23.2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #0f172a; color: white; margin: 0; touch-action: manipulation; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #3b82f6; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        input, select { color: black !important; }
    </style>
</head>
<body>
    
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: #0f172a;">
            <div class="loader"></div>
            <div style="font-size: 18px; font-weight: bold; color: #94a3b8;">جاري تحميل نظام استوديو بولا V23.2...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyCz87t17ecgYHmHJHOtCBU7vYneWy6iJI8",
          authDomain: "paula-studio-18709.firebaseapp.com",
          projectId: "paula-studio-18709",
          storageBucket: "paula-studio-18709.firebasestorage.app",
          messagingSenderId: "827466426934",
          appId: "1:827466426934:web:e6ef20d3598427ea538697"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appPath = 'paula-studio-v23'; 

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
          const [user, setUser] = useState(null);
          const [loading, setLoading] = useState(true);
          const [view, setView] = useState('landing');
          const [authMode, setAuthMode] = useState(null);
          const [pin, setPin] = useState('');
          const [error, setError] = useState(null);
          const [settings, setSettings] = useState({ laser: '941997', office: '0128', vaultPin: '3316', meterPrice: 250, commissionRate: 1 });

          const [items, setItems] = useState([]);
          const [orders, setOrders] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [employees, setEmployees] = useState([]);
          const [laserBills, setLaserBills] = useState([]);
          const [debtPayments, setDebtPayments] = useState([]);

          useEffect(() => {
            auth.signInAnonymously().catch(err => {
                // هنا بنطبع رسالة سيرفر جوجل الحقيقية
                setError(`رسالة سيرفر جوجل: ${err.message}`);
                setLoading(false);
            });
            auth.onAuthStateChanged(u => { setUser(u); if(u) setLoading(false); });
          }, []);

          useEffect(() => {
            if (!user) return;
            const rootRef = db.collection('artifacts').doc(appPath).collection('public').doc('data');

            const subs = [
                rootRef.collection('app_settings').doc('general').onSnapshot(s => s.exists && setSettings(prev => ({...prev, ...s.data()}))),
                rootRef.collection('inventory').onSnapshot(s => setItems(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('orders').orderBy('createdAt', 'desc').onSnapshot(s => setOrders(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('expenses').onSnapshot(s => setExpenses(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('employees').onSnapshot(s => setEmployees(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('laser_bills').orderBy('createdAt', 'desc').onSnapshot(s => setLaserBills(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('debt_payments').onSnapshot(s => setDebtPayments(s.docs.map(d=>({id:d.id, ...d.data()})))),
            ];
            return () => subs.forEach(fn => fn());
          }, [user]);

          if (error) return (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-slate-900">
                <div className="bg-red-500/10 p-8 rounded-3xl border border-red-500/50 max-w-md">
                    <Icon name="alert-triangle" size={48} className="text-red-500 mx-auto mb-4"/>
                    <h2 className="text-xl font-bold text-white mb-4">كود الخطأ من جوجل</h2>
                    <p className="text-slate-300 text-sm mb-6 leading-relaxed" dir="ltr">{error}</p>
                    <button onClick={()=>window.location.reload()} className="bg-red-600 text-white px-8 py-3 rounded-xl font-bold active:scale-95 transition">إعادة المحاولة</button>
                </div>
            </div>
          );

          if (loading) return (
            <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center gap-4 text-slate-400 font-bold">
                <div className="loader"></div>جاري جلب البيانات...
            </div>
          );

          const handleLogin = () => {
            const correctPass = authMode === 'office' ? settings.office : settings.laser;
            if (String(pin) === String(correctPass)) { setView(authMode); setAuthMode(null); setPin(''); }
            else { alert("الباسورد غلط يا بولا!"); setPin(''); }
          };

          if (view === 'landing') {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-900" dir="rtl">
                {authMode && (
                    <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl p-10 max-w-sm w-full text-center text-slate-900 shadow-2xl animate-in zoom-in duration-200">
                            <button onClick={() => setAuthMode(null)} className="absolute top-4 left-4 text-slate-300"><Icon name="x"/></button>
                            <div className="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600"><Icon name="lock" size={28}/></div>
                            <h3 className="text-xl font-black mb-6">{authMode === 'laser' ? 'دخول الليزر' : 'دخول المكتب'}</h3>
                            <input type="password" autoFocus className="w-full bg-slate-100 p-4 text-center text-4xl font-black rounded-2xl mb-6 outline-none border-2 border-transparent focus:border-blue-500" value={pin} onChange={e => setPin(e.target.value)} placeholder="****" onKeyDown={e => e.key === 'Enter' && handleLogin()}/>
                            <button onClick={handleLogin} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg">دخول</button>
                        </div>
                    </div>
                )}
                <h1 className="text-6xl md:text-8xl font-black text-white mb-2 tracking-tighter italic">PAULA</h1>
                <p className="text-blue-400 font-bold mb-20 tracking-[0.3em] text-xs uppercase opacity-70">Premium Studio V23.2</p>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-4xl px-4">
                    <button onClick={() => setAuthMode('laser')} className="bg-slate-800 hover:bg-blue-600 p-12 rounded-[3rem] border border-slate-700 transition-all duration-300 flex flex-col items-center gap-6 group hover:-translate-y-2">
                        <Icon name="zap" size={64} className="text-blue-400 group-hover:text-white transition"/>
                        <span className="text-2xl font-black text-white">ماكينة الليزر</span>
                    </button>
                    <button onClick={() => setAuthMode('office')} className="bg-slate-800 hover:bg-emerald-600 p-12 rounded-[3rem] border border-slate-700 transition-all duration-300 flex flex-col items-center gap-6 group hover:-translate-y-2">
                        <Icon name="package" size={64} className="text-emerald-400 group-hover:text-white transition"/>
                        <span className="text-2xl font-black text-white">حسابات المكتب</span>
                    </button>
                </div>
              </div>
            );
          }

          return <StudioSystem view={view} setView={setView} settings={settings} items={items} orders={orders} employees={employees} expenses={expenses} debtPayments={debtPayments} laserBills={laserBills} dbRef={db.collection('artifacts').doc(appPath).collection('public').doc('data')} />;
        };

        const StudioSystem = ({ view, setView, settings, items, orders, employees, expenses, debtPayments, laserBills, dbRef }) => {
            const [tab, setTab] = useState('sales');
            const [cart, setCart] = useState([]);
            const [isWholesale, setIsWholesale] = useState(false);
            const [client, setClient] = useState({name:'', phone:''});
            const [emp, setEmp] = useState('');
            const [pay, setPay] = useState({paid:'', disc:'', method:'cash'});
            const [adminLock, setAdminLock] = useState(true);
            const [pinInput, setPinInput] = useState('');
            const [search, setSearch] = useState('');
            const today = new Date().toLocaleDateString('en-CA');

            const hStats = useMemo(() => {
                const dO = orders.filter(o => o.dateString === today);
                const dE = expenses.filter(e => e.dateString === today).reduce((s,e)=>s+(e.amount||0),0);
                const dD = debtPayments.filter(d => d.dateString === today).reduce((s,d)=>s+(d.amount||0),0);
                let cash = dD, wallet = 0;
                dO.forEach(o => { if(o.paymentMethod==='cash') cash += (o.initialPaid||o.paid); else wallet += (o.initialPaid||o.paid); });
                return { drawer: cash - dE, wallet, total: (cash+wallet) - dE };
            }, [orders, expenses, debtPayments, today]);

            const laserStats = useMemo(() => {
                const fOrders = orders.filter(o => o.dateString?.startsWith(today.slice(0, 7)));
                const fBills = laserBills.filter(b => b.dateString?.startsWith(today.slice(0, 7)));
                const income = fOrders.reduce((s, o) => s + (o.items || []).filter(i => i.isLaser).reduce((ss, i) => ss + (i.currentPrice * i.qty), 0), 0);
                const bills = fBills.reduce((s, b) => s + (parseFloat(b.amount)||0), 0);
                return { income, bills, share: (income - bills) / 2 };
            }, [orders, laserBills, today]);

            const handleCheckout = async () => {
                if(!cart.length || !client.name.trim() || !emp) return alert("البيانات ناقصة!");
                const sub = cart.reduce((a,b)=>a+(b.currentPrice*b.qty),0);
                const total = sub - (parseFloat(pay.disc)||0);
                const paid = parseFloat(pay.paid)||0;

                const batch = firebase.firestore().batch();
                const newRef = dbRef.collection('orders').doc();
                batch.set(newRef, {
                    items: cart, subTotal: sub, discount: parseFloat(pay.disc)||0, total, paid, remaining: total-paid, initialPaid: paid,
                    customerName: client.name, customerPhone: client.phone, employeeName: emp, paymentMethod: pay.method,
                    dateString: today, monthString: today.slice(0, 7), createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                cart.forEach(i => { if(!i.isPrinting) batch.update(dbRef.collection('inventory').doc(i.id), {stock: firebase.firestore.FieldValue.increment(-i.qty)}); });
                await batch.commit();
                setCart([]); setPay({paid:'', disc:'', method:'cash'}); setClient({name:'', phone:''}); setEmp(''); alert("تم الحفظ بنجاح ✅");
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 p-4 md:p-8" dir="rtl">
                    <div className="flex flex-col lg:flex-row justify-between items-center mb-8 bg-white p-5 rounded-[2.5rem] shadow-sm border border-slate-100 gap-4">
                        <div className="flex items-center gap-4 w-full lg:w-auto justify-between">
                            <button onClick={()=>setView('landing')} className="bg-slate-100 p-3 rounded-2xl text-red-500 hover:bg-red-500 hover:text-white transition"><Icon name="log-out"/></button>
                            <div className="flex gap-2">
                                <div className="px-5 py-2 bg-emerald-50 text-emerald-700 rounded-2xl border border-emerald-100 text-sm font-black text-center shadow-sm"><span className="block text-[9px] uppercase opacity-50">الدرج</span>{hStats.drawer}ج</div>
                                <div className="px-5 py-2 bg-blue-50 text-blue-700 rounded-2xl border border-blue-100 text-sm font-black text-center shadow-sm"><span className="block text-[9px] uppercase opacity-50">محفظة</span>{hStats.wallet}ج</div>
                            </div>
                        </div>
                        <div className="flex gap-1 overflow-x-auto scrollbar-hide w-full lg:w-auto p-1">
                            {[{id:'sales', n:'البيع', i:'shopping-cart'}, {id:'orders', n:'الطلبات', i:'file-text'}, {id:'warehouse', n:'المخزن', i:'package'}, {id:'admin', n:'الخزنة', i:'lock'}].map(t => (
                                <button key={t.id} onClick={()=>setTab(t.id)} className={`px-6 py-3 rounded-2xl text-xs font-black flex items-center gap-2 transition-all ${tab===t.id?'bg-slate-900 text-white shadow-xl scale-105':'bg-slate-100 text-slate-500'}`}><Icon name={t.i} size={16}/> {t.n}</button>
                            ))}
                        </div>
                    </div>

                    {tab === 'sales' && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                            <div className="lg:col-span-2">
                                <div className="flex gap-3 mb-6">
                                    <button onClick={()=>setIsWholesale(false)} className={`flex-1 py-4 rounded-2xl font-black transition ${!isWholesale?'bg-emerald-600 text-white shadow-lg':'bg-white text-slate-400'}`}>قطاعي</button>
                                    <button onClick={()=>setIsWholesale(true)} className={`flex-1 py-4 rounded-2xl font-black transition ${isWholesale?'bg-amber-600 text-white shadow-lg':'bg-white text-slate-400'}`}>جملة</button>
                                </div>
                                <input className="w-full p-4 bg-white rounded-2xl shadow-sm outline-none font-black border border-slate-100 mb-6" placeholder="بحث عن صنف..." value={search} onChange={e=>setSearch(e.target.value)}/>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-5">
                                    {items.filter(i=>i.name.includes(search)).map(item => (
                                        <button key={item.id} onClick={()=>{
                                            const q = prompt(`كمية: ${item.name}`, "1");
                                            if(q && !isNaN(q)) setCart([...cart, {...item, qty: parseFloat(q), currentPrice: isWholesale?(item.wholesalePrice||item.price):item.price}]);
                                        }} className="bg-white p-7 rounded-[2.5rem] border border-slate-100 text-center relative hover:border-blue-400 transition-all active:scale-95 group overflow-hidden">
                                            <div className="font-black text-slate-800 text-sm mb-2">{item.name}</div>
                                            <div className="text-3xl font-black text-emerald-600">{isWholesale?(item.wholesalePrice||item.price):item.price} ج</div>
                                            <div className={`text-[10px] font-bold mt-2 ${item.stock < 5 ? 'text-red-500 animate-pulse' : 'text-slate-400'}`}>مخزون: {item.stock}</div>
                                            {item.isLaser && <Icon name="zap" size={14} className="absolute top-4 left-4 text-blue-400 opacity-20"/>}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white p-8 rounded-[3rem] shadow-2xl border h-fit sticky top-10">
                                <h3 className="font-black mb-6 flex items-center gap-3 text-lg"><Icon name="shopping-cart" size={24}/> فاتورة جديدة</h3>
                                <div className="space-y-3 mb-8 max-h-60 overflow-y-auto scrollbar-hide">
                                    {cart.map((c,idx)=>(
                                        <div key={idx} className="bg-slate-50 p-4 rounded-2xl flex justify-between items-center text-xs font-bold border">
                                            <span className="truncate flex-1">{c.name} <span className="text-blue-600 font-black">x{c.qty}</span></span>
                                            <span className="mx-4">{c.qty*c.currentPrice}ج</span>
                                            <button onClick={()=>setCart(cart.filter((_,i)=>i!==idx))} className="text-red-400"><Icon name="x" size={18}/></button>
                                        </div>
                                    ))}
                                    {!cart.length && <div className="py-12 text-center text-slate-300 font-bold border-2 border-dashed rounded-3xl">السلة فارغة</div>}
                                </div>
                                <div className="text-4xl font-black text-center mb-8 text-emerald-800 bg-emerald-50 py-7 rounded-[2.5rem] border border-emerald-100 italic shadow-inner">
                                    {(cart.reduce((a,b)=>a+(b.currentPrice*b.qty),0) - (parseFloat(pay.disc)||0)).toFixed(0)} ج
                                </div>
                                <div className="space-y-4">
                                    <input className="w-full p-4 bg-slate-100 rounded-2xl text-center font-black outline-none border focus:border-blue-500" placeholder="اسم العميل" value={client.name} onChange={e=>setClient({...client, name:e.target.value})}/>
                                    <select className="w-full p-4 bg-slate-100 rounded-2xl text-center font-black outline-none border focus:border-blue-500" value={emp} onChange={e=>setEmp(e.target.value)}>
                                        <option value="">-- اختر الموظف --</option>
                                        {employees.map(e=><option key={e.id} value={e.name}>{e.name}</option>)}
                                    </select>
                                    <div className="flex gap-2">
                                        <button onClick={()=>setPay({...pay, method:'cash'})} className={`flex-1 py-3 rounded-xl text-xs font-black ${pay.method==='cash'?'bg-emerald-600 text-white shadow-md':'bg-slate-100 text-slate-400'}`}>نقدي</button>
                                        <button onClick={()=>setPay({...pay, method:'wallet'})} className={`flex-1 py-3 rounded-xl text-xs font-black ${pay.method==='wallet'?'bg-blue-600 text-white shadow-md':'bg-slate-100 text-slate-400'}`}>محفظة</button>
                                    </div>
                                    <input className="w-full p-4 bg-slate-900 rounded-[2rem] text-center font-black text-white text-xl outline-none border-2 border-emerald-500" placeholder="المبلغ المدفوع" type="number" value={pay.paid} onChange={e=>setPay({...pay, paid:e.target.value})}/>
                                    <button onClick={handleCheckout} className="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black shadow-xl hover:bg-blue-700 transition-all text-lg">حفظ الفاتورة ✅</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'orders' && (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            {orders.slice(0, 50).map(o => (
                                <div key={o.id} className="bg-white p-7 rounded-[2.5rem] border shadow-sm relative group overflow-hidden hover:shadow-lg transition-all">
                                    <div className="flex justify-between items-start mb-4">
                                        <div><div className="font-black text-lg text-slate-800">{o.customerName}</div><div className="text-[10px] text-slate-400 font-bold">{o.dateString}</div></div>
                                        <button onClick={async()=> { if(confirm("حذف الفاتورة؟")) await dbRef.collection('orders').doc(o.id).delete(); }} className="text-red-100 group-hover:text-red-500 transition"><Icon name="trash-2" size={18}/></button>
                                    </div>
                                    <div className="text-sm font-black mb-6 flex justify-between bg-slate-50 p-4 rounded-2xl border">
                                        <span className="text-emerald-700">الإجمالي: {o.total}ج</span>
                                        <span className="text-red-600">الباقي: {o.remaining}ج</span>
                                    </div>
                                    <button onClick={()=>window.open(`https://wa.me/2${o.customerPhone||''}?text=فاتورة استوديو بولا: العميل ${o.customerName}، الإجمالي ${o.total}ج، المدفوع ${o.paid}ج، الباقي ${o.remaining}ج`)} className="w-full bg-emerald-50 text-emerald-600 py-3 rounded-2xl font-black text-xs flex justify-center items-center gap-2 border border-emerald-100">
                                        <Icon name="send" size={16}/> واتساب
                                    </button>
                                </div>
                            ))}
                        </div>
                    )}

                    {tab === 'warehouse' && (
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                            {items.map(i => (
                                <div key={i.id} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 text-center relative group">
                                    <div className="text-xs font-black text-slate-400 mb-2 uppercase tracking-widest">{i.name}</div>
                                    <div className={`text-6xl font-black mb-6 ${i.stock < 5 ? 'text-red-500 animate-pulse' : 'text-slate-800'}`}>{i.stock}</div>
                                    <button onClick={async()=> { const v = prompt("أدخل الكمية الجديدة:", i.stock); if(v && !isNaN(v)) await dbRef.collection('inventory').doc(i.id).update({stock: parseInt(v)}); }} className="bg-slate-900 text-white px-8 py-3 rounded-2xl text-xs font-black w-full hover:bg-black transition">تعديل المخزون</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {tab === 'admin' && (
                        <div className="max-w-4xl mx-auto">
                            {adminLock ? (
                                <div className="bg-slate-900 p-12 rounded-[3rem] text-center shadow-2xl mx-auto max-w-sm border border-white/5">
                                    <Icon name="shield-check" size={64} className="text-emerald-400 mx-auto mb-8 shadow-emerald-500/20 shadow-xl"/>
                                    <h2 className="text-2xl font-black text-white mb-8 tracking-tighter">الخزنة السرية</h2>
                                    <input type="password" placeholder="****" className="bg-white/10 text-white text-center text-5xl p-5 rounded-3xl font-black mb-8 w-full outline-none border border-white/20" value={pinInput} onChange={e=>{ setPinInput(e.target.value); if(String(e.target.value)===String(settings.vaultPin)) { setAdminLock(false); setPinInput(''); } }}/>
                                </div>
                            ) : (
                                <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-slate-100 animate-in zoom-in duration-300">
                                    <div className="flex justify-between items-center mb-10 border-b pb-6 text-slate-800">
                                        <h3 className="text-2xl font-black">إدارة الاستوديو والخزنة</h3>
                                        <button onClick={()=>setAdminLock(true)} className="bg-slate-100 p-3 rounded-2xl text-slate-400 transition"><Icon name="x" size={24}/></button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10 text-center text-white">
                                        <div className="p-8 bg-gradient-to-br from-blue-600 to-blue-800 rounded-[2.5rem] border shadow-xl"><div className="text-xs font-black mb-2 opacity-70">مبيعات الليزر (شهر)</div><div className="text-4xl font-black mb-4">{laserStats.income} ج</div><div className="text-sm font-bold bg-white/10 py-1 rounded-full px-4">نصيب الشريك: {laserStats.share} ج</div></div>
                                        <div className="p-8 bg-gradient-to-br from-emerald-600 to-emerald-800 rounded-[2.5rem] border shadow-xl"><div className="text-xs font-black mb-2 opacity-70">إجمالي الموظفين</div><div className="text-4xl font-black mb-4">{employees.length}</div><div className="text-sm font-bold bg-white/10 py-1 rounded-full px-4 italic">نشطين الآن</div></div>
                                    </div>
                                    <div className="mb-10 bg-slate-50 p-10 rounded-[2.5rem] border border-slate-200 shadow-inner">
                                        <h4 className="font-black mb-8 flex items-center gap-3 text-lg text-slate-700"><Icon name="award" size={24} className="text-amber-500"/> الموظفين والعمولات ({settings.commissionRate}%)</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {employees.map(e => {
                                                const eO = orders.filter(o => o.employeeName === e.name && o.remaining === 0);
                                                const comm = (eO.reduce((s,o)=>s+o.total,0) * settings.commissionRate) / 100;
                                                return (
                                                    <div key={e.id} className="bg-white p-6 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                                                        <div><div className="font-black text-slate-800 text-lg">{e.name}</div><div className="text-xs text-blue-600 font-bold bg-blue-50 px-3 py-1 rounded-full mt-2 inline-block shadow-sm">العمولة: {comm.toFixed(1)} ج</div></div>
                                                        <button onClick={async()=> { if(confirm("حذف الموظف؟")) await dbRef.collection('employees').doc(e.id).delete(); }} className="text-red-100 hover:text-red-500 transition-all"><Icon name="user-x" size={22}/></button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
