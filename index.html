<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام استوديو بولا V23.2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #0f172a; color: white; margin: 0; touch-action: manipulation; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #3b82f6; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body>
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; background: #0f172a;">
            <div class="loader"></div>
            <div style="font-size: 18px; font-weight: bold; color: #94a3b8;">جاري تشغيل نظام استوديو بولا V23.2...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const firebaseConfig = {
          apiKey: "AIzaSyCz87t17ecgYHmHJHOtCBU7vYneWy6iJI8",
          authDomain: "paula-studio-18709.firebaseapp.com",
          projectId: "paula-studio-18709",
          storageBucket: "paula-studio-18709.firebasestorage.app",
          messagingSenderId: "827466426934",
          appId: "1:827466426934:web:e6ef20d3598427ea538697"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appNamespace = 'paula-studio-v23';

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
          const [user, setUser] = useState(null);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);
          const [view, setView] = useState('landing');
          const [authMode, setAuthMode] = useState(null);
          const [pin, setPin] = useState('');
          const [settings, setSettings] = useState({ laser: '941997', office: '0128', vaultPin: '3316', meterPrice: 250, commissionRate: 1 });

          const [items, setItems] = useState([]);
          const [orders, setOrders] = useState([]);
          const [employees, setEmployees] = useState([]);
          const [expenses, setExpenses] = useState([]);

          useEffect(() => {
            auth.signInAnonymously().catch(err => {
                setError(`خطأ في الاتصال: (${err.code}). الحل: ضيف الدومين bolaemad524-ux.github.io في Authorized Domains بـ Firebase.`);
                setLoading(false);
            });
            auth.onAuthStateChanged(u => { setUser(u); if(u) setLoading(false); });
          }, []);

          useEffect(() => {
            if (!user) return;
            const rootRef = db.collection('artifacts').doc(appNamespace).collection('public').doc('data');
            const unsub = [
                rootRef.collection('app_settings').doc('general').onSnapshot(s => s.exists && setSettings(prev => ({...prev, ...s.data()}))),
                rootRef.collection('inventory').onSnapshot(s => setItems(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('orders').orderBy('createdAt', 'desc').limit(50).onSnapshot(s => setOrders(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('employees').onSnapshot(s => setEmployees(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('expenses').onSnapshot(s => setExpenses(s.docs.map(d=>({id:d.id, ...d.data()})))),
            ];
            return () => unsub.forEach(fn => fn());
          }, [user]);

          if (error) return (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-slate-900">
                <div className="bg-red-500/10 p-8 rounded-3xl border border-red-500/50 max-w-md">
                    <Icon name="alert-triangle" size={48} className="text-red-500 mx-auto mb-4"/>
                    <h2 className="text-xl font-bold text-white mb-2">تنبيه من النظام</h2>
                    <p className="text-slate-300 text-sm mb-6">{error}</p>
                    <button onClick={()=>window.location.reload()} className="bg-red-600 text-white px-8 py-3 rounded-xl font-bold">تحديث الصفحة</button>
                </div>
            </div>
          );

          if (loading) return (
            <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center gap-4 text-slate-400 font-bold">
                <div className="loader"></div>جاري تحميل بيانات استوديو بولا...
            </div>
          );

          const handleLogin = () => {
            const pass = authMode === 'office' ? settings.office : settings.laser;
            if (String(pin) === String(pass)) { setView(authMode); setAuthMode(null); setPin(''); }
            else { alert("الباسورد غلط!"); setPin(''); }
          };

          if (view === 'landing') {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-900" dir="rtl">
                {authMode && (
                    <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl p-10 max-w-sm w-full text-center text-slate-900 shadow-2xl">
                            <button onClick={() => setAuthMode(null)} className="absolute top-4 left-4 text-slate-300"><Icon name="x"/></button>
                            <div className="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600"><Icon name="lock" size={28}/></div>
                            <h3 className="text-xl font-black mb-6">{authMode === 'laser' ? 'دخول الليزر' : 'دخول المكتب'}</h3>
                            <input type="password" autoFocus className="w-full bg-slate-100 p-4 text-center text-4xl font-black rounded-2xl mb-6 outline-none border-2 border-transparent focus:border-blue-500" value={pin} onChange={e => setPin(e.target.value)} placeholder="****" onKeyDown={e => e.key === 'Enter' && handleLogin()}/>
                            <button onClick={handleLogin} className="w-full bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg">دخول</button>
                        </div>
                    </div>
                )}
                <h1 className="text-5xl md:text-7xl font-black text-white mb-2 tracking-tighter italic">PAULA SYSTEM</h1>
                <p className="text-blue-400 font-bold mb-16 tracking-widest text-xs uppercase opacity-70">Premium Studio Edition V23.2</p>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl">
                    <button onClick={() => setAuthMode('laser')} className="bg-slate-800 hover:bg-blue-600 p-10 rounded-[2.5rem] border border-slate-700 transition flex flex-col items-center gap-6 group">
                        <Icon name="zap" size={64} className="text-blue-400 group-hover:text-white transition"/>
                        <span className="text-2xl font-black text-white">ماكينة الليزر</span>
                    </button>
                    <button onClick={() => setAuthMode('office')} className="bg-slate-800 hover:bg-emerald-600 p-10 rounded-[2.5rem] border border-slate-700 transition flex flex-col items-center gap-6 group">
                        <Icon name="package" size={64} className="text-emerald-400 group-hover:text-white transition"/>
                        <span className="text-2xl font-black text-white">حسابات المكتب</span>
                    </button>
                </div>
              </div>
            );
          }

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 p-4 md:p-8" dir="rtl">
                <div className="flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm border mb-6">
                    <button onClick={()=>setView('landing')} className="bg-slate-100 p-3 rounded-xl text-red-500 hover:bg-red-500 hover:text-white transition"><Icon name="log-out"/></button>
                    <h2 className="font-black text-lg">{view === 'office' ? 'نظام المكتب' : 'نظام الليزر'}</h2>
                    <div className="text-xs font-black bg-emerald-100 text-emerald-700 px-4 py-2 rounded-full flex items-center gap-2"><Icon name="check-circle" size={14}/> متصل أونلاين</div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-2">
                        <div className="bg-white p-6 rounded-[2rem] border border-slate-100 shadow-sm">
                            <h3 className="font-black mb-4 flex items-center gap-2 text-blue-600"><Icon name="package"/> المخزن المتوفر:</h3>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                {items.map(i => (
                                    <div key={i.id} className="bg-slate-50 p-6 rounded-3xl border border-slate-100 relative group overflow-hidden hover:border-blue-400 transition">
                                        <div className="font-black text-slate-800 text-sm mb-1">{i.name}</div>
                                        <div className="text-emerald-600 font-black text-xl">{i.price} ج</div>
                                        <div className={`text-[10px] font-bold mt-2 ${i.stock < 5 ? 'text-red-500 animate-pulse' : 'text-slate-400'}`}>المخزون: {i.stock}</div>
                                        {i.isLaser && <Icon name="zap" size={14} className="absolute top-4 left-4 text-blue-500 opacity-20"/>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="space-y-6">
                        <div className="bg-slate-900 text-white p-8 rounded-[2rem] shadow-xl">
                            <h3 className="font-black mb-6 flex items-center gap-2"><Icon name="trending-up" className="text-emerald-400"/> أرباح اليوم:</h3>
                            <div className="space-y-4">
                                <div className="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/10">
                                    <span className="text-xs font-bold text-slate-400">إجمالي البيع</span>
                                    <span className="font-black text-2xl text-emerald-400">{orders.filter(o=>o.dateString===new Date().toLocaleDateString('en-CA')).reduce((s,o)=>s+o.total,0)} ج</span>
                                </div>
                                <div className="flex justify-between items-center bg-white/5 p-4 rounded-2xl border border-white/10">
                                    <span className="text-xs font-bold text-slate-400">عدد الفواتير</span>
                                    <span className="font-black text-2xl text-blue-400">{orders.filter(o=>o.dateString===new Date().toLocaleDateString('en-CA')).length}</span>
                                </div>
                            </div>
                        </div>
                        
                        <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 max-h-96 overflow-y-auto scrollbar-hide">
                            <h3 className="font-black mb-4 flex items-center gap-2 text-slate-700"><Icon name="search"/> آخر العمليات:</h3>
                            <div className="space-y-3">
                                {orders.slice(0, 10).map(o => (
                                    <div key={o.id} className="bg-slate-50 p-4 rounded-2xl text-xs flex justify-between items-center border border-slate-100 hover:bg-white transition">
                                        <div><div className="font-black text-slate-800">{o.customerName}</div><div className="text-[10px] text-slate-400 mt-1">{o.dateString}</div></div>
                                        <div className="text-left"><div className="font-black text-emerald-700 text-sm">{o.total} ج</div><div className="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">{o.paymentMethod}</div></div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            </div>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
