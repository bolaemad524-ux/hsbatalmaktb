<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نظام استوديو بولا V23.2</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: system-ui, -apple-system, sans-serif; background-color: #0f172a; color: white; margin: 0; user-select: none; }
        .loader { border: 4px solid #1e293b; border-top: 4px solid #3b82f6; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .tab-active { background-color: #059669; color: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body>
    
    <div id="root">
        <div style="height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;">
            <div class="loader"></div>
            <div style="font-size: 18px; font-weight: bold; color: #94a3b8;">جاري تشغيل نظام استوديو بولا...</div>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- إعدادات Firebase الخاصة بك ---
        const firebaseConfig = {
          apiKey: "AIzaSyCz87t17ecgYHmHJHOtCBU7vYneWy6iJI8",
          authDomain: "paula-studio-18709.firebaseapp.com",
          projectId: "paula-studio-18709",
          storageBucket: "paula-studio-18709.firebasestorage.app",
          messagingSenderId: "827466426934",
          appId: "1:827466426934:web:e6ef20d3598427ea538697"
        };
        
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appNamespace = 'paula-studio-v23'; 

        const Icon = ({ name, size = 20, className = "" }) => {
            useEffect(() => { if(window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} style={{width: size, height: size}} className={`inline-block ${className}`}></i>;
        };

        const App = () => {
          const [user, setUser] = useState(null);
          const [loading, setLoading] = useState(true);
          const [error, setError] = useState(null);
          const [currentView, setCurrentView] = useState('landing');
          const [authView, setAuthView] = useState(null);
          const [pinInput, setPinInput] = useState('');
          const [settings, setSettings] = useState({ laser: '941997', office: '0128', vaultPin: '3316', meterPrice: 250, commissionRate: 1 });

          // البيانات
          const [items, setItems] = useState([]);
          const [orders, setOrders] = useState([]);
          const [expenses, setExpenses] = useState([]);
          const [employees, setEmployees] = useState([]);
          const [customers, setCustomers] = useState([]);
          const [laserBills, setLaserBills] = useState([]);
          const [debtPayments, setDebtPayments] = useState([]);

          useEffect(() => {
            auth.signInAnonymously().catch(err => {
                setError("لازم تفعّل 'Anonymous Auth' من صفحة Authentication في Firebase.");
                setLoading(false);
            });
            const unsubAuth = auth.onAuthStateChanged(u => { setUser(u); if(u) setLoading(false); });
            return () => unsubAuth();
          }, []);

          useEffect(() => {
            if (!user) return;
            const rootRef = db.collection('artifacts').doc(appNamespace).collection('public').doc('data');

            const unsub = [
                rootRef.collection('app_settings').doc('general').onSnapshot(s => s.exists && setSettings(prev => ({...prev, ...s.data()}))),
                rootRef.collection('inventory').onSnapshot(s => setItems(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('orders').orderBy('createdAt', 'desc').onSnapshot(s => setOrders(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('expenses').onSnapshot(s => setExpenses(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('employees').onSnapshot(s => setEmployees(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('wholesale_customers').onSnapshot(s => setCustomers(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('laser_bills').orderBy('createdAt', 'desc').onSnapshot(s => setLaserBills(s.docs.map(d=>({id:d.id, ...d.data()})))),
                rootRef.collection('debt_payments').onSnapshot(s => setDebtPayments(s.docs.map(d=>({id:d.id, ...d.data()})))),
            ];
            return () => unsub.forEach(fn => fn());
          }, [user]);

          if (error) return (
            <div className="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-slate-900">
                <div className="bg-red-500/10 p-8 rounded-3xl border border-red-500/50 max-w-md">
                    <Icon name="alert-circle" size={48} className="text-red-500 mx-auto mb-4"/>
                    <h2 className="text-xl font-bold text-white mb-2">عطل في النظام</h2>
                    <p className="text-slate-300 text-sm mb-6">{error}</p>
                    <button onClick={()=>window.location.reload()} className="bg-red-600 text-white px-8 py-3 rounded-xl font-bold">إعادة المحاولة</button>
                </div>
            </div>
          );

          if (loading) return (
            <div className="min-h-screen bg-slate-900 flex flex-col items-center justify-center gap-4 text-slate-400 font-bold">
                <div className="loader"></div>جاري تحميل داتا استوديو بولا...
            </div>
          );

          const handleLogin = (target) => {
            const pass = target === 'office' ? settings.office : settings.laser;
            if (String(pinInput) === String(pass)) { setCurrentView(target); setAuthView(null); setPinInput(''); }
            else { alert("الباسورد غلط!"); setPinInput(''); }
          };

          if (currentView === 'landing') {
            return (
              <div className="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-900" dir="rtl">
                {authView && (
                    <div className="fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
                        <div className="bg-white rounded-3xl p-10 max-w-sm w-full text-center text-slate-900 shadow-2xl">
                            <button onClick={() => setAuthView(null)} className="absolute top-4 left-4 text-slate-300 hover:text-red-500"><Icon name="x"/></button>
                            <div className="w-16 h-16 bg-blue-50 rounded-full flex items-center justify-center mx-auto mb-4 text-blue-600"><Icon name="lock" size={28}/></div>
                            <h3 className="text-xl font-black mb-6">{authView === 'laser' ? 'دخول الليزر' : 'دخول المكتب'}</h3>
                            <input type="password" autoFocus className="w-full bg-slate-100 p-4 text-center text-4xl font-black rounded-2xl mb-6 outline-none border-2 border-transparent focus:border-blue-500" value={pinInput} onChange={e => setPinInput(e.target.value)} placeholder="****" onKeyDown={e => e.key === 'Enter' && handleLogin(authView)}/>
                            <button onClick={() => handleLogin(authView)} className="w-full bg-blue-600 hover:bg-blue-700 text-white py-4 rounded-xl font-black transition shadow-lg">دخول</button>
                        </div>
                    </div>
                )}
                <h1 className="text-5xl md:text-7xl font-black text-white mb-2 tracking-tighter">PAULA SYSTEM</h1>
                <p className="text-blue-400 font-bold mb-16 tracking-widest text-xs uppercase">Premium Studio Edition V23.2</p>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-3xl">
                    <button onClick={() => setAuthView('laser')} className="bg-slate-800 hover:bg-blue-600 p-10 rounded-[2.5rem] border border-slate-700 transition flex flex-col items-center gap-6 group">
                        <Icon name="zap" size={64} className="text-blue-400 group-hover:text-white transition"/>
                        <span className="text-2xl font-black text-white">ماكينة الليزر</span>
                    </button>
                    <button onClick={() => setAuthView('office')} className="bg-slate-800 hover:bg-emerald-600 p-10 rounded-[2.5rem] border border-slate-700 transition flex flex-col items-center gap-6 group">
                        <Icon name="package" size={64} className="text-emerald-400 group-hover:text-white transition"/>
                        <span className="text-2xl font-black text-white">حسابات المكتب</span>
                    </button>
                </div>
              </div>
            );
          }

          if (currentView === 'laser') return <LaserSystem backToHome={()=>setCurrentView('landing')} orders={orders} laserBills={laserBills} dbRef={db.collection('artifacts').doc(appNamespace).collection('public').doc('data')} />;
          if (currentView === 'office') return <OfficeSystem backToHome={()=>setCurrentView('landing')} orders={orders} items={items} expenses={expenses} employees={employees} customers={customers} debtPayments={debtPayments} settings={settings} dbRef={db.collection('artifacts').doc(appNamespace).collection('public').doc('data')} />;
        };

        // ==========================================
        // نظام الليزر
        // ==========================================
        const LaserSystem = ({ backToHome, orders, laserBills, dbRef }) => {
            const [period, setPeriod] = useState('all');
            const [showAdd, setShowAdd] = useState(false);
            const [bill, setBill] = useState({amount: '', desc: ''});
            const today = new Date().toLocaleDateString('en-CA');

            const stats = useMemo(() => {
                const fOrders = orders.filter(o => period === 'all' || (period === 'daily' ? o.dateString === today : o.dateString?.startsWith(today.slice(0, 7))));
                const fBills = laserBills.filter(b => period === 'all' || (period === 'daily' ? b.dateString === today : b.dateString?.startsWith(today.slice(0, 7))));
                const income = fOrders.reduce((s, o) => s + (o.items || []).filter(i => i.isLaser).reduce((ss, i) => ss + (i.currentPrice * i.qty), 0), 0);
                const bills = fBills.reduce((s, b) => s + (parseFloat(b.amount)||0), 0);
                return { income, bills, net: income - bills, share: (income - bills) / 2, filtered: fBills };
            }, [orders, laserBills, period]);

            return (
                <div className="min-h-screen bg-slate-900 text-white p-4 md:p-8" dir="rtl">
                    <div className="flex justify-between items-center mb-8 bg-slate-800 p-4 rounded-3xl border border-slate-700">
                        <button onClick={backToHome} className="bg-slate-700 p-3 rounded-xl hover:bg-red-500 transition"><Icon name="log-out" size={20}/></button>
                        <h1 className="text-xl font-black flex items-center gap-2"><Icon name="zap" className="text-blue-400"/> حسابات الليزر</h1>
                        <select className="bg-slate-700 text-xs font-black p-2 rounded-xl" value={period} onChange={e=>setPeriod(e.target.value)}>
                            <option value="all">الكل</option><option value="daily">اليوم</option><option value="monthly">الشهر</option>
                        </select>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                        <div className="bg-slate-800 p-6 rounded-3xl border border-slate-700 text-center"><div className="text-xs text-slate-400 mb-1">إجمالي المبيعات</div><div className="text-3xl font-black text-emerald-400">{stats.income} ج</div></div>
                        <div className="bg-blue-600 p-6 rounded-3xl text-center shadow-lg"><div className="text-xs text-blue-100 mb-1">نصيب الشريك (50%)</div><div className="text-4xl font-black mb-3">{stats.share > 0 ? stats.share : 0} ج</div><button onClick={async()=>{ if(window.confirm("تصفية وتصفير الحساب؟")) await dbRef.collection('laser_bills').add({description:"تصفية حساب", amount:stats.share*2, dateString:today, createdAt:firebase.firestore.FieldValue.serverTimestamp()}); }} className="w-full bg-white/20 py-2 rounded-xl text-xs font-bold">تصفية الآن</button></div>
                        <div className="bg-slate-800 p-6 rounded-3xl border border-slate-700 text-center"><div className="text-xs text-slate-400 mb-1">المصاريف</div><div className="text-3xl font-black text-red-400">{stats.bills} ج</div></div>
                    </div>
                    <div className="bg-slate-800 p-6 rounded-3xl border border-slate-700">
                        <div className="flex justify-between items-center mb-6"><h3 className="font-black">سجل المصاريف</h3><button onClick={()=>setShowAdd(true)} className="bg-blue-500 p-2 rounded-xl"><Icon name="plus"/></button></div>
                        <div className="space-y-2">{stats.filtered.map(b=>(<div key={b.id} className="bg-slate-900/50 p-4 rounded-2xl flex justify-between items-center"><div><div className="font-bold">{b.description}</div><div className="text-[10px] text-slate-500">{b.dateString}</div></div><div className="flex items-center gap-3"><span className="font-black text-red-400">{b.amount} ج</span><button onClick={()=>dbRef.collection('laser_bills').doc(b.id).delete()} className="text-slate-600"><Icon name="trash-2" size={16}/></button></div></div>))}</div>
                    </div>
                    {showAdd && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-slate-800 p-8 rounded-3xl w-full max-w-sm text-white">
                                <h3 className="text-center font-black mb-6">إضافة مصروف ليزر</h3>
                                <input className="w-full p-4 bg-slate-900 rounded-2xl mb-3 text-center font-black outline-none" placeholder="المبلغ" type="number" value={bill.amount} onChange={e=>setBill({...bill, amount:e.target.value})}/>
                                <input className="w-full p-4 bg-slate-900 rounded-2xl mb-4 text-center font-black outline-none" placeholder="الوصف" value={bill.desc} onChange={e=>setBill({...bill, desc:e.target.value})}/>
                                <div className="flex gap-2"><button onClick={async()=>{ if(bill.amount&&bill.desc){ await dbRef.collection('laser_bills').add({description:bill.desc, amount:parseFloat(bill.amount), dateString:today, createdAt:firebase.firestore.FieldValue.serverTimestamp()}); setShowAdd(false); setBill({amount:'',desc:''}); } }} className="flex-1 bg-blue-600 py-3 rounded-xl font-black">حفظ</button><button onClick={()=>setShowAdd(false)} className="flex-1 bg-slate-700 py-3 rounded-xl font-black">إلغاء</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // ==========================================
        // نظام المكتب
        // ==========================================
        const OfficeSystem = ({ backToHome, orders, items, expenses, employees, customers, debtPayments, settings, dbRef }) => {
            const [tab, setTab] = useState('sales');
            const [cart, setCart] = useState([]);
            const [search, setSearch] = useState('');
            const [isWholesale, setIsWholesale] = useState(false);
            const [client, setClient] = useState({name:'', phone:''});
            const [emp, setEmp] = useState('');
            const [pay, setPay] = useState({paid:'', disc:'', method:'cash'});
            const [adminLock, setAdminLock] = useState(true);
            const [pin, setPin] = useState('');
            const [itemToCart, setItemToCart] = useState(null);
            const [qty, setQty] = useState('1');
            const today = new Date().toLocaleDateString('en-CA');

            const hStats = useMemo(() => {
                const dO = orders.filter(o => o.dateString === today);
                const dE = expenses.filter(e => e.dateString === today).reduce((s,e)=>s+(e.amount||0),0);
                const dD = debtPayments.filter(d => d.dateString === today).reduce((s,d)=>s+(d.amount||0),0);
                let cash = dD, wallet = 0;
                dO.forEach(o => { if(o.paymentMethod==='cash') cash += o.initialPaid||o.paid; else wallet += o.initialPaid||o.paid; });
                return { drawer: cash - dE, wallet };
            }, [orders, expenses, debtPayments, today]);

            const handleCheckout = async () => {
                if(!cart.length || !client.name.trim() || !emp) return alert("البيانات ناقصة!");
                const sub = cart.reduce((a,b)=>a+(b.currentPrice*b.qty),0);
                const total = sub - (parseFloat(pay.disc)||0);
                const paid = parseFloat(pay.paid)||0;

                const batch = db.batch();
                const newRef = dbRef.collection('orders').doc();
                batch.set(newRef, {
                    items: cart, subTotal: sub, discount: parseFloat(pay.disc)||0, total, paid, remaining: total-paid, initialPaid: paid,
                    customerName: client.name, customerPhone: client.phone, employeeName: emp, paymentMethod: pay.method,
                    dateString: today, monthString: today.slice(0,7), createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                cart.forEach(i => { if(!i.isPrinting) batch.update(dbRef.collection('inventory').doc(i.id), {stock: firebase.firestore.FieldValue.increment(-i.qty)}); });
                await batch.commit();
                setCart([]); setPay({paid:'', disc:'', method:'cash'}); setClient({name:'', phone:''}); setEmp(''); alert("تم الحفظ ✅");
            };

            return (
                <div className="min-h-screen bg-slate-50 text-slate-900 p-3 md:p-8" dir="rtl">
                    <div className="flex flex-col xl:flex-row justify-between items-center mb-6 bg-white p-4 rounded-3xl shadow-sm border border-slate-100 gap-4">
                        <div className="flex items-center gap-3 w-full md:w-auto justify-between">
                            <button onClick={backToHome} className="bg-slate-100 p-3 rounded-xl text-red-500 transition"><Icon name="log-out" size={20}/></button>
                            <div className="flex gap-2">
                                <div className="px-4 py-2 bg-emerald-100 text-emerald-700 rounded-2xl text-xs font-black"><span className="block text-[8px] opacity-60 uppercase">الدرج</span>{hStats.drawer}ج</div>
                                <div className="px-4 py-2 bg-blue-100 text-blue-700 rounded-2xl text-xs font-black"><span className="block text-[8px] opacity-60 uppercase">المحفظة</span>{hStats.wallet}ج</div>
                            </div>
                        </div>
                        <div className="flex gap-1 overflow-x-auto scrollbar-hide w-full xl:w-auto">
                            {[{id:'sales', n:'البيع', i:'shopping-cart'}, {id:'orders', n:'الطلبات', i:'search'}, {id:'warehouse', n:'المخزن', i:'package'}, {id:'admin', n:'الخزنة', i:'lock'}].map(t => (
                                <button key={t.id} onClick={()=>setTab(t.id)} className={`px-5 py-3 rounded-2xl text-xs font-black flex items-center gap-2 transition ${tab===t.id?'tab-active':'bg-slate-100 text-slate-500'}`}><Icon name={t.i} size={16}/> {t.n}</button>
                            ))}
                        </div>
                    </div>

                    {tab === 'sales' && (
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            <div className="lg:col-span-2">
                                <div className="flex gap-2 mb-4">
                                    <button onClick={()=>setIsWholesale(false)} className={`flex-1 py-4 rounded-2xl font-black border-2 transition ${!isWholesale?'bg-emerald-600 border-emerald-600 text-white shadow-lg':'bg-white border-slate-100 text-slate-400'}`}>قطاعي</button>
                                    <button onClick={()=>setIsWholesale(true)} className={`flex-1 py-4 rounded-2xl font-black border-2 transition ${isWholesale?'bg-amber-600 border-amber-600 text-white shadow-lg':'bg-white border-slate-100 text-slate-400'}`}>جملة</button>
                                </div>
                                <input className="w-full p-4 bg-white rounded-2xl shadow-sm outline-none font-black border border-slate-100 mb-6" placeholder="ابحث عن منتج..." value={search} onChange={e=>setSearch(e.target.value)}/>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                                    {items.filter(i=>i.name.includes(search)).map(item => (
                                        <button key={item.id} onClick={()=> {setItemToCart(item); setQty('1');}} className="bg-white p-5 rounded-3xl border border-slate-100 shadow-sm hover:shadow-md transition text-center relative group">
                                            <div className="font-black text-slate-800 text-sm mb-1">{item.name}</div>
                                            <div className="text-emerald-600 font-black text-xl">{isWholesale ? (item.wholesalePrice||item.price) : item.price} ج</div>
                                            <div className={`text-[10px] font-bold mt-1 ${item.stock < 5 ? 'text-red-500 animate-pulse' : 'text-slate-400'}`}>مخزون: {item.stock}</div>
                                            {item.isLaser && <Icon name="zap" size={14} className="absolute top-4 left-4 text-blue-400"/>}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-slate-100 h-fit sticky top-6">
                                <h3 className="font-black mb-4 flex items-center gap-2"><Icon name="shopping-cart" size={20}/> الفاتورة الحالية</h3>
                                <div className="space-y-2 mb-6 max-h-48 overflow-y-auto scrollbar-hide">
                                    {cart.map((c,idx) => (
                                        <div key={idx} className="flex justify-between text-xs font-bold bg-slate-50 p-3 rounded-2xl items-center">
                                            <span className="truncate flex-1">{c.name} <span className="text-emerald-600">x{c.qty}</span></span>
                                            <span>{c.currentPrice * c.qty}ج</span>
                                            <button onClick={()=>setCart(cart.filter((_,i)=>i!==idx))} className="text-red-500 mr-2"><Icon name="x" size={16}/></button>
                                        </div>
                                    ))}
                                </div>
                                <div className="text-4xl font-black text-center mb-6 text-emerald-800 bg-emerald-50 py-5 rounded-3xl">
                                     {(cart.reduce((a,b)=>a+(b.currentPrice*b.qty),0) - (parseFloat(pay.disc)||0)).toFixed(0)} ج
                                </div>
                                <div className="space-y-3">
                                     <input className="w-full p-4 bg-slate-100 rounded-2xl text-center font-black outline-none border-2 border-transparent focus:border-emerald-500" placeholder="المبلغ المدفوع" type="number" value={pay.paid} onChange={e=>setPay({...pay, paid:e.target.value})}/>
                                     <input className="w-full p-4 bg-slate-100 rounded-2xl text-center font-black outline-none border-2 border-transparent focus:border-emerald-500" placeholder="اسم العميل" value={client.name} onChange={e=>setClient({...client, name:e.target.value})}/>
                                     <select className="w-full p-4 bg-slate-100 rounded-2xl text-center font-black outline-none border-2 border-transparent focus:border-emerald-500" value={emp} onChange={e=>setEmp(e.target.value)}>
                                         <option value="">-- اختر الموظف --</option>
                                         {employees.map(e => <option key={e.id} value={e.name}>{e.name}</option>)}
                                     </select>
                                     <div className="flex gap-2">
                                        <button onClick={()=>setPay({...pay, method:'cash'})} className={`flex-1 py-3 rounded-xl text-xs font-black transition ${pay.method==='cash'?'bg-emerald-600 text-white shadow-lg':'bg-slate-100 text-slate-400'}`}>نقدي</button>
                                        <button onClick={()=>setPay({...pay, method:'wallet'})} className={`flex-1 py-3 rounded-xl text-xs font-black transition ${pay.method==='wallet'?'bg-blue-600 text-white shadow-lg':'bg-slate-100 text-slate-400'}`}>محفظة</button>
                                     </div>
                                     <button onClick={handleCheckout} className="w-full bg-slate-900 text-white py-5 rounded-[2rem] font-black shadow-xl hover:bg-black transition">تأكيد وحفظ الفاتورة</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {tab === 'orders' && (
                        <div className="space-y-6">
                            <input className="w-full p-5 bg-white rounded-[2rem] shadow-sm outline-none font-black border border-slate-100" placeholder="ابحث باسم العميل..." value={search} onChange={e=>setSearch(e.target.value)}/>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {orders.filter(o=>o.customerName.includes(search)).map(o => (
                                    <div key={o.id} className="bg-white p-6 rounded-[2.5rem] border border-slate-100 shadow-sm relative group overflow-hidden">
                                        <div className="flex justify-between items-start mb-4">
                                            <div><div className="font-black text-lg">{o.customerName}</div><div className="text-[10px] text-slate-400 font-bold">{o.dateString}</div></div>
                                            <button onClick={async()=>{ if(window.confirm("حذف الفاتورة نهائياً؟")) await dbRef.collection('orders').doc(o.id).delete(); }} className="text-slate-200 group-hover:text-red-500 transition"><Icon name="trash-2" size={18}/></button>
                                        </div>
                                        <div className="space-y-1 mb-6 text-[11px] font-bold text-slate-500 bg-slate-50 p-4 rounded-2xl max-h-24 overflow-y-auto">
                                            {o.items.map((i,idx)=><div key={idx} className="flex justify-between"><span>• {i.name} (x{i.qty})</span><span>{i.qty*i.currentPrice}ج</span></div>)}
                                        </div>
                                        <div className="flex justify-between text-sm font-black mb-4"><div className="text-emerald-700">الإجمالي: {o.total}ج</div><div className="text-red-600">الباقي: {o.remaining}ج</div></div>
                                        <button onClick={()=>{
                                            const msg = `*فاتورة استوديو بولا*\nالعميل: ${o.customerName}\nالإجمالي: ${o.total} ج\nالمدفوع: ${o.paid} ج\n*الباقي: ${o.remaining} ج*`;
                                            window.open(`https://wa.me/2${o.customerPhone||''}?text=${encodeURIComponent(msg)}`, '_blank');
                                        }} className="w-full bg-emerald-50 text-emerald-600 py-3 rounded-2xl font-black text-xs flex items-center justify-center gap-2 border border-emerald-100">
                                            <Icon name="send" size={16}/> إرسال واتساب
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {tab === 'warehouse' && (
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-6">
                            <div className="bg-emerald-50 border-2 border-dashed border-emerald-200 p-10 rounded-[2.5rem] flex flex-col items-center justify-center gap-4 text-emerald-600 hover:bg-emerald-100 cursor-pointer" onClick={()=>alert("سيتم فتح نافذة الإضافة قريباً..")}>
                                 <Icon name="plus" size={48}/> <span className="font-black">إضافة صنف جديد</span>
                            </div>
                            {items.map(i => (
                                <div key={i.id} className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100 text-center relative group">
                                    <div className="text-xs font-black text-slate-400 mb-2 uppercase tracking-widest">{i.name}</div>
                                    <div className={`text-6xl font-black mb-6 ${i.stock < 5 ? 'text-red-500 animate-pulse' : 'text-slate-800'}`}>{i.stock}</div>
                                    <button onClick={async()=> { const v = prompt("أدخل الكمية الجديدة:", i.stock); if(v) await dbRef.collection('inventory').doc(i.id).update({stock: parseInt(v)}); }} className="bg-slate-900 text-white px-8 py-3 rounded-2xl text-xs font-black w-full hover:bg-black transition">تعديل المخزون</button>
                                </div>
                            ))}
                        </div>
                    )}

                    {tab === 'admin' && (
                        <div className="max-w-4xl mx-auto">
                            {adminLock ? (
                                <div className="bg-slate-900 p-12 rounded-[3rem] text-center shadow-2xl mx-auto max-w-sm">
                                    <Icon name="lock" size={64} className="text-emerald-400 mx-auto mb-8"/>
                                    <h2 className="text-2xl font-black text-white mb-8 tracking-tighter">الخزنة السرية</h2>
                                    <input type="password" placeholder="****" className="bg-white/10 text-white text-center text-4xl p-5 rounded-3xl font-black mb-8 w-full outline-none border border-white/20" value={pin} onChange={e=>{ setPin(e.target.value); if(String(e.target.value)===String(settings.vaultPin)) setAdminLock(false); }}/>
                                </div>
                            ) : (
                                <div className="bg-white p-8 rounded-[3rem] shadow-2xl border border-slate-100">
                                    <div className="flex justify-between items-center mb-10 border-b pb-6">
                                        <h3 className="text-2xl font-black text-slate-800">إدارة الاستوديو والخزنة</h3>
                                        <button onClick={()=>setAdminLock(true)} className="bg-slate-100 p-3 rounded-2xl text-slate-400 hover:bg-red-500 hover:text-white transition"><Icon name="x" size={24}/></button>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
                                        <div className="p-8 bg-emerald-50 rounded-[2.5rem] border border-emerald-100"><div className="text-xs text-emerald-600 font-black mb-2">دخل الشهر</div><div className="text-3xl font-black text-emerald-800">{orders.filter(o=>o.monthString===today.slice(0,7)).reduce((s,o)=>s+(o.initialPaid||o.paid),0)} ج</div></div>
                                        <div className="p-8 bg-red-50 rounded-[2.5rem] border border-red-100"><div className="text-xs text-red-600 font-black mb-2">مصاريف الشهر</div><div className="text-3xl font-black text-red-800">{expenses.filter(e=>e.dateString.startsWith(today.slice(0,7))).reduce((s,e)=>s+e.amount,0)} ج</div></div>
                                        <div className="p-8 bg-slate-900 rounded-[2.5rem] text-white"><div className="text-xs text-slate-400 font-black mb-2">الموظفين</div><div className="text-3xl font-black">{employees.length}</div></div>
                                    </div>
                                    <div className="mb-10 bg-slate-50 p-8 rounded-[2.5rem] border border-slate-200">
                                        <h4 className="font-black mb-6 flex items-center gap-3 text-lg"><Icon name="users" size={24}/> الموظفين والعمولات ({settings.commissionRate}%)</h4>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            {employees.map(e => {
                                                const eO = orders.filter(o => o.employeeName === e.name && o.remaining === 0);
                                                const comm = (eO.reduce((s,o)=>s+o.total,0) * settings.commissionRate) / 100;
                                                return (
                                                    <div key={e.id} className="bg-white p-5 rounded-3xl border border-slate-100 flex justify-between items-center shadow-sm">
                                                        <div><div className="font-black text-slate-800 text-lg">{e.name}</div><div className="text-xs text-blue-600 font-bold bg-blue-50 px-3 py-1 rounded-full mt-2">العمولة: {comm.toFixed(1)} ج</div></div>
                                                        <button onClick={async()=> { if(window.confirm("حذف الموظف؟")) await dbRef.collection('employees').doc(e.id).delete(); }} className="text-red-200 hover:text-red-500 transition"><Icon name="trash-2" size={20}/></button>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {itemToCart && (
                        <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-[2.5rem] p-10 w-full max-w-sm text-center shadow-2xl">
                                <h3 className="font-black text-xl mb-6 text-slate-800">أدخل الكمية لـ {itemToCart.name}</h3>
                                <input type="number" className="w-full p-5 bg-slate-100 rounded-3xl mb-8 text-center font-black text-5xl outline-none border-2 border-transparent focus:border-blue-500" value={qty} onChange={e => setQty(e.target.value)} autoFocus onKeyDown={e => { if(e.key==='Enter'){ setCart([...cart, {...itemToCart, qty: parseFloat(qty), currentPrice: isWholesale?(itemToCart.wholesalePrice||itemToCart.price):itemToCart.price}]); setItemToCart(null); }}}/>
                                <div className="flex gap-3">
                                    <button onClick={()=>{setCart([...cart, {...itemToCart, qty: parseFloat(qty), currentPrice: isWholesale?(itemToCart.wholesalePrice||itemToCart.price):itemToCart.price}]); setItemToCart(null);}} className="flex-1 bg-emerald-600 text-white py-4 rounded-2xl font-black shadow-lg">إضافة</button>
                                    <button onClick={()=>setItemToCart(null)} className="flex-1 bg-slate-200 py-4 rounded-2xl font-black text-slate-500">إلغاء</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
